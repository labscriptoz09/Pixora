<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test I2V - Pixora</title>
    <style>
        body{font-family:sans-serif;padding:20px;background:#0f0f14;color:#fafafa;max-width:600px;margin:0 auto}
        h1{font-size:1.2rem;margin-bottom:1rem}
        .step{padding:10px;margin:8px 0;border-radius:8px;font-size:0.85rem}
        .pending{background:#1e1e2e;border:1px solid #3b3b4a}
        .success{background:rgba(16,185,129,0.15);border:1px solid #10B981;color:#10B981}
        .error{background:rgba(239,68,68,0.15);border:1px solid #EF4444;color:#EF4444}
        .loading{background:rgba(139,92,246,0.15);border:1px solid #8B5CF6;color:#8B5CF6}
        button{padding:12px 24px;background:linear-gradient(135deg,#8B5CF6,#EC4899);color:white;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;margin-top:1rem}
        button:disabled{opacity:0.5;cursor:not-allowed}
        img,video{max-width:100%;border-radius:12px;margin-top:10px;display:block}
        pre{background:#16161e;padding:10px;border-radius:8px;font-size:0.7rem;overflow-x:auto;margin-top:8px;white-space:pre-wrap;word-break:break-all}
    </style>
</head>
<body>
<h1>🧪 Test I2V : fal.ai Image → HF Vidéo</h1>

<div id="step1" class="step pending">⏳ Étape 1 : Générer image via fal.ai...</div>
<div id="step2" class="step pending">⏳ Étape 2 : Envoyer image à HF I2V...</div>
<div id="step3" class="step pending">⏳ Étape 3 : Afficher la vidéo...</div>

<button id="btn" onclick="runTest()">▶️ Lancer le test</button>

<div id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// 🔑 Clé fal.ai temporaire (à supprimer après test)
const FAL_KEY = '6f2705ac-16ca-4e2b-bbd1-de234ad6d3cc:14e248f2381b5a4e2ff292486eeb263f';

async function setStep(id, status, msg) {
    const el = document.getElementById(id);
    el.className = `step ${status}`;
    el.textContent = msg;
}

async function runTest() {
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');
    btn.disabled = true;
    btn.textContent = '⏳ Test en cours...';
    result.innerHTML = '';

    try {        // ÉTAPE 1: Générer image avec fal.ai
        await setStep('step1', 'loading', '🔄 Génération image via fal.ai...');
        const prompt = 'a cat running in a field, cinematic lighting, 4k';
        const imgRes = await fetch('https://queue.fal.run/fal-ai/flux/schnell', {
            method: 'POST',
            headers: {
                'Authorization': 'Key ' + FAL_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                prompt: prompt,
                width: 512,
                height: 512,
                num_images: 1
            })
        });

        if (!imgRes.ok) {
            throw new Error(`fal.ai erreur ${imgRes.status}: ${await imgRes.text()}`);
        }

        const imgData = await imgRes.json();
        const imageUrl = imgData.images?.[0]?.url || imgData.output?.images?.[0]?.url;
        if (!imageUrl) {
            throw new Error('Aucune URL image reçue de fal.ai');
        }
        await setStep('step1', 'success', '✅ Image générée');
        result.innerHTML += `<img src="${imageUrl}" alt="Image initiale" style="max-width:100%;border-radius:12px;">`;

        // ÉTAPE 2: Envoyer image à HF stable-video-diffusion-img2vid-xt
        await setStep('step2', 'loading', '🔄 Envoi à HF I2V (patientez 15-30s)...');

        // Récupérer la clé Hugging Face depuis Supabase (si disponible)
        let hfKey = null;
        try {
            const supabase = window.supabase.createClient(
                'https://cfwzilhetkclpytjsopu.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU'
            );
            const { data } = await supabase.from('admin_config').select('value').eq('key', 'api_keys').single();
            hfKey = data?.value?.huggingface || null;
        } catch(e) {
            console.warn('Supabase non accessible — utiliser clé par défaut');
        }

        // Si pas de clé HF dans DB, utilise une clé temporaire (à remplacer)
        if (!hfKey) {
            // ⚠️ À remplacer par ta vraie clé HF après test
            hfKey = 'hf_xxxxx'; // ← Ne fonctionnera pas — mais on teste l'erreur
        }
        const vidRes = await fetch('https://api-inference.huggingface.co/models/stabilityai/stable-video-diffusion-img2vid-xt', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + hfKey,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                inputs: imageUrl,
                parameters: {
                    num_frames: 25,
                    fps: 6,
                    motion_bucket_id: 127,
                    cond_aug: 0.02
                }
            })
        });

        const contentType = vidRes.headers.get('content-type') || '';
        let videoUrl = null;

        if (contentType.includes('video/') || contentType.includes('octet-stream')) {
            const blob = await vidRes.blob();
            videoUrl = URL.createObjectURL(blob);
            await setStep('step2', 'success', `✅ Vidéo reçue (blob, ${Math.round(blob.size / 1024)} KB)`);
        } else if (contentType.includes('application/json')) {
            const vidData = await vidRes.json();
            videoUrl = vidData.video?.url || vidData.output?.video?.url;
            if (!videoUrl) {
                throw new Error('JSON reçu mais aucune URL vidéo');
            }
            await setStep('step2', 'success', '✅ Vidéo reçue (URL)');
        } else {
            throw new Error(`Type de réponse inattendu : ${contentType}`);
        }

        // ÉTAPE 3: Afficher
        await setStep('step3', 'success', '✅ VIDÉO GÉNÉRÉE !');
        result.innerHTML += `<video src="${videoUrl}" controls autoplay loop muted style="margin-top:15px;width:100%;border-radius:12px;"></video>`;
        result.innerHTML += `<pre>SUCCESS\nImage: ${imageUrl}\nVideo: ${videoUrl}</pre>`;

        btn.textContent = '✅ TEST RÉUSSI !';
        btn.style.background = '#10B981';

    } catch(e) {
        console.error('Test error:', e);
        await setStep('step1', 'error', '❌ Étape 1 échouée');
        await setStep('step2', 'error', '❌ Étape 2 échouée');
        await setStep('step3', 'error', '❌ Étape 3 échouée');
        result.innerHTML += `<pre class="error">ERREUR:\n${e.message}\n\nStack:\n${e.stack || ''}</pre>`;        btn.textContent = '❌ TEST ÉCHOUÉ';
        btn.style.background = '#EF4444';
    }

    btn.disabled = false;
}
</script>
</body>
</html>
