<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixora - Mon Profil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg-base:#050507;--bg-surface:rgba(24,24,27,0.6);--bg-elevated:rgba(39,39,42,0.8);--border-subtle:rgba(63,63,70,0.5);--accent-primary:#8B5CF6;--accent-secondary:#EC4899;--gold:#FBBF24;--gold-dim:rgba(251,191,36,0.1);--success:#10B981;--fire:#F97316;--danger:#EF4444;--text-main:#FAFAFA;--text-muted:#A1A1AA;--text-dim:#71717A;--font-ui:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius-md:16px;--radius-lg:24px;--ease-out:cubic-bezier(0.16,1,0.3,1);--header-bg:rgba(20,20,23,0.85)}
        *{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg-base);color:var(--text-main);font-family:var(--font-ui);line-height:1.5;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
        .bg-orbs{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4;animation:float 20s infinite ease-in-out}.orb-1{width:400px;height:400px;background:var(--accent-primary);top:-100px;left:-100px}.orb-2{width:300px;height:300px;background:var(--accent-secondary);bottom:10%;right:-50px;animation-delay:-5s}@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.1)}66%{transform:translate(-20px,20px) scale(0.9)}}
        a{text-decoration:none;color:inherit}button{background:none;border:none;cursor:pointer;font-family:inherit;color:inherit;-webkit-tap-highlight-color:transparent}
        .site-header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--header-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border-subtle);padding:0 1rem;height:60px;display:flex;align-items:center;justify-content:space-between}
        .header-left{display:flex;align-items:center;gap:0.8rem}.header-logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:var(--text-main)}.header-logo svg{width:26px;height:26px;flex-shrink:0}.logo-text{font-size:1.1rem;font-weight:700;letter-spacing:-0.03em;background:linear-gradient(135deg,#fff 20%,var(--accent-primary) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .header-right{display:flex;align-items:center;gap:0.6rem}.header-stats{display:flex;gap:0.5rem}.stat-badge{display:flex;align-items:center;gap:0.3rem;padding:0.3rem 0.6rem;border-radius:20px;font-family:var(--font-mono);font-size:0.7rem;font-weight:600;background:rgba(255,255,255,0.05);border:1px solid var(--border-subtle)}.stat-badge.points{color:var(--gold);border-color:rgba(251,191,36,0.3);background:var(--gold-dim)}.stat-badge.streak{color:var(--fire);border-color:rgba(249,115,22,0.3);background:rgba(249,115,22,0.1)}
        .header-nav-item{padding:0.4rem 0.8rem;border-radius:10px;font-size:0.8rem;font-weight:500;color:var(--text-muted);transition:all 0.2s;display:flex;align-items:center;gap:0.35rem}.header-nav-item:hover{color:var(--text-main);background:rgba(255,255,255,0.05)}.header-nav-item.active{color:var(--text-main);background:rgba(139,92,246,0.12)}
        .btn-header-auth{padding:0.4rem 1rem;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));color:white;border-radius:10px;font-size:0.8rem;font-weight:600;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem;white-space:nowrap;flex-shrink:0}.btn-header-auth:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(139,92,246,0.4)}
        @media(max-width:767px){.header-nav,.header-stats{display:none!important}.site-header{padding:0 0.8rem}.btn-header-auth{padding:0.35rem 0.8rem;font-size:0.75rem}}
        .profile-content{max-width:900px;margin:0 auto;padding:1rem;padding-top:75px;padding-bottom:40px;animation:slideUp 0.4s var(--ease-out)}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .user-card{background:var(--bg-surface);backdrop-filter:blur(20px);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:2rem;text-align:center}
        .user-avatar{width:80px;height:80px;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:white;margin:0 auto 1rem;box-shadow:0 8px 25px rgba(139,92,246,0.3)}
        .user-name{font-size:1.5rem;font-weight:700;margin-bottom:0.3rem}
        .user-email{color:var(--text-muted);font-size:0.9rem;margin-bottom:1rem}
        .user-tier{display:inline-flex;align-items:center;gap:0.4rem;padding:0.4rem 0.8rem;background:rgba(139,92,246,0.1);border:1px solid var(--accent-primary);border-radius:20px;font-size:0.75rem;font-weight:600;color:var(--accent-primary)}
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:2rem}@media(min-width:768px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
        .stat-card{background:var(--bg-surface);backdrop-filter:blur(20px);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:1.2rem;text-align:center}
        .stat-icon{width:40px;height:40px;background:var(--bg-elevated);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.8rem;font-size:1.1rem}
        .stat-card:nth-child(1) .stat-icon{color:var(--gold);background:var(--gold-dim)}
        .stat-card:nth-child(2) .stat-icon{color:var(--fire);background:rgba(249,115,22,0.1)}
        .stat-card:nth-child(3) .stat-icon{color:var(--accent-primary);background:rgba(139,92,246,0.1)}
        .stat-card:nth-child(4) .stat-icon{color:var(--success);background:rgba(16,185,129,0.1)}
        .stat-value{font-family:var(--font-mono);font-size:1.5rem;font-weight:700;margin-bottom:0.2rem}
        .stat-label{font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em}
        .tabs-container{margin-bottom:1.5rem}
        .tabs{display:flex;gap:0.5rem;background:var(--bg-surface);padding:0.4rem;border-radius:var(--radius-md);border:1px solid var(--border-subtle);overflow-x:auto}
        .tab{flex:1;padding:0.7rem 1rem;background:transparent;border:none;border-radius:10px;color:var(--text-muted);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap}
        .tab.active{background:var(--accent-primary);color:white}
        .tab-content{display:none}.tab-content.active{display:block;animation:fadeIn 0.3s}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .transaction-list{background:var(--bg-surface);backdrop-filter:blur(20px);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);overflow:hidden}
        .transaction-item{display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem;border-bottom:1px solid var(--border-subtle)}
        .transaction-item:last-child{border-bottom:none}
        .transaction-icon{width:40px;height:40px;background:var(--bg-elevated);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
        .transaction-icon.earned{color:var(--success);background:rgba(16,185,129,0.1)}
        .transaction-icon.spent{color:var(--danger);background:rgba(239,68,68,0.1)}
        .transaction-icon.purchased{color:var(--accent-primary);background:rgba(139,92,246,0.1)}
        .transaction-info{flex:1;min-width:0}
        .transaction-title{font-size:0.9rem;font-weight:600;margin-bottom:0.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}        .transaction-date{font-size:0.75rem;color:var(--text-muted)}
        .transaction-amount{font-family:var(--font-mono);font-size:0.9rem;font-weight:700;flex-shrink:0}
        .transaction-amount.positive{color:var(--success)}.transaction-amount.negative{color:var(--danger)}
        .empty-state{text-align:center;padding:3rem 1rem;color:var(--text-muted)}
        .empty-state i{font-size:3rem;opacity:0.3;margin-bottom:1rem}
        .settings-list{background:var(--bg-surface);backdrop-filter:blur(20px);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);overflow:hidden}
        .settings-item{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;border-bottom:1px solid var(--border-subtle);cursor:pointer}
        .settings-item:last-child{border-bottom:none}
        .settings-left{display:flex;align-items:center;gap:1rem}
        .settings-icon{width:36px;height:36px;background:var(--bg-elevated);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--accent-primary)}
        .settings-label{font-size:0.9rem;font-weight:500}
        .settings-right{color:var(--text-muted);font-size:0.85rem}
        .cta-button{width:100%;padding:1rem;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));color:white;border:none;border-radius:var(--radius-md);font-weight:600;font-size:1rem;cursor:pointer;box-shadow:0 4px 15px rgba(139,92,246,0.3);margin-top:1rem;display:flex;align-items:center;justify-content:center;gap:0.5rem}
        .cta-button.danger{background:rgba(239,68,68,0.2);color:var(--danger);box-shadow:none;border:1px solid rgba(239,68,68,0.3);margin-top:2rem}
    </style>
</head>
<body>

<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<header class="site-header">
    <div class="header-left"><a href="index.html" class="header-logo"><svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#pg)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/><path d="M16 2L4 10L16 14L16 2Z" fill="rgba(255,255,255,0.2)"/></svg><span class="logo-text">Pixora</span></a></div>
    <div class="header-right">
        <div class="header-stats" id="header-stats-logged" style="display:none"><div class="stat-badge streak"><i class="fas fa-fire"></i> <span id="header-streak">J1</span></div><div class="stat-badge points"><i class="fas fa-bolt"></i> <span id="header-points">0</span></div></div>
        <a href="shop.html" class="header-nav-item" id="header-shop-link" style="display:none"><i class="fas fa-shopping-bag"></i> Boutique</a>
        <button class="btn-header-auth" id="header-auth-btn" onclick="window.location.href='index.html'"><i class="fas fa-sign-in-alt"></i> Connexion</button>
    </div>
</header>

<main class="profile-content">
    <div class="user-card">
        <div class="user-avatar"><i class="fas fa-user"></i></div>
        <div class="user-name" id="profile-name">Utilisateur Pixora</div>
        <div class="user-email" id="profile-email">Membre depuis 2026</div>
        <div class="user-tier"><i class="fas fa-star"></i> Créateur</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-bolt"></i></div><div class="stat-value" id="stat-points">0</div><div class="stat-label">Points Actuels</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-fire"></i></div><div class="stat-value" id="stat-streak">0</div><div class="stat-label">Jours Streak</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-image"></i></div><div class="stat-value" id="stat-generated">0</div><div class="stat-label">Créations</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-value" id="stat-earned">0</div><div class="stat-label">Total Gagné</div></div>
    </div>

    <div class="tabs-container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('history', this)"><i class="fas fa-history"></i> Historique</button>
            <button class="tab" onclick="switchTab('purchases', this)"><i class="fas fa-shopping-bag"></i> Achats</button>
            <button class="tab" onclick="switchTab('settings', this)"><i class="fas fa-cog"></i> Paramètres</button>
        </div>    </div>

    <div class="tab-content active" id="tab-history"><div class="transaction-list" id="transaction-list"></div></div>
    <div class="tab-content" id="tab-purchases"><div id="purchases-list"></div></div>
    <div class="tab-content" id="tab-settings">
        <div class="settings-list">
            <div class="settings-item"><div class="settings-left"><div class="settings-icon"><i class="fas fa-bell"></i></div><div class="settings-label">Notifications</div></div><div class="settings-right">Activées <i class="fas fa-chevron-right"></i></div></div>
            <div class="settings-item"><div class="settings-left"><div class="settings-icon"><i class="fas fa-language"></i></div><div class="settings-label">Langue</div></div><div class="settings-right">Français <i class="fas fa-chevron-right"></i></div></div>
            <div class="settings-item"><div class="settings-left"><div class="settings-icon"><i class="fas fa-shield-alt"></i></div><div class="settings-label">Confidentialité</div></div><div class="settings-right"><i class="fas fa-chevron-right"></i></div></div>
            <div class="settings-item"><div class="settings-left"><div class="settings-icon"><i class="fas fa-info-circle"></i></div><div class="settings-label">À propos</div></div><div class="settings-right">Pixora v1.0.0</div></div>
        </div>
        <button class="cta-button danger" onclick="clearData()"><i class="fas fa-trash"></i> Réinitialiser mes données</button>
    </div>
</main>

<!-- ✅ SUPABASE CDN + SCRIPT COMPLET (AUCUN IMPORT) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// === SUPABASE CLIENT ===
var SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// === CONFIG PAR DÉFAUT (FALLBACK) ===
var DEFAULT_TIERS = {
    1: { costs:{image:15,video:90}, rewards:{video:30,survey:80,sponsor:5,streak:10,share:20}, limits:{video:3,sponsor:5,share:1} },
    2: { costs:{image:25,video:130}, rewards:{video:15,survey:40,sponsor:3,streak:5,share:10}, limits:{video:3,sponsor:5,share:1} },
    3: { costs:{image:35,video:190}, rewards:{video:8,survey:20,sponsor:2,streak:3,share:5}, limits:{video:2,sponsor:3,share:1} }
};
var COUNTRY_TIERS = {'FR':1,'US':1,'DE':1,'GB':1,'CA':1,'AU':1,'IT':1,'ES':1,'BR':2,'MX':2,'AR':2,'CO':2,'CL':2,'PE':2,'IN':3,'PH':3,'NG':3,'BD':3,'PK':3,'EG':3,'ID':3};
var currentTier = 1;

// === UTILS ===
function showNotification(m, t) {
    t = t || 'success';
    var n = document.getElementById('notification');
    if (!n) return;
    document.getElementById('notification-text').textContent = m;
    n.className = 'notification show ' + t;
    setTimeout(function() { n.classList.remove('show'); }, 3000);
}

async function getAuthUser() {
    var result = await db.auth.getUser();
    return result.data.user;
}

async function isLoggedIn() {
    var user = await getAuthUser();
    return !!user;}

// === UPDATE UI ===
async function updateProfileUI() {
    var user = await getAuthUser();
    if (!user) {
        document.getElementById('header-stats-logged').style.display = 'none';
        document.getElementById('header-shop-link').style.display = 'none';
        document.getElementById('header-auth-btn').innerHTML = '<i class="fas fa-sign-in-alt"></i> Connexion';
        document.getElementById('header-auth-btn').onclick = function() { window.location.href = 'index.html'; };
        return;
    }

    // Header stats
    document.getElementById('header-stats-logged').style.display = 'flex';
    document.getElementById('header-shop-link').style.display = 'flex';
    document.getElementById('header-auth-btn').innerHTML = '<i class="fas fa-user"></i> ' + (user.user_metadata?.name || 'Profil');
    document.getElementById('header-auth-btn').onclick = function() { window.location.href = 'profile.html'; };

    // User card
    document.getElementById('profile-name').textContent = user.user_metadata?.name || 'Utilisateur Pixora';
    document.getElementById('profile-email').textContent = user.email || 'Membre depuis 2026';

    // Load user data
    var userDataResult = await db.from('user_data').select('*').eq('user_id', user.id).single();
    var userData = userDataResult.data || { points: 0, streak: 1, total_generated: 0, total_earned: 0 };

    // Stats
    document.getElementById('stat-points').textContent = userData.points;
    document.getElementById('stat-streak').textContent = userData.streak;
    document.getElementById('stat-generated').textContent = userData.total_generated;
    document.getElementById('stat-earned').textContent = userData.total_earned;
    document.getElementById('header-points').textContent = userData.points;
    document.getElementById('header-streak').textContent = 'J' + userData.streak;

    // Transactions
    var txResult = await db.from('transactions').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
    loadTransactions(txResult.data || []);

    // Purchases
    var purResult = await db.from('purchases').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
    loadPurchases(purResult.data || []);
}

function loadTransactions(transactions) {
    var list = document.getElementById('transaction-list');
    if (!transactions.length) {
        list.innerHTML = '<div class="empty-state"><i class="fas fa-receipt"></i><p>Aucune transaction.</p></div>';
        return;
    }    list.innerHTML = transactions.map(t => {
        var icons = { earned: 'fa-plus', spent: 'fa-minus', purchased: 'fa-shopping-bag' };
        var dateStr = new Date(t.created_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
        return `<div class="transaction-item">
            <div class="transaction-icon ${t.type}"><i class="fas ${icons[t.type] || 'fa-circle'}"></i></div>
            <div class="transaction-info"><div class="transaction-title">${t.title}</div><div class="transaction-date">${dateStr}</div></div>
            <div class="transaction-amount ${t.amount > 0 ? 'positive' : 'negative'}">${t.amount > 0 ? '+' : ''}${t.amount} pts</div>
        </div>`;
    }).join('');
}

function loadPurchases(purchases) {
    var list = document.getElementById('purchases-list');
    if (!purchases.length) {
        list.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-bag"></i><p>Aucun achat.</p><a href="shop.html" class="cta-button" style="display:inline-flex;width:auto;margin-top:1.5rem;">Visiter la boutique</a></div>';
        return;
    }
    list.innerHTML = purchases.map(p => {
        var dateStr = p.created_at ? new Date(p.created_at).toLocaleDateString('fr-FR') : '';
        return `<div class="transaction-item">
            <div class="transaction-icon purchased"><i class="fas ${p.type === 'subscription' ? 'fa-crown' : 'fa-bolt'}"></i></div>
            <div class="transaction-info"><div class="transaction-title">${p.name}</div><div class="transaction-date">${p.details} • ${dateStr}</div></div>
            <div class="transaction-amount positive">${p.price}€</div>
        </div>`;
    }).join('');
}

// === TABS ===
function switchTab(tabName, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tabName).classList.add('active');
}

// === RESET DATA ===
async function clearData() {
    if (!confirm('⚠️ Réinitialiser toutes vos données ? Irréversible.')) return;
    var user = await getAuthUser();
    if (!user) return;
    await db.from('transactions').delete().eq('user_id', user.id);
    await db.from('purchases').delete().eq('user_id', user.id);
    await db.from('daily_usage').delete().eq('user_id', user.id);
    await db.from('cooldowns').delete().eq('user_id', user.id);
    await db.from('user_data').update({ points: 0, streak: 1, total_generated: 0, total_earned: 0 }).eq('user_id', user.id);
    location.reload();
}

// === INIT ===
document.addEventListener('DOMContentLoaded', async function() {    await updateProfileUI();
});
</script>
</body>
</html>
