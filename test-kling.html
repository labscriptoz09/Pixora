<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puter - Test</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0d0d12;
            color: #eee;
            padding: 2rem;
            max-width: 700px;
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            padding: 0.8rem;
            background: #1a1a20;
            border: 1px solid #333;
            border-radius: 10px;
            color: #eee;
            font-size: 1rem;
            min-height: 80px;
            font-family: inherit;
        }
        .btn {
            background: #7c3aed;
            border: none;
            color: #fff;
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.8rem;
        }
        .btn:hover { background: #6d28d9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #result {
            margin-top: 1.5rem;
            background: #1a1a20;
            border: 1px dashed #333;
            border-radius: 10px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        #result video {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
        }
        .error { color: #ef4444; }
        .success { color: #22c55e; }
        .info { color: #60a5fa; }
    </style>
</head>
<body>

    <h1>🎬 Puter.js — Test</h1>
    <p style="color:#888;">Génération vidéo avec Google Veo 3.1</p>

    <textarea id="prompt" placeholder="Décrivez votre vidéo...">un chat qui danse dans un jardin</textarea>

    <div style="display:flex;gap:0.8rem;flex-wrap:wrap;">
        <button class="btn" id="btn-gen">🎬 Générer</button>
        <button class="btn" id="btn-test" style="background:#2a2a32;">⚡ Mode Test</button>
    </div>

    <div id="result">⏳ Prêt</div>

    <script src="https://js.puter.com/v2/"></script>
    <script>
        const promptEl = document.getElementById('prompt');
        const btnGen = document.getElementById('btn-gen');
        const btnTest = document.getElementById('btn-test');
        const result = document.getElementById('result');

        // Vérifier Puter
        if (typeof puter === 'undefined') {
            result.innerHTML = '<span class="error">❌ Puter.js non chargé</span>';
        } else {
            result.innerHTML = '<span class="success">✅ Puter.js chargé</span>';
        }

        // Fonction de génération
        async function generate(testMode = false) {
            const prompt = promptEl.value.trim();
            if (!prompt) {
                result.innerHTML = '<span class="error">❌ Entrez un prompt</span>';
                return;
            }

            btnGen.disabled = true;
            btnTest.disabled = true;
            result.innerHTML = '<span class="info">⏳ Génération en cours...</span>';

            try {
                let video;
                if (testMode) {
                    // Mode test : pas de crédits consommés
                    video = await puter.ai.txt2vid(prompt, true);
                    result.innerHTML = '<span class="info">⚡ Mode test (démonstration)</span>';
                } else {
                    // Mode réel : avec Veo 3.1
                    video = await puter.ai.txt2vid(prompt, { model: 'google/veo-3.1' });
                }

                // Afficher la vidéo
                result.innerHTML = '';
                video.controls = true;
                video.autoplay = true;
                video.style.width = '100%';
                video.style.maxHeight = '400px';
                result.appendChild(video);

                // Gérer les erreurs
                video.onerror = () => {
                    result.innerHTML = '<span class="error">❌ Erreur de chargement</span>';
                };

            } catch (error) {
                let msg = error.message || 'Erreur inconnue';
                if (msg.includes('User not found')) {
                    msg = '🔑 Connexion Puter requise. Cliquez sur "Générer" pour vous connecter.';
                }
                result.innerHTML = `<span class="error">❌ ${msg}</span>`;
                console.error(error);
            }

            btnGen.disabled = false;
            btnTest.disabled = false;
        }

        btnGen.addEventListener('click', () => generate(false));
        btnTest.addEventListener('click', () => generate(true));

        // Ctrl+Enter
        promptEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                generate(false);
            }
        });
    </script>
</body>
</html>
