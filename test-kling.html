<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agnes — Vidéo 2s</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0d0d12;
      color: #eee;
      padding: 2rem 1rem;
      max-width: 700px;
      margin: 0 auto;
    }
    .card {
      background: #1a1a20;
      border: 1px solid #2a2a30;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    textarea {
      width: 100%;
      padding: 0.8rem;
      background: #0d0d12;
      border: 1px solid #333;
      border-radius: 10px;
      color: #eee;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    .btn {
      background: #7c3aed;
      border: none;
      color: #fff;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #6d28d9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .badge {
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge.ok { background: #22c55e20; border: 1px solid #22c55e; color: #22c55e; }
    .badge.err { background: #ef444420; border: 1px solid #ef4444; color: #ef4444; }
    .badge.pending { background: #f59e0b20; border: 1px solid #f59e0b; color: #f59e0b; }
    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid #333;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .flex { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .log-area {
      background: #0d0d12;
      border: 1px solid #2a2a30;
      border-radius: 10px;
      padding: 0.8rem;
      font-family: monospace;
      font-size: 0.8rem;
      max-height: 150px;
      overflow-y: auto;
      color: #aaa;
      margin-top: 1rem;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-area .success { color: #22c55e; }
    .log-area .error { color: #ef4444; }
    .log-area .info { color: #60a5fa; }
    #video-container {
      margin-top: 1rem;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #333;
    }
    #video-container video {
      width: 100%;
      max-height: 450px;
      display: block;
    }
    .placeholder {
      color: #555;
      padding: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>🎬 Agnes — Vidéo 2s</h1>

  <div class="card">
    <div class="flex">
      <span>🔌 Statut :</span>
      <span id="api-status" class="badge pending">Vérification...</span>
      <button class="btn" id="btn-ping" style="background:#2a2a32;">🔄 Ping</button>
    </div>
  </div>

  <div class="card">
    <label for="prompt" style="display:block;margin-bottom:0.5rem;font-weight:600;">📝 Prompt</label>
    <textarea id="prompt">un chat qui danse dans un jardin fleuri</textarea>
    <div style="margin-top:1rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
      <button class="btn" id="btn-generate">🎬 Générer</button>
      <span id="timer" style="color:#888;font-family:monospace;"></span>
      <span id="status-text" style="color:#f59e0b;"></span>
    </div>
  </div>

  <div class="card" style="border-color:#7c3aed40;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
      <span style="font-weight:600;">📺 Aperçu</span>
      <span id="video-info" style="font-size:0.8rem;color:#666;">En attente...</span>
    </div>
    <div id="video-container">
      <div class="placeholder">🎞️ Générez une vidéo</div>
    </div>
  </div>

  <div class="card">
    <div class="log-area" id="log-area">⏳ Prêt.</div>
  </div>

  <script>
    const API_BASE = '/api/gen-video';

    const promptEl = document.getElementById('prompt');
    const btnGen = document.getElementById('btn-generate');
    const btnPing = document.getElementById('btn-ping');
    const apiStatus = document.getElementById('api-status');
    const logArea = document.getElementById('log-area');
    const videoContainer = document.getElementById('video-container');
    const videoInfo = document.getElementById('video-info');
    const timerEl = document.getElementById('timer');
    const statusText = document.getElementById('status-text');

    function log(msg, type = 'info') {
      const cls = { success: 'success', error: 'error', info: 'info' } [type] || 'info';
      const line = document.createElement('div');
      line.innerHTML = `<span class="${cls}">${msg}</span>`;
      logArea.appendChild(line);
      logArea.scrollTop = logArea.scrollHeight;
    }

    function showVideo(url) {
      videoContainer.innerHTML = '';
      const video = document.createElement('video');
      video.src = url;
      video.controls = true;
      video.autoplay = true;
      video.style.width = '100%';
      video.style.maxHeight = '450px';
      video.onloadedmetadata = () => {
        videoInfo.textContent = `✅ ${Math.round(video.duration || 0)}s`;
      };
      video.onerror = () => {
        videoInfo.textContent = '❌ Erreur chargement';
        log('⚠️ La vidéo n\'a pas pu se charger', 'error');
      };
      videoContainer.appendChild(video);
      videoInfo.textContent = '⏳ Chargement...';
      log('🎥 Vidéo affichée', 'success');
    }

    function resetVideo() {
      videoContainer.innerHTML = `<div class="placeholder">🎞️ Générez une vidéo</div>`;
      videoInfo.textContent = 'En attente...';
    }

    async function pingAPI() {
      apiStatus.textContent = '⏳ ...';
      apiStatus.className = 'badge pending';
      try {
        const res = await fetch(API_BASE);
        const data = await res.json();
        if (data.ok && data.hasKey) {
          apiStatus.textContent = '✅ OK';
          apiStatus.className = 'badge ok';
          log('🔑 Clé Agnes active', 'success');
        } else {
          apiStatus.textContent = '⚠️ Clé manquante';
          apiStatus.className = 'badge err';
          log('❌ Clé Agnes non configurée', 'error');
        }
      } catch (e) {
        apiStatus.textContent = '❌ Erreur réseau';
        apiStatus.className = 'badge err';
        log('🚨 ' + e.message, 'error');
      }
    }

    async function generate() {
      const prompt = promptEl.value.trim();
      if (!prompt) { log('❌ Prompt requis.', 'error'); return; }

      btnGen.disabled = true;
      btnGen.innerHTML = '<span class="loader"></span> Soumission...';
      resetVideo();
      logArea.innerHTML = '';
      statusText.textContent = '⏳ En cours...';
      timerEl.textContent = '';

      const start = Date.now();
      const timerInterval = setInterval(() => {
        timerEl.textContent = ((Date.now() - start) / 1000).toFixed(1) + 's';
      }, 200);

      try {
        log(`📤 "${prompt}"`, 'info');

        // 1. Soumission
        const submitRes = await fetch(API_BASE, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, wait: false })
        });

        const submitData = await submitRes.json();
        if (!submitRes.ok) throw new Error(`Soumission ${submitRes.status}`);

        const taskId = submitData.taskId;
        if (!taskId) throw new Error('Aucun taskId');

        log(`✅ Tâche soumise (${taskId})`, 'success');
        btnGen.innerHTML = '<span class="loader"></span> Polling...';

        // 2. Polling limité à 30 tentatives (45s max)
        let videoUrl = null;
        let attempts = 0;
        const maxAttempts = 30; // 30 × 1.5s = 45s

        while (!videoUrl && attempts < maxAttempts) {
          attempts++;
          await new Promise(r => setTimeout(r, 1500));

          const statusRes = await fetch(`${API_BASE}?taskId=${taskId}`);
          const statusData = await statusRes.json();

          videoUrl = statusData.url || statusData.video_url || statusData.video?.url || null;

          if (statusData.status === 'completed' && videoUrl) {
            break;
          } else if (statusData.status === 'failed') {
            throw new Error('Échec génération');
          } else {
            const elapsed = ((Date.now() - start) / 1000).toFixed(0);
            log(`⏳ En cours... ${elapsed}s`, 'info');
          }
        }

        clearInterval(timerInterval);
        const elapsed = ((Date.now() - start) / 1000).toFixed(1);
        timerEl.textContent = elapsed + 's';

        if (!videoUrl) {
          // Si on a dépassé le timeout
          if (attempts >= maxAttempts) {
            throw new Error(`⏱️ Agnes trop lent (${elapsed}s). Réessayez dans quelques minutes.`);
          } else {
            throw new Error(`Timeout (${elapsed}s)`);
          }
        }

        // ✅ Succès
        log(`✅ Générée en ${elapsed}s (Agnes)`, 'success');
        statusText.textContent = '✅ Terminé';
        showVideo(videoUrl);

      } catch (err) {
        clearInterval(timerInterval);
        log(`❌ ${err.message}`, 'error');
        statusText.textContent = '❌ Échec';
      } finally {
        btnGen.disabled = false;
        btnGen.innerHTML = '🎬 Générer';
      }
    }

    btnPing.addEventListener('click', pingAPI);
    btnGen.addEventListener('click', generate);
    promptEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generate();
    });

    pingAPI();
    log('👋 Ctrl+Enter pour générer. Vidéo de 2s.', 'info');
  </script>

</body>
</html>
