<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Kling AI - Diagnostic</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f12;
      color: #fff;
      padding: 2rem;
      max-width: 700px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .card {
      background: #1a1a1e;
      border: 1px solid #2a2a2e;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
    textarea {
      width: 100%;
      padding: 0.8rem;
      border-radius: 8px;
      background: #0f0f12;
      border: 1px solid #333;
      color: #fff;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
    }
    .btn {
      background: #7c3aed;
      border: none;
      color: #fff;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-right: 0.5rem;
    }
    .btn:hover { background: #6d28d9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      padding: 0.8rem;
      border-radius: 8px;
      margin-top: 1rem;
      background: #1a1a1e;
      border-left: 4px solid #555;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
    }
    .status.success { border-left-color: #22c55e; }
    .status.error { border-left-color: #ef4444; }
    .status.info { border-left-color: #3b82f6; }
    video {
      width: 100%;
      max-height: 400px;
      border-radius: 8px;
      margin-top: 1rem;
      background: #000;
    }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #333;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .flex { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .badge {
      background: #2a2a2e;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      color: #aaa;
    }
    .badge.ok { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e; }
    .badge.err { background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }
  </style>
</head>
<body>

<h1>🧪 Test Kling AI</h1>

<div class="card">
  <div class="flex">
    <span>🔌 Statut API :</span>
    <span id="api-status" class="badge err">❌ Vérification...</span>
    <span id="api-msg" style="font-size:0.8rem;color:#888;"></span>
  </div>
</div>

<div class="card">
  <label for="prompt">📝 Prompt</label>
  <textarea id="prompt" placeholder="Ex: un chien qui court dans un champ">un chat qui danse</textarea>
  <div style="margin-top:0.8rem;display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;">
    <button class="btn" id="btn-generate">🎬 Générer</button>
    <button class="btn" style="background:#333;" id="btn-ping">🔄 Ping</button>
    <label style="font-weight:400;font-size:0.9rem;">
      <input type="checkbox" id="chk-premium"> Mode Premium (2 crédits)
    </label>
  </div>
</div>

<div id="result" class="card hidden">
  <div id="status-message" class="status info">⏳ En attente...</div>
  <div id="video-container"></div>
</div>

<script>
  const API_BASE = '/api/gen-video';

  // Éléments
  const promptEl = document.getElementById('prompt');
  const btnGen = document.getElementById('btn-generate');
  const btnPing = document.getElementById('btn-ping');
  const chkPremium = document.getElementById('chk-premium');
  const resultCard = document.getElementById('result');
  const statusMsg = document.getElementById('status-message');
  const videoContainer = document.getElementById('video-container');
  const apiStatus = document.getElementById('api-status');
  const apiMsg = document.getElementById('api-msg');

  // --- Ping initial ---
  async function checkAPI() {
    try {
      const res = await fetch(API_BASE);
      const data = await res.json();
      if (data.ok && data.hasKey) {
        apiStatus.textContent = '✅ OK';
        apiStatus.className = 'badge ok';
        apiMsg.textContent = 'Clé présente';
      } else {
        apiStatus.textContent = '⚠️ Problème';
        apiStatus.className = 'badge err';
        apiMsg.textContent = data.error || 'Clé manquante';
      }
    } catch (e) {
      apiStatus.textContent = '❌ Erreur';
      apiStatus.className = 'badge err';
      apiMsg.textContent = e.message;
    }
  }
  checkAPI();

  // --- Ping manuel ---
  btnPing.addEventListener('click', checkAPI);

  // --- Génération ---
  btnGen.addEventListener('click', async () => {
    const prompt = promptEl.value.trim() || 'un chat qui danse';
    const premium = chkPremium.checked;
    const quality = premium ? 'premium' : 'fast';

    // UI
    btnGen.disabled = true;
    btnGen.innerHTML = '<span class="loader"></span>Génération...';
    resultCard.classList.remove('hidden');
    statusMsg.className = 'status info';
    statusMsg.textContent = '⏳ Soumission en cours...';
    videoContainer.innerHTML = '';

    try {
      const start = Date.now();
      const res = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, quality })
      });

      const elapsed = ((Date.now() - start) / 1000).toFixed(1);
      const data = await res.json();

      if (!res.ok) {
        statusMsg.className = 'status error';
        statusMsg.textContent = `❌ Erreur ${res.status} (${elapsed}s) :\n${JSON.stringify(data, null, 2)}`;
        return;
      }

      // Succès
      statusMsg.className = 'status success';
      statusMsg.textContent = `✅ Générée en ${elapsed}s\nModèle: ${data.model || 'kling'}\nPrompt utilisé: ${data.prompt_used || prompt}`;

      if (data.url) {
        const video = document.createElement('video');
        video.src = data.url;
        video.controls = true;
        video.autoplay = true;
        video.style.width = '100%';
        video.style.maxHeight = '400px';
        videoContainer.appendChild(video);
      } else {
        statusMsg.textContent += '\n⚠️ Aucune URL vidéo reçue';
        statusMsg.className = 'status error';
      }

    } catch (err) {
      statusMsg.className = 'status error';
      statusMsg.textContent = `❌ Erreur réseau: ${err.message}`;
    } finally {
      btnGen.disabled = false;
      btnGen.innerHTML = '🎬 Générer';
    }
  });
</script>

</body>
</html>
