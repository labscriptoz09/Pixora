<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Agnes AI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d12;
      color: #eee;
      padding: 2rem 1rem;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .sub {
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .card {
      background: #1a1a20;
      border: 1px solid #2a2a30;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .badge {
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      background: #333;
      color: #aaa;
    }
    .badge.ok {
      background: #22c55e20;
      border: 1px solid #22c55e;
      color: #22c55e;
    }
    .badge.err {
      background: #ef444420;
      border: 1px solid #ef4444;
      color: #ef4444;
    }
    .badge.pending {
      background: #f59e0b20;
      border: 1px solid #f59e0b;
      color: #f59e0b;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #ccc;
    }
    textarea {
      width: 100%;
      padding: 0.8rem;
      background: #0d0d12;
      border: 1px solid #333;
      border-radius: 10px;
      color: #eee;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    textarea:focus {
      outline: none;
      border-color: #7c3aed;
    }
    .actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      background: #7c3aed;
      border: none;
      color: #fff;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn:hover { background: #6d28d9; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: #2a2a32;
    }
    .btn-secondary:hover {
      background: #3a3a44;
    }
    .log-area {
      background: #0d0d12;
      border: 1px solid #2a2a30;
      border-radius: 10px;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 1rem;
      color: #aaa;
    }
    .log-area .success { color: #22c55e; }
    .log-area .error { color: #ef4444; }
    .log-area .info { color: #60a5fa; }
    .log-area .warn { color: #f59e0b; }
    .log-area .bold { font-weight: 700; color: #eee; }

    video {
      width: 100%;
      max-height: 400px;
      border-radius: 12px;
      background: #000;
      margin-top: 1rem;
    }
    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid #333;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .flex { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }

    /* Mode sombre */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a20; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body>

<h1>🧪 Agnes AI — Test</h1>
<p class="sub">Génération de vidéo via Agnes API (gratuit).</p>

<!-- Statut API -->
<div class="card">
  <div class="status-bar">
    <span>🔌 Statut API :</span>
    <span id="api-status" class="badge pending">⏳ Vérification...</span>
    <span id="api-detail" style="color:#888;font-size:0.85rem;"></span>
    <button class="btn btn-secondary" id="btn-ping" style="padding:0.3rem 1rem;font-size:0.8rem;">🔄 Ping</button>
  </div>
</div>

<!-- Prompt + Génération -->
<div class="card">
  <label for="prompt">📝 Prompt</label>
  <textarea id="prompt" placeholder="Décrivez la vidéo souhaitée...">un chat qui danse dans un jardin fleuri</textarea>

  <div class="actions">
    <button class="btn" id="btn-generate">🎬 Générer</button>
    <span id="timer" style="color:#888;font-size:0.85rem;font-family:monospace;"></span>
    <span id="status-text" style="color:#f59e0b;font-size:0.85rem;"></span>
  </div>
</div>

<!-- Résultat / Logs -->
<div class="card" id="result-card">
  <div class="log-area" id="log-area">⏳ En attente d'action...</div>
  <div id="video-container"></div>
</div>

<script>
  const API_BASE = '/api/gen-video';

  // DOM refs
  const promptEl = document.getElementById('prompt');
  const btnGen = document.getElementById('btn-generate');
  const btnPing = document.getElementById('btn-ping');
  const apiStatus = document.getElementById('api-status');
  const apiDetail = document.getElementById('api-detail');
  const logArea = document.getElementById('log-area');
  const videoContainer = document.getElementById('video-container');
  const timerEl = document.getElementById('timer');
  const statusText = document.getElementById('status-text');

  // ========== LOGGER ==========
  function log(message, type = 'info') {
    const colors = {
      success: 'success',
      error: 'error',
      info: 'info',
      warn: 'warn',
      bold: 'bold'
    };
    const cls = colors[type] || 'info';
    const line = document.createElement('div');
    line.innerHTML = `<span class="${cls}">${message}</span>`;
    logArea.appendChild(line);
    logArea.scrollTop = logArea.scrollHeight;
  }

  function clearLog() {
    logArea.innerHTML = '';
  }

  // ========== PING ==========
  async function pingAPI() {
    apiStatus.textContent = '⏳ Vérification...';
    apiStatus.className = 'badge pending';
    apiDetail.textContent = '';

    try {
      const res = await fetch(API_BASE);
      const data = await res.json();

      if (data.ok && data.hasKey) {
        apiStatus.textContent = '✅ OK';
        apiStatus.className = 'badge ok';
        apiDetail.textContent = `Clé Agnes configurée (${data.keyLength || '?'} caractères)`;
      } else {
        apiStatus.textContent = '⚠️ Problème';
        apiStatus.className = 'badge err';
        apiDetail.textContent = data.error || 'Clé manquante ou invalide';
      }
    } catch (err) {
      apiStatus.textContent = '❌ Erreur';
      apiStatus.className = 'badge err';
      apiDetail.textContent = err.message;
    }
  }

  // ========== GÉNÉRATION ==========
  async function generateVideo() {
    const prompt = promptEl.value.trim();
    if (!prompt) {
      log('❌ Veuillez entrer un prompt.', 'error');
      return;
    }

    // Désactiver le bouton
    btnGen.disabled = true;
    btnGen.innerHTML = '<span class="loader"></span> Génération...';
    clearLog();
    videoContainer.innerHTML = '';
    statusText.textContent = '⏳ En cours...';
    timerEl.textContent = '';

    const startTime = Date.now();
    let timerInterval = setInterval(() => {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      timerEl.textContent = `${elapsed}s`;
    }, 100);

    try {
      log(`📤 Envoi du prompt : "${prompt}"`, 'info');

      const res = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });

      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      clearInterval(timerInterval);
      timerEl.textContent = `${elapsed}s`;

      const data = await res.json();

      if (!res.ok) {
        log(`❌ Erreur ${res.status} (${elapsed}s) :`, 'error');
        log(JSON.stringify(data, null, 2), 'error');
        statusText.textContent = '❌ Échec';
        return;
      }

      // Succès
      log(`✅ Vidéo générée en ${elapsed}s`, 'success');
      log(`📦 Provider : ${data.provider || 'agnes-ai'}`, 'info');
      log(`📝 Prompt utilisé : ${data.prompt_used || prompt}`, 'info');
      if (data.task_id) log(`🆔 Task ID : ${data.task_id}`, 'info');

      statusText.textContent = '✅ Terminé';

      // Afficher la vidéo
      if (data.url) {
        const video = document.createElement('video');
        video.src = data.url;
        video.controls = true;
        video.autoplay = true;
        video.style.width = '100%';
        video.style.maxHeight = '400px';
        videoContainer.appendChild(video);
        log(`🎥 Vidéo disponible : ${data.url}`, 'success');
      } else {
        log('⚠️ Aucune URL vidéo reçue', 'warn');
      }

    } catch (err) {
      clearInterval(timerInterval);
      log(`❌ Erreur réseau : ${err.message}`, 'error');
      statusText.textContent = '❌ Échec';
    } finally {
      btnGen.disabled = false;
      btnGen.innerHTML = '🎬 Générer';
    }
  }

  // ========== ÉVÉNEMENTS ==========
  btnPing.addEventListener('click', pingAPI);
  btnGen.addEventListener('click', generateVideo);

  // Enter dans le textarea pour lancer la génération (Ctrl+Enter)
  promptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      generateVideo();
    }
  });

  // ========== INIT ==========
  pingAPI();
  log('👋 Prêt. Entrez un prompt et cliquez sur "Générer" (ou Ctrl+Enter).', 'info');
</script>

</body>
</html>
