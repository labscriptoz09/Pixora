<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixora - Galerie Publique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{
            --bg:#050507;
            --surf:rgba(24,24,27,0.6);
            --elev:rgba(39,39,42,0.8);
            --border:rgba(63,63,70,0.5);
            --prim:#8B5CF6;
            --text:#FAFAFA;
            --muted:#A1A1AA;
            --hdr:rgba(20,20,23,0.85);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;line-height:1.5;min-height:100dvh;overflow-x:hidden}
        .site-header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--hdr);padding:0 1rem;height:60px;display:flex;align-items:center;justify-content:space-between}
        .header-logo{display:flex;align-items:center;gap:0.5rem;color:var(--text)}
        .header-logo svg{width:28px;height:28px}
        .logo-text{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#fff 20%,var(--prim) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-right{display:flex;align-items:center;gap:0.7rem}
        .user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--prim),var(--sec));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:white;cursor:pointer}
        .user-menu{position:absolute;top:calc(100% + 10px);right:0;width:260px;background:var(--elev);border:1px solid var(--border);border-radius:16px;padding:0.6rem;box-shadow:0 10px 30px rgba(0,0,0,0.5);opacity:0;visibility:hidden;transform:translateY(-10px);transition:all 0.3s}
        .user-menu.show{opacity:1;visibility:visible;transform:translateY(0)}
        .menu-item{display:block;padding:0.6rem;color:var(--text);font-size:0.85rem;text-decoration:none}
        .menu-item:hover{background:rgba(139,92,246,0.1)}

        .main-content{max-width:800px;margin:0 auto;padding:1rem;padding-top:72px}
        .page-title{font-size:1.5rem;font-weight:800;margin-bottom:0.5rem}
        .results-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.6rem;margin-top:1rem}
        .result-card{aspect-ratio:1;background:var(--surf);border:1px solid var(--border);border-radius:12px;overflow:hidden}
        .result-card img{width:100%;height:100%;object-fit:cover;display:block}
    </style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
    <a href="index.html" class="header-logo">
        <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#hg)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/><path d="M16 2L4 10L16 14L16 2Z" fill="rgba(255,255,255,0.2)"/></svg>
        <span class="logo-text">Pixora</span>
    </a>
    <div class="header-right">
        <div class="user-avatar" onclick="document.getElementById('menu').classList.toggle('show')">
            U
        </div>
        <div class="user-menu" id="menu">
            <div class="menu-item">👤 Utilisateur</div>
            <div class="menu-item">⭐ Points: 150</div>
            <div class="menu-item">🖼️ Galerie</div>
            <div class="menu-item">🛒 Boutique</div>
            <div class="menu-item" style="color:#EF4444">🚪 Déconnexion</div>
        </div>
    </div>
</header>

<!-- MAIN -->
<main class="main-content">
    <h1 class="page-title">Galerie Publique</h1>
    
    <div class="results-grid">
        <!-- IMAGE EXEMPLE -->
        <div class="result-card">
            <img src="https://picsum.photos/400/400?random=1" alt="Exemple">
        </div>
        <div class="result-card">
            <img src="https://picsum.photos/400/400?random=2" alt="Exemple">
        </div>
        <div class="result-card">
            <img src="https://picsum.photos/400/400?random=3" alt="Exemple">
        </div>
        <div class="result-card">
            <img src="https://picsum.photos/400/400?random=4" alt="Exemple">
        </div>
    </div>
</main>

<script>
    // Test simple : si ça s'affiche, c'est que le problème vient de Supabase
    console.log("✅ Galerie chargée — avatar et images visibles");
</script>
</body>
</html>
