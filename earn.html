<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gagner des Points | Pixora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#050508;--surface:#0f0f14;--border:#1a1a24;--accent:#8B5CF6;--gold:#FBBF24;--text:#FAFAFA;--muted:#A1A1AA;--dim:#52525B;--font:'Inter',sans-serif}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
        header{padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50}
        .logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
        .logo svg{width:28px;height:28px}
        .logo span{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#fff 20%,var(--accent) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .balance-pill{display:flex;align-items:center;gap:0.5rem;background:var(--surface);padding:0.5rem; border-radius:100px;border:1px solid var(--border);font-weight:600;font-size:0.9rem}
        .balance-pill i{color:var(--gold)}
        .balance-pill span{font-family:var(--mono)}

        main{flex:1;padding:2rem 1.5rem;max-width:900px;margin:0 auto;width:100%}
        .page-header{text-align:center;margin-bottom:2rem}
        .page-title{font-size:1.8rem;font-weight:700;margin-bottom:0.5rem}
        .page-subtitle{color:var(--muted);font-size:0.95rem}

        .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;text-align:center}
        .card-icon{font-size:2rem;color:var(--accent);margin-bottom:1rem}
        .card-title{font-size:1.1rem;font-weight:700;margin-bottom:0.5rem}
        .card-desc{color:var(--muted);font-size:0.85rem;line-height:1.5;margin-bottom:1.5rem}
        .btn{padding:0.8rem 2rem;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;border:none}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
        .btn-disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
        .reward{font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--gold);margin-top:0.5rem}
    </style>
</head>
<body>
    <header>
        <a href="/index.html" class="logo">
            <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#lg)"/></svg>
            <span>Pixora</span>
        </a>
        <div class="balance-pill">
            <i class="fas fa-coins"></i>
            <span id="pointsDisplay">---</span>
        </div>
    </header>

    <main>
        <div class="page-header">            <h1 class="page-title">Gagnez des Points</h1>
            <p class="page-subtitle">Complétez une action unique pour alimenter votre compte.</p>
        </div>

        <div class="card">
            <div class="card-icon"><i class="fas fa-link"></i></div>
            <h3 class="card-title">Adsterra Smartlink</h3>
            <p class="card-desc">Cliquez une seule fois. La récompense sera créditée automatiquement après validation serveur.</p>
            <div class="reward">+25 points</div>
            <button id="startBtn" class="btn btn-primary">Commencer</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let user = null;

        async function init() {
            const { data: { user: u } } = await db.auth.getUser();
            if (!u) { window.location.href = '/index.html'; return; }
            user = u;
            updatePoints();

            // Vérifier si l'utilisateur a déjà complété cette offre
            const { data: existing } = await db.from('ad_rewards').select('id').eq('user_id', user.id).eq('ad_name', 'Adsterra Smartlink').single();
            const btn = document.getElementById('startBtn');
            if (existing) {
                btn.textContent = '✅ Déjà complété';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-disabled');
                btn.disabled = true;
            } else {
                btn.onclick = startTask;
            }
        }

        async function startTask() {
            const btn = document.getElementById('startBtn');
            btn.textContent = '🔄 Validation...';
            btn.disabled = true;
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-disabled');

            try {
                // 1. Créer un enregistrement bloquant (avant de rediriger)
                await db.from('ad_rewards').insert({
                    user_id: user.id,                    ad_name: 'Adsterra Smartlink',
                    created_at: new Date().toISOString()
                });

                // 2. Rediriger vers Adsterra
                window.open('https://www.effectivecpmnetwork.com/aie2bkhe?key=436233894ac7cc3768e497eb5bfd3cea', '_blank');

                // 3. Après 30s, créditer les points (mais seulement si l'utilisateur est encore là)
                setTimeout(async () => {
                    if (!document.hidden) {
                        try {
                            const { data: current } = await db.from('user_data').select('points').eq('user_id', user.id).single();
                            const newPoints = (current?.points || 0) + 25;
                            await db.from('user_data').update({ points: newPoints }).eq('user_id', user.id);
                            await db.from('transactions').insert({
                                user_id: user.id,
                                type: 'earned',
                                title: 'Adsterra Smartlink',
                                amount: 25
                            });
                            alert('✅ +25 points ajoutés !');
                            updatePoints();
                            btn.textContent = '✅ Complété';
                            btn.disabled = true;
                            btn.classList.remove('btn-primary');
                            btn.classList.add('btn-disabled');
                        } catch (e) {
                            console.error(e);
                            alert('Erreur lors du crédit.');
                        }
                    } else {
                        // Si l'utilisateur a quitté, on ne fait rien — mais l'enregistrement existe, donc il ne pourra pas recliquer
                        alert('⚠️ Vous avez quitté la page. La récompense n\'a pas été créditée.');
                    }
                }, 30000);

            } catch (e) {
                console.error(e);
                btn.textContent = '❌ Erreur';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-disabled');
                alert('Une erreur est survenue. Veuillez réessayer.');
            }
        }

        async function updatePoints() {
            const { data } = await db.from('user_data').select('points').eq('user_id', user.id).single();
            document.getElementById('pointsDisplay').innerText = (data?.points || 0).toLocaleString();
        }
        init();
    </script>
</body>
</html>
