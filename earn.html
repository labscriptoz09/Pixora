<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gagner des Points | Pixora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#050508;--surface:#0f0f14;--border:#1a1a24;--accent:#8B5CF6;--accent2:#EC4899;--gold:#FBBF24;--text:#FAFAFA;--muted:#A1A1AA;--dim:#52525B;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
        header{padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50}
        .logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
        .logo svg{width:28px;height:28px}
        .logo span{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#fff 20%,var(--accent) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .balance-pill{display:flex;align-items:center;gap:0.5rem;background:var(--surface);padding:0.5rem 1rem;border-radius:100px;border:1px solid var(--border);font-weight:600;font-size:0.9rem}
        .balance-pill i{color:var(--gold)}
        .balance-pill span{font-family:var(--mono)}
        main{flex:1;padding:2rem 1.5rem;max-width:900px;margin:0 auto;width:100%}
        .page-header{text-align:center;margin-bottom:2.5rem}
        .page-title{font-size:2rem;font-weight:700;margin-bottom:0.5rem}
        .page-subtitle{color:var(--muted);font-size:1rem}
        .earn-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.5rem}
        .earn-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;position:relative;overflow:hidden;transition:all 0.3s}
        .earn-card.completed{opacity:0.7}
        .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
        .card-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,rgba(139,92,246,0.2),rgba(236,72,153,0.2));display:flex;align-items:center;justify-content:center;font-size:1.8rem}
        .card-badge{font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--gold);background:rgba(251,191,36,0.1);padding:0.5rem 1rem;border-radius:8px}
        .card-title{font-size:1.2rem;font-weight:700;margin-bottom:0.5rem}
        .card-desc{color:var(--muted);font-size:0.9rem;line-height:1.6;margin-bottom:1.5rem}
        .ad-container{margin:1rem 0;padding:1rem;background:var(--bg);border-radius:10px;min-height:250px;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .timer{font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--gold);text-align:center;margin:1rem 0}
        .btn{width:100%;padding:1rem;border-radius:12px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;border:none;display:flex;align-items:center;justify-content:center;gap:0.5rem}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(139,92,246,0.3)}
        .btn-disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
        .empty-state{text-align:center;padding:3rem;color:var(--dim);grid-column:1/-1}
        .empty-state i{font-size:3rem;margin-bottom:1rem;opacity:0.3}
        @media(max-width:768px){.earn-grid{grid-template-columns:1fr}.page-title{font-size:1.5rem}}
    </style>
</head>
<body>
    <header>
        <a href="/index.html" class="logo">
            <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#lg)"/></svg>
            <span>Pixora</span>
        </a>
        <div class="balance-pill">            <i class="fas fa-coins"></i>
            <span id="pointsDisplay">---</span>
        </div>
    </header>

    <main>
        <div class="page-header">
            <h1 class="page-title">Gagnez des Points</h1>
            <p class="page-subtitle">Complétez des actions pour alimenter votre compte. Chaque action est unique.</p>
        </div>

        <div class="earn-grid" id="adsContainer">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Chargement des offres...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let user = null;
        let adsData = [];

        const AD_CONFIG = {
            video: { icon: '🎬', label: 'Regarder une vidéo', desc: 'Regardez une vidéo de 30 secondes' },
            smartlink: { icon: '🔗', label: 'Smartlink', desc: 'Visitez un partenaire via notre lien' },
            banner: { icon: '🖼️', label: 'Bannière 300x250', desc: 'Affichez une publicité pendant 30 secondes' },
            native: { icon: '', label: 'Contenu sponsorisé', desc: 'Lisez un article sponsorisé' },
            social_bar: { icon: '🔔', label: 'Notification', desc: 'Activez les notifications' },
            popunder: { icon: '', label: 'Popunder', desc: 'Ouvrez une fenêtre publicitaire' }
        };

        async function init() {
            const { data: { user: u }, error } = await db.auth.getUser();
            if (error || !u) { window.location.href = '/index.html'; return; }
            user = u;
            await updatePoints();
            await loadAds();
        }

        async function loadAds() {
            const container = document.getElementById('adsContainer');
            
            try {
                const { data: configData } = await db
                    .from('admin_config')                    .select('value')
                    .eq('key', 'ad_networks')
                    .single();

                adsData = configData?.value || [];
                const activeAds = adsData.filter(ad => ad.active);

                if (activeAds.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>Aucune offre disponible pour le moment</p>
                            <p style="font-size:0.85rem;margin-top:0.5rem">Revenez plus tard !</p>
                        </div>
                    `;
                    return;
                }

                const { data: completedData } = await db
                    .from('ad_clicks')
                    .select('ad_name')
                    .eq('user_id', user.id)
                    .eq('status', 'paid');

                const completedNames = new Set(completedData?.map(c => c.ad_name) || []);

                container.innerHTML = activeAds.map((ad, index) => {
                    const config = AD_CONFIG[ad.type] || AD_CONFIG.smartlink;
                    const isCompleted = completedNames.has(ad.name);
                    const actualIndex = adsData.findIndex(a => a.name === ad.name);
                    
                    return `
                        <div class="earn-card ${isCompleted ? 'completed' : ''}" id="card-${ad.name.replace(/\s/g,'')}">
                            <div class="card-header">
                                <div class="card-icon">${config.icon}</div>
                                <div class="card-badge">+${ad.points}</div>
                            </div>
                            <h3 class="card-title">${ad.name}</h3>
                            <p class="card-desc">${config.desc}</p>
                            
                            ${isCompleted ? `
                                <div style="background:rgba(16,185,129,0.1);padding:1rem;border-radius:10px;margin:1rem 0;text-align:center">
                                    <i class="fas fa-check-circle" style="color:var(--success);font-size:1.5rem"></i>
                                    <p style="margin-top:0.5rem;font-weight:600">Déjà complété</p>
                                </div>
                                <button class="btn btn-disabled" disabled>
                                    <i class="fas fa-check"></i> Terminé
                                </button>
                            ` : `
                                <button class="btn btn-primary" onclick="startTask(${actualIndex})">                                    <i class="fas fa-play"></i> Commencer
                                </button>
                            `}
                        </div>
                    `;
                }).join('');

            } catch (e) {
                console.error('Load ads error:', e);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i>
                        <p style="color:var(--danger)">Erreur de chargement</p>
                    </div>
                `;
            }
        }

        function loadAdScript(container, htmlCode) {
            // Parser le HTML pour extraire scripts et autres éléments
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlCode, 'text/html');
            
            // D'abord, extraire et exécuter les scripts inline (comme atOptions)
            const inlineScripts = doc.querySelectorAll('script:not([src])');
            inlineScripts.forEach(script => {
                const newScript = document.createElement('script');
                newScript.textContent = script.textContent;
                container.appendChild(newScript);
            });
            
            // Ensuite, insérer les divs/containers
            const elements = Array.from(doc.body.childNodes).filter(node => 
                node.nodeType === Node.ELEMENT_NODE && node.tagName !== 'SCRIPT'
            );
            elements.forEach(el => {
                container.appendChild(el.cloneNode(true));
            });
            
            // Enfin, charger les scripts externes
            const externalScripts = doc.querySelectorAll('script[src]');
            externalScripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                newScript.async = oldScript.async;
                
                // Copier tous les attributs
                Array.from(oldScript.attributes).forEach(attr => {
                    newScript.setAttribute(attr.name, attr.value);
                });
                                container.appendChild(newScript);
            });
        }

        async function startTask(adIndex) {
            const ad = adsData[adIndex];
            const card = document.getElementById(`card-${ad.name.replace(/\s/g,'')}`);
            const btn = card.querySelector('.btn');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Traitement...';
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-disabled');

            const hasCode = ad.code && ad.code.length > 0;

            // Créer un conteneur pour la pub
            const adContainer = document.createElement('div');
            adContainer.className = 'ad-container';
            adContainer.id = `ad-${ad.name.replace(/\s/g,'')}`;
            
            if (hasCode) {
                // Charger le code HTML avec les scripts dans le bon ordre
                loadAdScript(adContainer, ad.code);
            } else {
                adContainer.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">Chargement...</p>';
            }
            
            card.insertBefore(adContainer, btn);

            // Timer de 30 secondes
            let seconds = 30;
            const timerDiv = document.createElement('div');
            timerDiv.className = 'timer';
            timerDiv.innerHTML = `️ ${seconds}s restantes`;
            card.insertBefore(timerDiv, adContainer);

            const timer = setInterval(() => {
                seconds--;
                timerDiv.innerHTML = `⏱️ ${seconds}s restantes`;
                
                if (seconds <= 0) {
                    clearInterval(timer);
                }
            }, 1000);

            try {
                const token = 'tok_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9);

                const { data: userData } = await db                    .from('user_data')
                    .select('points')
                    .eq('user_id', user.id)
                    .single();

                const newPoints = (userData?.points || 0) + ad.points;

                await Promise.all([
                    db.from('user_data').update({ points: newPoints }).eq('user_id', user.id),
                    db.from('transactions').insert({
                        user_id: user.id,
                        type: 'earned',
                        title: ad.name,
                        amount: ad.points
                    }),
                    db.from('ad_clicks').insert({
                        user_id: user.id,
                        ad_name: ad.name,
                        token: token,
                        status: 'paid'
                    })
                ]);

                document.getElementById('pointsDisplay').innerText = newPoints.toLocaleString();
                
                setTimeout(async () => {
                    timerDiv.innerHTML = '✅ Terminé !';
                    timerDiv.style.color = 'var(--success)';
                    
                    if (!hasCode && ad.link) {
                        setTimeout(() => { window.open(ad.link, '_blank'); }, 1000);
                    }
                    
                    await loadAds();
                }, 30000);

            } catch (e) {
                console.error('Error:', e);
                alert('Erreur: ' + e.message);
                await loadAds();
            }
        }

        async function updatePoints() {
            const { data } = await db.from('user_data').select('points').eq('user_id', user.id).single();
            document.getElementById('pointsDisplay').innerText = (data?.points || 0).toLocaleString();
        }

        init();
    </script></body>
</html>
