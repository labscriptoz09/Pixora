<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gagner des Points | Pixora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#050508;--surface:#0f0f14;--border:#1a1a24;--accent:#8B5CF6;--accent2:#EC4899;--gold:#FBBF24;--text:#FAFAFA;--muted:#A1A1AA;--dim:#52525B;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
        header{padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50}
        .logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
        .logo svg{width:28px;height:28px}
        .logo span{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#fff 20%,var(--accent) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .balance-pill{display:flex;align-items:center;gap:0.5rem;background:var(--surface);padding:0.5rem 1rem;border-radius:100px;border:1px solid var(--border);font-weight:600;font-size:0.9rem}
        .balance-pill i{color:var(--gold)}
        .balance-pill span{font-family:var(--mono)}
        main{flex:1;padding:2rem 1.5rem;max-width:900px;margin:0 auto;width:100%}
        .page-header{text-align:center;margin-bottom:2rem}
        .page-title{font-size:1.8rem;font-weight:700;margin-bottom:0.5rem}
        .page-subtitle{color:var(--muted);font-size:0.95rem}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;text-align:center}
        .card-icon{font-size:2.5rem;color:var(--accent);margin-bottom:1.2rem}
        .card-title{font-size:1.3rem;font-weight:700;margin-bottom:0.6rem}
        .card-desc{color:var(--muted);font-size:0.9rem;line-height:1.5;margin-bottom:1.5rem}
        .reward{font-family:var(--mono);font-size:1.6rem;font-weight:700;color:var(--gold);margin:1rem 0}
        .btn{padding:0.9rem 2.2rem;border-radius:12px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;border:none}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
        .btn-disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
        .status{margin-top:1rem;font-size:0.85rem;color:var(--muted);word-break:break-all}
        .error-box{background:rgba(239,68,68,0.1);border:1px solid var(--danger);border-radius:8px;padding:1rem;margin-top:1rem;font-size:0.8rem;color:#fca5a5}
    </style>
</head>
<body>
    <header>
        <a href="/index.html" class="logo">
            <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#lg)"/></svg>
            <span>Pixora</span>
        </a>
        <div class="balance-pill">
            <i class="fas fa-coins"></i>
            <span id="pointsDisplay">---</span>
        </div>
    </header>

    <main>
        <div class="page-header">            <h1 class="page-title">Gagnez des Points</h1>
            <p class="page-subtitle">Complétez une action unique pour alimenter votre compte.</p>
        </div>

        <div class="card">
            <div class="card-icon"><i class="fas fa-link"></i></div>
            <h3 class="card-title">Adsterra Smartlink</h3>
            <p class="card-desc">Cliquez une seule fois. La récompense sera créditée automatiquement après validation serveur.</p>
            <div class="reward">+25 points</div>
            <button id="btn" class="btn btn-primary">Commencer</button>
            <div class="status" id="status"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let user = null;
        let btn = document.getElementById('btn');
        let status = document.getElementById('status');

        function generateToken() {
            return 'tok_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9);
        }

        async function init() {
            try {
                console.log('1. Initialisation...');
                status.textContent = 'Connexion...';
                
                const { data: { user: u }, error } = await db.auth.getUser();
                if (error || !u) { 
                    console.error('Auth error:', error);
                    window.location.href = '/index.html'; 
                    return; 
                }
                user = u;
                console.log('User connecté:', user.id);
                
                await updatePoints();
                await checkIfAlreadyCompleted();
            } catch (e) {
                console.error('Init error:', e);
                status.textContent = 'Erreur init: ' + e.message;
            }
        }

        async function checkIfAlreadyCompleted() {            try {
                console.log('2. Vérification complétion...');
                const { data, error } = await db
                    .from('ad_clicks')
                    .select('status')
                    .eq('user_id', user.id)
                    .eq('status', 'paid')
                    .limit(1);
                
                if (error) {
                    console.error('Check error:', error);
                    throw error;
                }
                
                console.log('Résultat check:', data);
                
                if (data && data.length > 0) {
                    btn.textContent = '✅ Déjà complété';
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-disabled');
                    btn.disabled = true;
                    status.textContent = 'Vous avez déjà reçu votre récompense.';
                } else {
                    btn.onclick = startTask;
                    console.log('3. Bouton activé');
                }
            } catch (e) {
                console.error('Check failed:', e);
                btn.onclick = startTask;
            }
        }

        async function startTask() {
            console.log('4. Démarrage tâche...');
            btn.disabled = true;
            btn.textContent = '🔄 Préparation...';
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-disabled');
            status.textContent = 'Création du token...';

            try {
                const token = generateToken();
                console.log('Token généré:', token);

                console.log('5. Insertion dans ad_clicks...');
                status.textContent = 'Enregistrement...';
                
                const { data, error } = await db
                    .from('ad_clicks')
                    .insert({                        user_id: user.id,
                        token: token,
                        status: 'pending'
                    })
                    .select();

                if (error) {
                    console.error('Insert error:', error);
                    throw new Error('Erreur insertion: ' + error.message);
                }

                console.log('Insertion réussie:', data);

                const adsterraLink = `https://www.effectivecpmnetwork.com/aie2bkhe?key=436233894ac7cc3768e497eb5bfd3cea&click_id=${token}`;
                
                console.log('6. Redirection vers:', adsterraLink);
                status.textContent = 'Redirection dans 2 secondes...';
                
                setTimeout(() => {
                    window.location.href = adsterraLink;
                }, 2000);

            } catch (e) {
                console.error('Start error COMPLETE:', e);
                btn.textContent = ' Erreur';
                status.innerHTML = `
                    <div class="error-box">
                        <strong>Erreur:</strong><br>
                        ${e.message}<br><br>
                        <small>Détails: ${JSON.stringify(e)}</small>
                    </div>
                `;
                btn.disabled = false;
                btn.classList.remove('btn-disabled');
                btn.classList.add('btn-primary');
            }
        }

        async function updatePoints() {
            try {
                const { data, error } = await db
                    .from('user_data')
                    .select('points')
                    .eq('user_id', user.id)
                    .single();
                
                if (error) throw error;
                document.getElementById('pointsDisplay').innerText = (data?.points || 0).toLocaleString();
            } catch (e) {
                console.error('Points error:', e);            }
        }

        init();
    </script>
</body>
</html>
</body>
</html>
