<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Gagner des Points - Pixora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0a0a0f;--surface:#13131a;--border:#2a2a35;--accent:#8B5CF6;--gold:#FBBF24;--success:#10B981;--danger:#EF4444;--warn:#F97316;--text:#FAFAFA;--muted:#A1A1AA;--dim:#71717A;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
        *{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
        header{padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}
        .logo{display:flex;align-items:center;gap:0.6rem;font-weight:700;font-size:1.2rem;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .balance{display:flex;align-items:center;gap:0.5rem;background:var(--surface);padding:0.5rem 1rem;border-radius:20px;border:1px solid var(--border)}
        .balance i{color:var(--gold)}
        main{flex:1;padding:2rem;overflow-y:auto;max-width:1200px;margin:0 auto;width:100%}
        h1{font-size:2rem;margin-bottom:0.5rem}
        .subtitle{color:var(--muted);margin-bottom:2rem}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}
        
        /* CARTE PRO */
        .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;position:relative;overflow:hidden;transition:all 0.3s ease;cursor:pointer}
        .card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 10px 30px rgba(139,92,246,0.15)}
        .card-icon{font-size:2.5rem;margin-bottom:1rem;display:block}
        .card-title{font-size:1.2rem;font-weight:700;margin-bottom:0.5rem}
        .card-desc{color:var(--muted);font-size:0.9rem;line-height:1.5}
        .card-points{position:absolute;top:2rem;right:2rem;font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--gold)}
        
        /* ÉTAT D'ATTENTE SÉCURISÉ */
        .card.processing{pointer-events:none;opacity:0.8}
        .overlay{position:absolute;inset:0;background:rgba(10,10,15,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;opacity:0;transition:opacity 0.3s}
        .card.processing .overlay{opacity:1}
        .spinner{width:50px;height:50px;border:4px solid var(--border);border-top:4px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1rem}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .timer-text{font-family:var(--mono);font-size:1.2rem;color:var(--accent)}
        
        /* MODAL SUCCÈS */
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
        .modal.active{opacity:1;pointer-events:all}
        .modal-box{background:var(--surface);padding:2rem;border-radius:16px;text-align:center;border:1px solid var(--success);max-width:400px;width:90%}
        .modal-icon{font-size:3rem;color:var(--success);margin-bottom:1rem}
        .btn-close{margin-top:1.5rem;padding:0.8rem 2rem;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;cursor:pointer}
        .btn-close:hover{background:var(--border)}

        @media(max-width:768px){main{padding:1rem}.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <header>        <div class="logo"><i class="fas fa-cube"></i> PIXORA</div>
        <div class="balance"><i class="fas fa-coins"></i> <span id="pointsDisplay">0</span></div>
    </header>

    <main>
        <h1>Gagnez des Points</h1>
        <p class="subtitle">Complétez des actions simples pour alimenter votre compte.</p>
        <div class="grid" id="adsContainer">
            <!-- Les cartes seront injectées ici -->
        </div>
    </main>

    <!-- Modal Succès -->
    <div class="modal" id="successModal">
        <div class="modal-box">
            <div class="modal-icon"><i class="fas fa-check-circle"></i></div>
            <h2>Récompense Reçue !</h2>
            <p style="color:var(--muted);margin-top:0.5rem">Vous avez gagné <strong id="rewardAmount" style="color:var(--gold)">0</strong> points.</p>
            <button class="btn-close" onclick="closeModal()">Continuer</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let user = null;
        let isProcessing = false;

        // 1. Initialisation
        async function init() {
            const { data: { user: u } } = await db.auth.getUser();
            if (!u) { window.location.href = '/index.html'; return; }
            user = u;
            updatePoints();
            loadAds();
        }

        // 2. Charger les pubs depuis l'Admin
        async function loadAds() {
            const container = document.getElementById('adsContainer');
            const { data } = await db.from('admin_config').select('value').eq('key', 'ad_networks').single();
            const ads = data?.value || [];
            
            if (ads.length === 0) {
                container.innerHTML = '<p style="color:var(--muted)">Aucune offre disponible pour le moment.</p>';
                return;
            }
            container.innerHTML = ads.map(ad => `
                <div class="card" onclick="startTask('${ad.link}', ${ad.points}, '${ad.name}')">
                    <span class="card-icon">${getIcon(ad.type)}</span>
                    <h3 class="card-title">${ad.name}</h3>
                    <p class="card-desc">Regardez ou interagissez pendant 30 secondes.</p>
                    <span class="card-points">+${ad.points}</span>
                    
                    <div class="overlay">
                        <div class="spinner"></div>
                        <div class="timer-text">Attente...</div>
                    </div>
                </div>
            `).join('');
        }

        function getIcon(type) {
            if (type === 'video') return '🎬';
            if (type === 'cpa') return '🎮';
            return '🔗';
        }

        // 3. Démarrer la tâche (SÉCURITÉ MAXIMALE)
        async function startTask(link, points, name) {
            if (isProcessing) return;
            isProcessing = true;

            // Ouvrir la pub
            window.open(link, '_blank');

            // Trouver la carte cliquée (visuellement)
            const cards = document.querySelectorAll('.card');
            let activeCard = null;
            cards.forEach(c => {
                if (c.querySelector('.card-title').innerText === name) activeCard = c;
            });
            if (activeCard) activeCard.classList.add('processing');

            // Timer de 30 secondes
            let timeLeft = 30;
            const interval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) clearInterval(interval);
            }, 1000);

            // Attendre 30s
            setTimeout(async () => {
                // VÉRIFICATION DE SÉCURITÉ : Est-ce que l'utilisateur est toujours là ?
                if (document.hidden) {
                    alert("❌ Vous avez quitté la page. La récompense est annulée.");                    resetUI(activeCard);
                    return;
                }

                try {
                    // Créditer les points
                    const { data: current } = await db.from('user_data').select('points').eq('user_id', user.id).single();
                    const newPoints = (current?.points || 0) + points;
                    
                    await db.from('user_data').update({ points: newPoints }).eq('user_id', user.id);
                    await db.from('transactions').insert({
                        user_id: user.id,
                        type: 'earned',
                        title: `Récompense: ${name}`,
                        amount: points
                    });

                    showSuccess(points);
                    updatePoints();
                } catch (e) {
                    console.error(e);
                    alert("Erreur lors du crédit.");
                } finally {
                    resetUI(activeCard);
                }
            }, 30000);
        }

        function resetUI(card) {
            if (card) card.classList.remove('processing');
            isProcessing = false;
        }

        async function updatePoints() {
            const { data } = await db.from('user_data').select('points').eq('user_id', user.id).single();
            document.getElementById('pointsDisplay').innerText = data?.points || 0;
        }

        function showSuccess(amount) {
            document.getElementById('rewardAmount').innerText = amount;
            document.getElementById('successModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('successModal').classList.remove('active');
        }

        init();
    </script>
</body></html>
