<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Gagner des Points - Pixora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0a0a0f;--surface:#13131a;--elevated:#1c1c26;--border:#2a2a35;--accent:#8B5CF6;--gold:#FBBF24;--success:#10B981;--danger:#EF4444;--warn:#F97316;--text:#FAFAFA;--muted:#A1A1AA;--dim:#71717A;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
        *{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        header{padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
        .logo{display:flex;align-items:center;gap:0.6rem}
        .logo svg{width:28px;height:28px}
        .logo span{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#fff 20%,var(--accent) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .balance{display:flex;align-items:center;gap:0.5rem;font-weight:600}
        .balance-icon{color:var(--gold);font-size:1.2rem}
        .balance-value{font-family:var(--mono);font-size:1.1rem}
        main{flex:1;padding:2rem;overflow-y:auto}
        .section-title{font-size:1.4rem;font-weight:700;margin-bottom:1.5rem;color:var(--accent)}
        .earn-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
        .earn-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
        .earn-card:hover{transform:translateY(-4px);border-color:var(--accent)}
        .earn-card.waiting{opacity:0.7;pointer-events:none;border-color:var(--warn)}
        .earn-icon{font-size:2rem;margin-bottom:1rem;color:var(--accent)}
        .earn-info{flex:1}
        .earn-title{font-weight:600;margin-bottom:0.5rem}
        .earn-desc{font-size:0.85rem;color:var(--muted)}
        .earn-points{font-family:var(--mono);font-size:1.4rem;font-weight:700;color:var(--gold);position:absolute;top:1.5rem;right:1.5rem}
        .timer-bar{position:absolute;bottom:0;left:0;height:4px;background:var(--warn);width:0%;transition:width linear}
        .empty-state{text-align:center;color:var(--dim);padding:3rem;grid-column:1/-1}
        .empty-state i{font-size:3rem;margin-bottom:1rem;opacity:0.3}
        footer{padding:1.5rem;text-align:center;color:var(--dim);border-top:1px solid var(--border);font-size:0.85rem}
        @media(max-width:768px){.earn-container{grid-template-columns:1fr}header{padding:1rem}}
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="alg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#alg)"/></svg>
            <span>Pixora</span>
        </div>
        <div class="balance">
            <div class="balance-icon"><i class="fas fa-coins"></i></div>
            <div class="balance-value" id="userPoints">-</div>
        </div>
    </header>
    <main>
        <h2 class="section-title">🎯 Gagnez des points en quelques minutes</h2>
        <div class="earn-container" id="earnButtonsContainer">
            <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Chargement...</p></div>
        </div>
    </main>

    <footer>© 2026 Pixora. Tous droits réservés.</footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;
        let userPoints = 0;
        let isProcessing = false;

        async function loadEarnData() {
            const container = document.getElementById('earnButtonsContainer');
            try {
                // 1. Auth
                const auth = await db.auth.getUser();
                if (!auth.data?.user) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-lock"></i><p>Veuillez vous connecter pour gagner des points</p></div>';
                    return;
                }
                currentUser = auth.data.user;

                // 2. Points utilisateur
                const userData = await db.from('user_data').select('points').eq('user_id', currentUser.id).single();
                userPoints = userData.data?.points || 0;
                document.getElementById('userPoints').textContent = userPoints.toLocaleString();

                // 3. Régies pub
                const adsResult = await db.from('admin_config').select('value').eq('key', 'ad_networks').single();
                const ads = adsResult.data?.value || [];

                // 4. Pricing (fallback)
                const pricingResult = await db.from('admin_config').select('value').eq('key', 'pricing').single();
                const pricing = pricingResult.data?.value || {};

                renderEarnButtons(ads, pricing);
            } catch (err) {
                console.error('Load earn error:', err);
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erreur de chargement. Veuillez rafraîchir.</p></div>';
            }
        }

        function renderEarnButtons(ads, pricing) {            const container = document.getElementById('earnButtonsContainer');
            let html = '';

            // Mapper les types aux icônes et labels
            const typeConfig = {
                video: { icon: '🎬', label: 'Regarder une vidéo', desc: '30 secondes' },
                cpa: { icon: '🎮', label: 'Installer un jeu mobile', desc: '2 minutes' },
                banner: { icon: '🖼️', label: 'Voir une publicité', desc: '15 secondes' },
                native: { icon: '📰', label: 'Lire un article sponsorisé', desc: '1 minute' },
                direct: { icon: '🔗', label: 'Visiter un partenaire', desc: '30 secondes' },
                share: { icon: '📤', label: 'Partager sur les réseaux', desc: 'Instantané' }
            };

            ads.forEach(function(ad) {
                if (!ad.active || !ad.link) return;
                const config = typeConfig[ad.type] || typeConfig.direct;
                const points = ad.points || pricing.rewardVideo || 30;

                html += '<div class="earn-card" id="card-' + ad.name.replace(/\s/g,'') + '" onclick="handleAdClick(\'' + ad.link + '\', ' + points + ', \'' + ad.type + '\', \'' + ad.name + '\')">';
                html += '  <div class="earn-icon">' + config.icon + '</div>';
                html += '  <div class="earn-info">';
                html += '    <div class="earn-title">' + config.label + '</div>';
                html += '    <div class="earn-desc">' + ad.name + ' • ' + config.desc + '</div>';
                html += '  </div>';
                html += '  <div class="earn-points">+' + points + '</div>';
                html += '  <div class="timer-bar" id="timer-' + ad.name.replace(/\s/g,'') + '"></div>';
                html += '</div>';
            });

            if (!html) {
                html = '<div class="empty-state"><i class="fas fa-ad"></i><p>Aucune régie configurée.<br>Contactez l\'administrateur.</p></div>';
            }

            container.innerHTML = html;
        }

        async function handleAdClick(link, points, type, adName) {
            if (isProcessing) return;
            if (!link || link.trim() === '') {
                alert('⚠️ Lien non configuré');
                return;
            }

            isProcessing = true;
            const cardId = 'card-' + adName.replace(/\s/g,'');
            const timerId = 'timer-' + adName.replace(/\s/g,'');
            const card = document.getElementById(cardId);
            const timerBar = document.getElementById(timerId);

            // État visuel d'attente            card.classList.add('waiting');
            timerBar.style.transition = 'width 30s linear';
            timerBar.style.width = '100%';

            // Ouvrir le lien
            window.open(link, '_blank');

            // Attendre 30 secondes
            setTimeout(async function() {
                try {
                    // 1. Lire les points actuels
                    const currentData = await db.from('user_data')
                        .select('points')
                        .eq('user_id', currentUser.id)
                        .single();
                    const currentPoints = currentData.data?.points || 0;
                    const newPoints = currentPoints + points;

                    // 2. Mettre à jour les points
                    await db.from('user_data')
                        .update({ points: newPoints })
                        .eq('user_id', currentUser.id);

                    // 3. Créer la transaction
                    var titleMap = { video: 'Vidéo récompensée', cpa: 'Offre CPA', banner: 'Publicité vue', native: 'Article sponsorisé', direct: 'Lien partenaire', share: 'Partage réseau' };
                    await db.from('transactions').insert({
                        user_id: currentUser.id,
                        type: 'earned',
                        title: (titleMap[type] || 'Récompense') + ' - ' + adName,
                        amount: points
                    });

                    // 4. Mettre à jour l'UI
                    userPoints = newPoints;
                    document.getElementById('userPoints').textContent = userPoints.toLocaleString();
                    alert('✅ +' + points + ' points ajoutés !');

                } catch (err) {
                    console.error('Credit error:', err);
                    alert('❌ Erreur lors du crédit. Veuillez réessayer.');
                } finally {
                    // Reset état visuel
                    card.classList.remove('waiting');
                    timerBar.style.transition = 'none';
                    timerBar.style.width = '0%';
                    isProcessing = false;
                }
            }, 30000);
        }
        document.addEventListener('DOMContentLoaded', loadEarnData);
    </script>
</body>
</html>
