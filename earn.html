<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gagner des Points | Pixora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#050508;--surface:#0f0f14;--border:#1a1a24;--accent:#8B5CF6;--accent2:#EC4899;--gold:#FBBF24;--text:#FAFAFA;--muted:#A1A1AA;--dim:#52525B;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
        header{padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50}
        .logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
        .logo svg{width:28px;height:28px}
        .logo span{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#fff 20%,var(--accent) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .balance-pill{display:flex;align-items:center;gap:0.5rem;background:var(--surface);padding:0.5rem 1rem;border-radius:100px;border:1px solid var(--border);font-weight:600;font-size:0.9rem}
        .balance-pill i{color:var(--gold)}
        .balance-pill span{font-family:var(--mono)}
        main{flex:1;padding:2rem 1.5rem;max-width:900px;margin:0 auto;width:100%}
        .page-header{text-align:center;margin-bottom:2rem}
        .page-title{font-size:1.8rem;font-weight:700;margin-bottom:0.5rem}
        .page-subtitle{color:var(--muted);font-size:0.95rem}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;text-align:center}
        .card-icon{font-size:2.5rem;color:var(--accent);margin-bottom:1.2rem}
        .card-title{font-size:1.3rem;font-weight:700;margin-bottom:0.6rem}
        .card-desc{color:var(--muted);font-size:0.9rem;line-height:1.5;margin-bottom:1.5rem}
        .reward{font-family:var(--mono);font-size:1.6rem;font-weight:700;color:var(--gold);margin:1rem 0}
        .btn{padding:0.9rem 2.2rem;border-radius:12px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;border:none}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
        .btn-disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
        .status{margin-top:1rem;font-size:0.85rem;color:var(--muted)}
        .success{color:var(--gold);font-weight:600}
    </style>
</head>
<body>
    <header>
        <a href="/index.html" class="logo">
            <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#lg)"/></svg>
            <span>Pixora</span>
        </a>
        <div class="balance-pill">
            <i class="fas fa-coins"></i>
            <span id="pointsDisplay">---</span>
        </div>
    </header>

    <main>
        <div class="page-header">            <h1 class="page-title">Gagnez des Points</h1>
            <p class="page-subtitle">Complétez une action unique pour alimenter votre compte.</p>
        </div>

        <div id="adsContainer">
            <div style="text-align:center;color:var(--dim);padding:2rem">
                <i class="fas fa-spinner fa-spin" style="font-size:2rem;margin-bottom:1rem"></i>
                <p>Chargement...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let user = null;

        async function init() {
            const { data: { user: u }, error } = await db.auth.getUser();
            if (error || !u) { window.location.href = '/index.html'; return; }
            user = u;
            await updatePoints();
            await loadAds();
        }

        async function loadAds() {
            const container = document.getElementById('adsContainer');
            
            try {
                // Charger les régies depuis l'admin
                const { data: configData } = await db
                    .from('admin_config')
                    .select('value')
                    .eq('key', 'ad_networks')
                    .single();

                const ads = configData?.value || [];
                const activeAds = ads.filter(ad => ad.active);

                if (activeAds.length === 0) {
                    container.innerHTML = `
                        <div class="card">
                            <div class="card-icon"><i class="fas fa-exclamation-triangle"></i></div>
                            <h3 class="card-title">Aucune offre disponible</h3>
                            <p class="card-desc">Revenez plus tard.</p>
                        </div>
                    `;
                    return;                }

                // Afficher chaque régie
                container.innerHTML = activeAds.map(ad => `
                    <div class="card" id="card-${ad.name.replace(/\s/g,'')}">
                        <div class="card-icon">${getIcon(ad.type)}</div>
                        <h3 class="card-title">${ad.name}</h3>
                        <p class="card-desc">Cliquez une seule fois. Les points sont crédités instantanément.</p>
                        <div class="reward">+${ad.points} points</div>
                        <button class="btn btn-primary" onclick="startTask('${ad.name}', ${ad.points}, '${ad.link}')">Commencer</button>
                        <div class="status" id="status-${ad.name.replace(/\s/g,'')}"></div>
                    </div>
                `).join('');

                // Vérifier quelles offres sont déjà complétées
                await checkCompletedAds(activeAds);

            } catch (e) {
                console.error('Load ads error:', e);
                container.innerHTML = `
                    <div class="card">
                        <div class="card-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <h3 class="card-title">Erreur de chargement</h3>
                        <p class="card-desc">${e.message}</p>
                    </div>
                `;
            }
        }

        async function checkCompletedAds(ads) {
            const { data } = await db
                .from('ad_clicks')
                .select('user_id')
                .eq('user_id', user.id)
                .eq('status', 'paid');

            if (data) {
                data.forEach(completed => {
                    const card = document.getElementById(`card-${completed.ad_name?.replace(/\s/g,'') || ''}`);
                    const btn = card?.querySelector('.btn');
                    const status = card?.querySelector('.status');
                    
                    if (card && btn) {
                        btn.textContent = '✅ Déjà complété';
                        btn.classList.remove('btn-primary');
                        btn.classList.add('btn-disabled');
                        btn.disabled = true;
                        btn.onclick = null;
                        if (status) status.textContent = 'Vous avez déjà reçu cette récompense.';
                    }                });
            }
        }

        function getIcon(type) {
            const icons = { video: '', cpa: '🎮', banner: '🖼️', native: '', direct: '🔗', share: '📤' };
            return icons[type] || '🔗';
        }

        async function startTask(adName, points, link) {
            const card = document.getElementById(`card-${adName.replace(/\s/g,'')}`);
            const btn = card.querySelector('.btn');
            const status = document.getElementById(`status-${adName.replace(/\s/g,'')}`);

            btn.disabled = true;
            btn.textContent = '🔄 Crédit en cours...';
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-disabled');
            status.textContent = 'Patientez...';

            try {
                const token = 'tok_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9);

                // 1. Créditer les points
                const { data: userData } = await db
                    .from('user_data')
                    .select('points')
                    .eq('user_id', user.id)
                    .single();

                const newPoints = (userData?.points || 0) + points;

                await db.from('user_data').update({ points: newPoints }).eq('user_id', user.id);

                // 2. Créer la transaction
                await db.from('transactions').insert({
                    user_id: user.id,
                    type: 'earned',
                    title: adName,
                    amount: points
                });

                // 3. Marquer comme complété
                await db.from('ad_clicks').insert({
                    user_id: user.id,
                    ad_name: adName,
                    token: token,
                    status: 'paid'
                });
                // 4. Mettre à jour l'affichage
                document.getElementById('pointsDisplay').innerText = newPoints.toLocaleString();
                
                btn.textContent = '✅ Terminé';
                status.innerHTML = '<span class="success">+' + points + ' points crédités !</span>';

                // 5. Rediriger vers le lien (optionnel)
                if (link) {
                    setTimeout(() => {
                        window.open(link, '_blank');
                    }, 1500);
                }

            } catch (e) {
                console.error('Error:', e);
                btn.textContent = '❌ Erreur';
                status.textContent = 'Erreur: ' + e.message;
                btn.disabled = false;
                btn.classList.remove('btn-disabled');
                btn.classList.add('btn-primary');
            }
        }

        async function updatePoints() {
            const { data } = await db.from('user_data').select('points').eq('user_id', user.id).single();
            document.getElementById('pointsDisplay').innerText = (data?.points || 0).toLocaleString();
        }

        init();
    </script>
</body>
</html>
