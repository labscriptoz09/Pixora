<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Gagner des Points - Pixora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0a0a0f;--surface:#13131a;--elevated:#1c1c26;--border:#2a2a35;--accent:#8B5CF6;--gold:#FBBF24;--success:#10B981;--danger:#EF4444;--text:#FAFAFA;--muted:#A1A1AA;--dim:#71717A;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
        *{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        header{padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
        .logo{display:flex;align-items:center;gap:0.6rem}
        .logo svg{width:28px;height:28px}
        .logo span{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#fff 20%,var(--accent) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .balance{display:flex;align-items:center;gap:0.5rem;font-weight:600}
        .balance-icon{color:var(--gold);font-size:1.2rem}
        .balance-value{font-family:var(--mono);font-size:1.1rem}
        main{flex:1;padding:2rem;overflow-y:auto}
        .section-title{font-size:1.4rem;font-weight:700;margin-bottom:1.5rem;color:var(--accent)}
        .earn-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
        .earn-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;cursor:pointer;transition:all 0.3s;position:relative}
        .earn-card:hover{transform:translateY(-4px);border-color:var(--accent)}
        .earn-icon{font-size:2rem;margin-bottom:1rem;color:var(--accent)}
        .earn-info{flex:1}
        .earn-title{font-weight:600;margin-bottom:0.5rem}
        .earn-desc{font-size:0.85rem;color:var(--muted)}
        .earn-points{font-family:var(--mono);font-size:1.4rem;font-weight:700;color:var(--gold);position:absolute;top:1.5rem;right:1.5rem}
        .timer{font-size:0.75rem;color:var(--dim);margin-top:0.5rem;display:flex;align-items:center;gap:0.4rem}
        .timer i{color:var(--warn)}
        footer{padding:1.5rem;text-align:center;color:var(--dim);border-top:1px solid var(--border);font-size:0.85rem}
        .btn{padding:0.6rem 1.2rem;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.4rem;border:none}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
        .btn-outline:hover{border-color:var(--accent);color:var(--accent)}
        .loading{display:flex;justify-content:center;align-items:center;height:100px}
        .spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;border-top:3px solid var(--accent);animation:spin 1s linear infinite}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        @media(max-width:768px){.earn-container{grid-template-columns:1fr}.header{padding:1rem}}
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="alg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#alg)"/></svg>
            <span>Pixora</span>
        </div>
        <div class="balance">            <div class="balance-icon"><i class="fas fa-coins"></i></div>
            <div class="balance-value" id="userPoints">0</div>
        </div>
    </header>

    <main>
        <h2 class="section-title">🎯 Gagnez des points en quelques minutes</h2>
        <div class="earn-container" id="earnButtonsContainer">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </main>

    <footer>
        © 2026 Pixora. Tous droits réservés.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        // === CONFIG SUPABASE ===
        const SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;
        let userPoints = 0;

        // === CHARGER LES DONNÉES ===
        async function loadEarnData() {
            try {
                // Récupérer utilisateur
                const auth = await db.auth.getUser();
                if (!auth.data?.user) {
                    alert('❌ Vous devez être connecté');
                    return;
                }
                currentUser = auth.data.user;

                // Récupérer points utilisateur
                const userData = await db.from('user_data').select('points').eq('user_id', currentUser.id).single();
                userPoints = userData.data?.points || 0;
                document.getElementById('userPoints').textContent = userPoints.toLocaleString();

                // Récupérer régies pub
                const adsResult = await db.from('admin_config').select('value').eq('key', 'ad_networks').single();
                const ads = adsResult.data?.value || [];

                // Récupérer pricing
                const pricingResult = await db.from('admin_config').select('value').eq('key', 'pricing').single();
                const pricing = pricingResult.data?.value || {};

                // Afficher les boutons                renderEarnButtons(ads, pricing);
            } catch (err) {
                console.error('Erreur chargement earn:', err);
                document.getElementById('earnButtonsContainer').innerHTML = 
                    `<div style="text-align:center;color:var(--danger);padding:2rem">❌ Erreur: ${err.message}</div>`;
            }
        }

        function renderEarnButtons(ads, pricing) {
            const container = document.getElementById('earnButtonsContainer');
            let html = '';

            // Bouton Vidéo Récompensée (Adsterra Smartlink)
            const videoAd = ads.find(a => a.active && a.type === 'video');
            if (videoAd) {
                const points = videoAd.points || pricing.rewardVideo || 30;
                html += `
                    <div class="earn-card" onclick="handleAdClick('${videoAd.link}', ${points}, 'video')">
                        <div class="earn-icon">🎬</div>
                        <div class="earn-info">
                            <div class="earn-title">Regarder une vidéo</div>
                            <div class="earn-desc">${videoAd.name || 'Adsterra'} • ${videoAd.points || points} pts</div>
                        </div>
                        <div class="earn-points">+${points}</div>
                    </div>
                `;
            }

            // Bouton Sponsor (CPA)
            const sponsorAd = ads.find(a => a.active && a.type === 'cpa');
            if (sponsorAd) {
                const points = sponsorAd.points || pricing.rewardSponsor || 5;
                html += `
                    <div class="earn-card" onclick="handleAdClick('${sponsorAd.link}', ${points}, 'cpa')">
                        <div class="earn-icon">🎮</div>
                        <div class="earn-info">
                            <div class="earn-title">Installer un jeu mobile</div>
                            <div class="earn-desc">${sponsorAd.name || 'CPA Offer'} • ${sponsorAd.points || points} pts</div>
                        </div>
                        <div class="earn-points">+${points}</div>
                    </div>
                `;
            }

            // Bouton Partage (si configuré)
            const shareAd = ads.find(a => a.active && a.type === 'share');
            if (shareAd) {
                const points = shareAd.points || pricing.rewardShare || 20;
                html += `
                    <div class="earn-card" onclick="handleAdClick('${shareAd.link}', ${points}, 'share')">                        <div class="earn-icon">📤</div>
                        <div class="earn-info">
                            <div class="earn-title">Partager sur les réseaux</div>
                            <div class="earn-desc">${shareAd.name || 'Social'} • ${shareAd.points || points} pts</div>
                        </div>
                        <div class="earn-points">+${points}</div>
                    </div>
                `;
            }

            // Si aucun ad, message
            if (!html) {
                html = `<div style="text-align:center;color:var(--dim);padding:2rem">⚠️ Aucune régie configurée dans l'admin</div>`;
            }

            container.innerHTML = html;
        }

        // === GESTION DU CLIC ===
        async function handleAdClick(link, points, type) {
            if (!link || link.trim() === '') {
                alert('⚠️ Lien non configuré. Veuillez contacter l\'administrateur.');
                return;
            }

            // Ouvrir le lien dans un nouvel onglet
            window.open(link, '_blank');

            // Attendre 30 secondes avant de créditer
            document.getElementById('earnButtonsContainer').innerHTML = `
                <div class="earn-card" style="opacity:0.7;pointer-events:none">
                    <div class="earn-icon" style="color:var(--warn)">⏳</div>
                    <div class="earn-info">
                        <div class="earn-title">Attente en cours...</div>
                        <div class="earn-desc">Ne fermez pas cette page</div>
                    </div>
                    <div class="earn-points" style="color:var(--warn)">+${points}</div>
                </div>
            `;

            setTimeout(async () => {
                try {
                    // Créditer les points
                    await db.from('user_data').update({
                        points: db.raw(`points + ${points}`)
                    }).eq('user_id', currentUser.id);

                    // Créer la transaction
                    await db.from('transactions').insert({
                        user_id: currentUser.id,                        type: 'earned',
                        title: type === 'video' ? 'Vidéo récompensée' : type === 'cpa' ? 'Offre CPA' : 'Partage',
                        amount: points
                    });

                    // Mettre à jour l'UI
                    userPoints += points;
                    document.getElementById('userPoints').textContent = userPoints.toLocaleString();
                    
                    // Rafraîchir les boutons
                    loadEarnData();
                    
                    // Notification
                    alert(`✅ +${points} points ajoutés !`);
                } catch (err) {
                    console.error('Erreur lors du crédit:', err);
                    alert('❌ Échec du crédit. Veuillez réessayer.');
                    loadEarnData();
                }
            }, 30000); // 30 secondes
        }

        // === INIT ===
        document.addEventListener('DOMContentLoaded', loadEarnData);
    </script>
</body>
</html>
