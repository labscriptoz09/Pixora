<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixora - Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg-base:#050507;--bg-surface:rgba(24,24,27,0.6);--bg-elevated:rgba(39,39,42,0.8);--border-subtle:rgba(63,63,70,0.5);--accent-primary:#8B5CF6;--accent-secondary:#EC4899;--gold:#FBBF24;--success:#10B981;--danger:#EF4444;--text-main:#FAFAFA;--text-muted:#A1A1AA;--text-dim:#71717A;--font-ui:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius-md:16px;--radius-lg:24px;--ease-out:cubic-bezier(0.16,1,0.3,1)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg-base);color:var(--text-main);font-family:var(--font-ui);min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;-webkit-font-smoothing:antialiased}
        .bg-orbs{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4;animation:float 20s infinite ease-in-out}
        .orb-1{width:400px;height:400px;background:var(--accent-primary);top:-100px;left:-100px}
        .orb-2{width:300px;height:300px;background:var(--accent-secondary);bottom:10%;right:-50px;animation-delay:-5s}
        @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.1)}66%{transform:translate(-20px,20px) scale(0.9)}}
        a{text-decoration:none;color:inherit}
        button{background:none;border:none;cursor:pointer;font-family:inherit;color:inherit;-webkit-tap-highlight-color:transparent}
        .auth-container{width:100%;max-width:420px;padding:1.5rem;animation:slideUp 0.5s var(--ease-out)}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .auth-card{background:var(--bg-surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:2.5rem 2rem;text-align:center}
        .auth-logo{display:flex;align-items:center;justify-content:center;gap:0.6rem;margin-bottom:0.5rem}
        .auth-logo svg{width:36px;height:36px}
        .auth-logo-text{font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(135deg,#fff 20%,var(--accent-primary) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .auth-subtitle{color:var(--text-muted);font-size:0.9rem;margin-bottom:2rem}
        .auth-tabs{display:flex;gap:0.3rem;background:rgba(255,255,255,0.03);border-radius:12px;padding:0.3rem;margin-bottom:1.5rem}
        .auth-tab{flex:1;padding:0.6rem;border-radius:10px;font-size:0.85rem;font-weight:600;color:var(--text-muted);transition:all 0.2s var(--ease-out)}
        .auth-tab.active{background:var(--accent-primary);color:white}
        .form-section{display:none}
        .form-section.active{display:block;animation:fadeIn 0.3s}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .form-group{margin-bottom:1rem;text-align:left}
        .form-label{display:block;font-size:0.75rem;font-weight:600;color:var(--text-muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em}
        .form-input{width:100%;padding:0.8rem 1rem;background:rgba(0,0,0,0.3);border:1px solid var(--border-subtle);border-radius:12px;color:var(--text-main);font-family:var(--font-ui);font-size:0.95rem;outline:none;transition:all 0.3s}
        .form-input:focus{border-color:var(--accent-primary);background:rgba(0,0,0,0.5);box-shadow:0 0 0 3px rgba(139,92,246,0.15)}
        .form-input::placeholder{color:var(--text-dim)}
        .btn-submit{width:100%;padding:0.9rem;margin-top:0.5rem;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));color:white;border-radius:12px;font-weight:700;font-size:1rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;transition:all 0.3s var(--ease-out);box-shadow:0 4px 15px rgba(139,92,246,0.3)}
        .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(139,92,246,0.5)}
        .btn-submit:active{transform:scale(0.97)}
        .btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--text-dim);font-size:0.75rem}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border-subtle)}
        .social-btn{width:100%;padding:0.8rem;background:rgba(255,255,255,0.05);border:1px solid var(--border-subtle);border-radius:12px;font-weight:600;font-size:0.9rem;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:all 0.2s var(--ease-out);margin-bottom:0.6rem}
        .social-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
        .social-btn.google i{color:#DB4437}
        .social-btn.github i{color:#fff}
        .auth-footer{margin-top:1.5rem;font-size:0.8rem;color:var(--text-dim)}
        .auth-footer a{color:var(--accent-primary);font-weight:500}        .auth-footer a:hover{text-decoration:underline}        .notification{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-150px);background:var(--bg-elevated);backdrop-filter:blur(20px);border:1px solid var(--border-subtle);border-radius:16px;padding:0.8rem 1.2rem;font-size:0.85rem;font-weight:500;z-index:10000;transition:transform 0.4s var(--ease-out);display:flex;align-items:center;gap:0.6rem;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
        .notification.show{transform:translateX(-50%) translateY(0)}
        .notification.success{border-color:var(--success)}
        .notification.success i{color:var(--success)}
        .notification.error{border-color:var(--danger)}
        .notification.error i{color:var(--danger)}
        @media(max-width:480px){.auth-card{padding:2rem 1.5rem}.auth-logo-text{font-size:1.3rem}}
    </style>
</head>
<body>

<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="notification" id="notification"><i class="fas fa-check-circle"></i><span id="notification-text"></span></div>

<div class="auth-container">
    <div class="auth-card">
        <a href="index.html" class="auth-logo">
            <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#ag)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/><path d="M16 2L4 10L16 14L16 2Z" fill="rgba(255,255,255,0.2)"/></svg>
            <span class="auth-logo-text">Pixora</span>
        </a>
        <p class="auth-subtitle">Créez des images et vidéos IA gratuitement</p>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuth('login')">Connexion</button>
            <button class="auth-tab" onclick="switchAuth('register')">Inscription</button>
        </div>

        <div class="form-section active" id="section-login">
            <form onsubmit="handleLogin(event)">
                <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="votre@email.com" required id="login-email"></div>
                <div class="form-group"><label class="form-label">Mot de passe</label><input type="password" class="form-input" placeholder="••••••••" required id="login-password"></div>
                <button type="submit" class="btn-submit" id="btn-login"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
            </form>
            <div class="auth-footer"><a href="#">Mot de passe oublié ?</a></div>
        </div>

        <div class="form-section" id="section-register">
            <form onsubmit="handleRegister(event)">
                <div class="form-group"><label class="form-label">Pseudo</label><input type="text" class="form-input" placeholder="Votre pseudo" required id="reg-name"></div>
                <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="votre@email.com" required id="reg-email"></div>
                <div class="form-group"><label class="form-label">Mot de passe</label><input type="password" class="form-input" placeholder="Min. 8 caractères" required minlength="8" id="reg-password"></div>
                <button type="submit" class="btn-submit" id="btn-register"><i class="fas fa-user-plus"></i> Créer mon compte</button>
            </form>
        </div>

        <div class="divider">ou continuer avec</div>
        <button class="social-btn google" onclick="loginWithGoogle()"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn github" onclick="showNotification('⏳ GitHub bientôt disponible...','success')"><i class="fab fa-github"></i> GitHub</button>
        <div class="auth-footer">En continuant, vous acceptez nos <a href="privacy.html">conditions de confidentialité</a>.</div>    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var signupBonus = 50;

// Rediriger si déjà connecté + charger bonus
document.addEventListener('DOMContentLoaded', async function() {
    var result = await db.auth.getUser();
    if (result.data.user) { window.location.href = 'index.html'; return; }
    try {
        var bonusResult = await db.from('admin_config').select('*').eq('key', 'signup_bonus').single();
        if (bonusResult.data && bonusResult.data.value) signupBonus = bonusResult.data.value;
    } catch(e) {}
});

function switchAuth(m) {
    document.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.form-section').forEach(function(s) { s.classList.remove('active'); });
    if (m === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('section-login').classList.add('active');
    } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('section-register').classList.add('active');
    }
}

async function handleLogin(e) {
    e.preventDefault();
    var btn = document.getElementById('btn-login');
    var email = document.getElementById('login-email').value.trim();
    var pw = document.getElementById('login-password').value;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
    try {
        var result = await db.auth.signInWithPassword({ email: email, password: pw });
        if (result.error) throw result.error;
        showNotification('✅ Bienvenue !', 'success');
        setTimeout(function() { window.location.href = 'index.html'; }, 1000);
    } catch (err) {
        showNotification('❌ Email ou mot de passe incorrect', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
    }
}
async function handleRegister(e) {
    e.preventDefault();    var btn = document.getElementById('btn-register');
    var name = document.getElementById('reg-name').value.trim();
    var email = document.getElementById('reg-email').value.trim();
    var pw = document.getElementById('reg-password').value;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Création...';
    try {
        var result = await db.auth.signUp({ email: email, password: pw, options: { data: { name: name } } });
        if (result.error) throw result.error;
        var user = result.data.user;
        if (user) {
            await db.from('transactions').insert({ user_id: user.id, type: 'earned', title: 'Bonus bienvenue', amount: signupBonus });
            await db.from('user_data').update({ points: signupBonus, total_earned: signupBonus }).eq('user_id', user.id);
        }
        showNotification('🎉 Compte créé ! +' + signupBonus + ' pts offerts', 'success');
        setTimeout(function() { window.location.href = 'index.html'; }, 1200);
    } catch (err) {
        showNotification('❌ Erreur lors de l\'inscription', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Créer mon compte';
    }
}

// ✅ GOOGLE LOGIN AVEC URL VERCEL EN DUR
async function loginWithGoogle() {
    try {
        await db.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: 'https://pixora-gold-eight.vercel.app'
            }
        });
    } catch (err) {
        console.error('Google Login error:', err);
        showNotification('❌ Erreur Google Login', 'error');
    }
}

// ✅ LISTENER AUTH STATE CHANGE
db.auth.onAuthStateChange(function(event, session) {
    console.log('Auth event:', event);
    if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
        showNotification('✅ Connecté avec Google !', 'success');
        setTimeout(function() { window.location.href = 'index.html'; }, 1000);
    }
});

function showNotification(msg, type) {
    type = type || 'success';
    var n = document.getElementById('notification');    document.getElementById('notification-text').textContent = msg;
    n.className = 'notification show ' + type;
    setTimeout(function() { n.classList.remove('show'); }, 3500);
}
</script>
</body>
</html>
