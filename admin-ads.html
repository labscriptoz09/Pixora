<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Publicités Avancée | Pixora Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#050508;--surface:#0f0f14;--border:#1a1a24;--accent:#8B5CF6;--accent2:#EC4899;--gold:#FBBF24;--success:#10B981;--danger:#EF4444;--warning:#F59E0B;--text:#FAFAFA;--muted:#A1A1AA;--font:'Inter',sans-serif}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:1rem}
        .container{max-width:1400px;margin:0 auto}
        
        /* Header */
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:1rem}
        .title-group h1{font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:0.5rem}
        .badge-admin{background:rgba(139,92,246,0.2);color:var(--accent);padding:0.2rem 0.6rem;border-radius:4px;font-size:0.7rem;font-weight:700;text-transform:uppercase}
        .btn-back{padding:0.5rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);text-decoration:none;font-size:0.9rem;transition:all 0.2s}
        .btn-back:hover{border-color:var(--accent)}

        /* Stats Bar */
        .stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0.8rem;margin-bottom:1.5rem}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.8rem;text-align:center}
        .stat-val{font-size:1.4rem;font-weight:700;color:var(--accent)}
        .stat-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;margin-top:0.2rem}

        /* Controls */
        .controls{display:flex;gap:0.8rem;margin-bottom:1.5rem;flex-wrap:wrap}
        .search-box{flex:1;min-width:200px;position:relative}
        .search-box input{width:100%;padding:0.7rem 0.7rem 0.7rem 2.5rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem}
        .search-box i{position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);color:var(--muted)}
        .filter-select{padding:0.7rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;min-width:150px}
        .btn-add{padding:0.7rem 1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:white;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:0.5rem;font-size:0.9rem}

        /* Table */
        .table-container{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
        table{width:100%;border-collapse:collapse}
        th{background:rgba(139,92,246,0.1);padding:0.8rem;text-align:left;font-size:0.75rem;text-transform:uppercase;color:var(--muted);font-weight:600}
        td{padding:0.8rem;border-bottom:1px solid var(--border);font-size:0.85rem;vertical-align:middle}
        tr:last-child td{border-bottom:none}
        tr:hover{background:rgba(255,255,255,0.02)}
        
        .ad-name{font-weight:600;color:var(--text)}
        .ad-type{font-family:'JetBrains Mono',monospace;font-size:0.75rem;background:rgba(255,255,255,0.05);padding:0.2rem 0.5rem;border-radius:4px;color:var(--muted)}
        .ad-points{color:var(--gold);font-weight:700;font-family:'JetBrains Mono',monospace}
        .ad-page{text-transform:capitalize}
        
        .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:0.4rem}        .status-active{background:var(--success)}
        .status-inactive{background:var(--danger)}

        .mode-badge{font-family:'JetBrains Mono',monospace;font-size:0.7rem;padding:0.2rem 0.5rem;border-radius:4px;font-weight:600}
        .mode-visible{background:rgba(139,92,246,0.2);color:var(--accent)}
        .mode-rewarded{background:rgba(251,191,36,0.2);color:var(--gold)}

        .actions{display:flex;gap:0.4rem}
        .btn-action{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:0.8rem}
        .btn-edit:hover{border-color:var(--accent);color:var(--accent)}
        .btn-dup:hover{border-color:var(--warning);color:var(--warning)}
        .btn-del:hover{border-color:var(--danger);color:var(--danger)}

        /* Modal */
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}
        .modal-overlay.active{display:flex}
        .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:1.5rem}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
        .modal-title{font-size:1.2rem;font-weight:700}
        .btn-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}
        
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .form-group{margin-bottom:1rem}
        .form-group.full{grid-column:1/-1}
        label{display:block;margin-bottom:0.4rem;font-size:0.8rem;font-weight:600;color:var(--muted)}
        input,select,textarea{width:100%;padding:0.7rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;font-family:var(--font)}
        textarea{min-height:100px;font-family:'JetBrains Mono',monospace;font-size:0.8rem;resize:vertical}
        input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
        
        .btn-save{width:100%;padding:0.9rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:white;font-weight:700;font-size:1rem;cursor:pointer;margin-top:0.5rem}
        .btn-save:disabled{opacity:0.5;cursor:not-allowed}

        .empty-state{text-align:center;padding:3rem;color:var(--muted)}
        .empty-state i{font-size:2.5rem;margin-bottom:1rem;opacity:0.3}

        @media(max-width:768px){
            .form-grid{grid-template-columns:1fr}
            .table-container{overflow-x:auto}
            table{min-width:700px}
            .stats-bar{grid-template-columns:repeat(3,1fr)}
        }
    </style>
</head>
<body>
    <div class="container" id="mainContent" style="display:none">
        <div class="header">
            <div class="title-group">
                <h1><i class="fas fa-ad"></i> Gestion Publicités <span class="badge-admin">Admin</span></h1>
            </div>
            <a href="admin.html" class="btn-back"><i class="fas fa-arrow-left"></i> Retour</a>        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-card"><div class="stat-val" id="statTotal">-</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-val" id="statActive">-</div><div class="stat-label">Actives</div></div>
            <div class="stat-card"><div class="stat-val" id="statVisible">-</div><div class="stat-label">Visibles</div></div>
            <div class="stat-card"><div class="stat-val" id="statRewarded">-</div><div class="stat-label">Rewardées</div></div>
            <div class="stat-card"><div class="stat-val" id="statEarn">-</div><div class="stat-label">Earn</div></div>
        </div>

        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Rechercher une publicité...">
            </div>
            <select class="filter-select" id="pageFilter">
                <option value="all">Toutes les pages</option>
                <option value="earn">Earn</option>
                <option value="index">Index</option>
                <option value="galerie">Galerie</option>
                <option value="profile">Profile</option>
                <option value="shop">Shop</option>
            </select>
            <select class="filter-select" id="modeFilter">
                <option value="all">Tous les modes</option>
                <option value="visible">Visible (Site)</option>
                <option value="rewarded">Rewardé (Modale)</option>
            </select>
            <button class="btn-add" onclick="openModal()"><i class="fas fa-plus"></i> Nouvelle Pub</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Statut</th>
                        <th>Nom</th>
                        <th>Page</th>
                        <th>Mode</th>
                        <th>Type</th>
                        <th>Position</th>
                        <th>Points</th>
                        <th style="text-align:right">Actions</th>
                    </tr>
                </thead>
                <tbody id="adsTableBody">
                    <tr><td colspan="8" class="empty-state"><i class="fas fa-spinner fa-spin"></i><br>Chargement...</td></tr>
                </tbody>
            </table>
        </div>    </div>

    <!-- Modal Édition / Création -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Nouvelle Publicité</h2>
                <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="adForm">
                <input type="hidden" id="editIndex" value="-1">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Nom de la publicité *</label>
                        <input type="text" id="adName" placeholder="Ex: Monetag Earn #1" required>
                    </div>
                    <div class="form-group">
                        <label>Page cible *</label>
                        <select id="adPage" required>
                            <option value="earn">Earn (Gagner des points)</option>
                            <option value="index">Index (Accueil)</option>
                            <option value="galerie">Galerie</option>
                            <option value="profile">Profile</option>
                            <option value="shop">Shop</option>
                        </select>
                    </div>
                    <!-- ✅ NOUVEAU CHAMP MODE -->
                    <div class="form-group">
                        <label>Mode d'affichage *</label>
                        <select id="adMode" required>
                            <option value="visible">📺 Visible (Cadres sur le site)</option>
                            <option value="rewarded">🎁 Rewardé (Modale Gagner Points)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Type de pub</label>
                        <select id="adType">
                            <option value="smartlink">Smartlink / Direct Link (CPA)</option>
                            <option value="native">Native Banner (CPM)</option>
                            <option value="banner">Bannière 300x250 (CPM)</option>
                            <option value="banner_728">Bannière 728x90 (CPM)</option>
                            <option value="popunder">Popunder (CPM)</option>
                            <option value="social_bar">Social Bar (CPM)</option>
                            <option value="video">Vidéo Récompensée (CPA)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Position</label>
                        <select id="adPosition">
                            <option value="top">Haut de page</option>                            <option value="middle">Milieu de page</option>
                            <option value="bottom">Bas de page</option>
                            <option value="sidebar">Sidebar</option>
                            <option value="auto">Auto (Popunder)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Points récompense</label>
                        <input type="number" id="adPoints" value="15" min="0">
                    </div>
                    <div class="form-group full">
                        <label>Code HTML / JS / Lien *</label>
                        <textarea id="adCode" placeholder="Collez le code ou l'URL ici..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Statut</label>
                        <select id="adActive">
                            <option value="true">✅ Actif</option>
                            <option value="false">❌ Inactif</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-save" id="btnSave"><i class="fas fa-save"></i> Sauvegarder</button>
            </form>
        </div>
    </div>

    <div id="accessDenied" style="display:none;text-align:center;padding:4rem 2rem">
        <i class="fas fa-lock" style="font-size:4rem;color:var(--danger);margin-bottom:1rem"></i>
        <h2>Accès Refusé</h2>
        <p style="color:var(--muted);margin:1rem 0">Réservé à l'administrateur.</p>
        <a href="/index.html" class="btn-back">Retour accueil</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_EMAIL = 'leonard@pixora.com';

        let allAds = [];
        let filteredAds = [];

        async function adminSave(key, value) {
            try {
                var session = await db.auth.getSession();
                var token = session.data.session?.access_token;
                if (!token) throw new Error('Session expirée. Reconnectez-vous.');
                var res = await fetch('/api/admin-save', {                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ key: key, value: value })
                });
                var data = await res.json();
                if (!res.ok || !data.ok) throw new Error(data.error || 'Erreur serveur ' + res.status);
                return true;
            } catch(e) {
                console.error('[ADMIN-SAVE] Error:', e);
                alert('❌ Erreur sauvegarde : ' + e.message);
                return false;
            }
        }

        async function checkAdmin() {
            try {
                var sessionResult = await db.auth.getSession();
                var user = sessionResult.data.session?.user;
                if (!user || user.email.toLowerCase() !== ADMIN_EMAIL) {
                    document.getElementById('mainContent').style.display = 'none';
                    document.getElementById('accessDenied').style.display = 'block';
                    return;
                }
                document.getElementById('mainContent').style.display = 'block';
                await loadAds();
            } catch(e) {
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('accessDenied').style.display = 'block';
            }
        }

        async function loadAds() {
            try {
                var result = await db.from('admin_config').select('value').eq('key', 'ad_networks').single();
                allAds = result.data?.value || [];
                // ✅ Rétrocompatibilité : si mode absent → visible par défaut
                allAds.forEach(function(ad) { if (!ad.mode) ad.mode = 'visible'; });
                applyFilters();
                updateStats();
            } catch(e) {
                allAds = [];
                applyFilters();
                updateStats();
            }
        }

        async function saveAds() {
            var btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sauvegarde...';            var ok = await adminSave('ad_networks', allAds);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Sauvegarder';
            if (!ok) return;
            closeModal();
            await loadAds();
            alert('✅ Publicités sauvegardées !');
        }

        function applyFilters() {
            var search = document.getElementById('searchInput').value.toLowerCase();
            var page = document.getElementById('pageFilter').value;
            var mode = document.getElementById('modeFilter').value;
            
            filteredAds = allAds.filter(function(ad, idx) {
                var matchSearch = ad.name.toLowerCase().includes(search) || (ad.type || '').toLowerCase().includes(search);
                var matchPage = page === 'all' || ad.page === page;
                var matchMode = mode === 'all' || ad.mode === mode;
                ad._origIndex = idx;
                return matchSearch && matchPage && matchMode;
            });
            renderTable();
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = allAds.length;
            document.getElementById('statActive').textContent = allAds.filter(function(a) { return a.active; }).length;
            document.getElementById('statVisible').textContent = allAds.filter(function(a) { return a.mode === 'visible'; }).length;
            document.getElementById('statRewarded').textContent = allAds.filter(function(a) { return a.mode === 'rewarded'; }).length;
            document.getElementById('statEarn').textContent = allAds.filter(function(a) { return a.page === 'earn'; }).length;
        }

        function renderTable() {
            var tbody = document.getElementById('adsTableBody');
            if (filteredAds.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="fas fa-inbox"></i><br>Aucune publicité trouvée</td></tr>';
                return;
            }
            tbody.innerHTML = filteredAds.map(function(ad) {
                var modeClass = ad.mode === 'rewarded' ? 'mode-rewarded' : 'mode-visible';
                var modeLabel = ad.mode === 'rewarded' ? '🎁 Rewardé' : '📺 Visible';
                return '<tr>' +
                    '<td><span class="status-dot ' + (ad.active ? 'status-active' : 'status-inactive') + '"></span>' + (ad.active ? 'Actif' : 'Inactif') + '</td>' +
                    '<td class="ad-name">' + ad.name + '</td>' +
                    '<td class="ad-page">' + ad.page + '</td>' +
                    '<td><span class="mode-badge ' + modeClass + '">' + modeLabel + '</span></td>' +
                    '<td><span class="ad-type">' + (ad.type || 'smartlink') + '</span></td>' +
                    '<td>' + (ad.position || 'top') + '</td>' +
                    '<td class="ad-points">' + (ad.points != null ? '+' + ad.points : '-') + '</td>' +
                    '<td style="text-align:right"><div class="actions" style="justify-content:flex-end">' +                        '<button class="btn-action btn-edit" title="Modifier" onclick="editAd(' + ad._origIndex + ')"><i class="fas fa-pen"></i></button>' +
                        '<button class="btn-action btn-dup" title="Dupliquer" onclick="duplicateAd(' + ad._origIndex + ')"><i class="fas fa-copy"></i></button>' +
                        '<button class="btn-action" title="' + (ad.active ? 'Désactiver' : 'Activer') + '" onclick="toggleAd(' + ad._origIndex + ')"><i class="fas fa-' + (ad.active ? 'pause' : 'play') + '"></i></button>' +
                        '<button class="btn-action btn-del" title="Supprimer" onclick="deleteAd(' + ad._origIndex + ')"><i class="fas fa-trash"></i></button>' +
                    '</div></td></tr>';
            }).join('');
        }

        function openModal(index) {
            var modal = document.getElementById('modalOverlay');
            var title = document.getElementById('modalTitle');
            if (index !== undefined && index >= 0) {
                var ad = allAds[index];
                title.textContent = '✏️ Modifier : ' + ad.name;
                document.getElementById('editIndex').value = index;
                document.getElementById('adName').value = ad.name || '';
                document.getElementById('adPage').value = ad.page || 'earn';
                document.getElementById('adMode').value = ad.mode || 'visible';
                document.getElementById('adType').value = ad.type || 'smartlink';
                document.getElementById('adPosition').value = ad.position || 'top';
                document.getElementById('adPoints').value = ad.points != null ? ad.points : 15;
                document.getElementById('adCode').value = ad.code || '';
                document.getElementById('adActive').value = ad.active !== false ? 'true' : 'false';
            } else {
                title.textContent = '➕ Nouvelle Publicité';
                document.getElementById('editIndex').value = -1;
                document.getElementById('adForm').reset();
                document.getElementById('adMode').value = 'visible';
                document.getElementById('adPoints').value = 15;
            }
            modal.classList.add('active');
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
        function editAd(index) { openModal(index); }

        async function toggleAd(index) { allAds[index].active = !allAds[index].active; await saveAds(); }
        function duplicateAd(index) {
            var copy = JSON.parse(JSON.stringify(allAds[index]));
            copy.name = copy.name + ' (copie)';
            copy.active = false;
            allAds.push(copy);
            saveAds();
        }
        async function deleteAd(index) {
            if (!confirm('⚠️ Supprimer "' + allAds[index].name + '" ?')) return;
            allAds.splice(index, 1);
            await saveAds();
        }
        document.getElementById('adForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var editIdx = parseInt(document.getElementById('editIndex').value);
            var newAd = {
                name: document.getElementById('adName').value.trim(),
                page: document.getElementById('adPage').value,
                mode: document.getElementById('adMode').value,
                type: document.getElementById('adType').value,
                position: document.getElementById('adPosition').value,
                points: parseInt(document.getElementById('adPoints').value) || 0,
                code: document.getElementById('adCode').value.trim(),
                active: document.getElementById('adActive').value === 'true'
            };
            if (editIdx >= 0) allAds[editIdx] = newAd;
            else allAds.push(newAd);
            await saveAds();
        });

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('pageFilter').addEventListener('change', applyFilters);
        document.getElementById('modeFilter').addEventListener('change', applyFilters);
        document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeModal(); });

        checkAdmin();
    </script>
</body>
</html>
