<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique | Pixora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#050508;--surface:#0f0f14;--border:#1a1a24;--accent:#8B5CF6;--accent2:#EC4899;--gold:#FBBF24;--success:#10B981;--text:#FAFAFA;--muted:#A1A1AA;--dim:#52525B;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
        header{padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50}
        .logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
        .logo svg{width:28px;height:28px}
        .logo span{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#fff 20%,var(--accent) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .balance-pill{display:flex;align-items:center;gap:0.5rem;background:var(--surface);padding:0.5rem 1rem;border-radius:100px;border:1px solid var(--border);font-weight:600;font-size:0.9rem}
        .balance-pill i{color:var(--gold)}
        .balance-pill span{font-family:var(--mono)}
        main{flex:1;padding:2rem 1.5rem;max-width:900px;margin:0 auto;width:100%}
        .page-header{text-align:center;margin-bottom:2.5rem}
        .page-title{font-size:2rem;font-weight:700;margin-bottom:0.5rem}
        .page-subtitle{color:var(--muted);font-size:1rem}
        .balance-card{background:linear-gradient(135deg,rgba(251,191,36,0.1),rgba(139,92,246,0.1));border:1px solid rgba(251,191,36,0.3);border-radius:16px;padding:1.5rem 2rem;margin-bottom:2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
        .balance-left{display:flex;align-items:center;gap:1rem}
        .balance-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--gold),#F59E0B);display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#000}
        .balance-info h3{font-size:1.1rem;font-weight:700;margin-bottom:0.2rem}
        .balance-info p{color:var(--muted);font-size:0.85rem}
        .balance-amount{font-family:var(--mono);font-size:2rem;font-weight:800;color:var(--gold)}
        .btn-earn{padding:0.7rem 1.5rem;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:white;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem;text-decoration:none}
        .btn-earn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,92,246,0.3)}
        .section-title{font-size:1.1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
        .section-title i{color:var(--accent)}
        .shop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;margin-bottom:2.5rem}
        .shop-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;display:flex;flex-direction:column;gap:0.8rem;transition:all 0.2s;position:relative}
        .shop-item:hover{border-color:var(--accent)}
        .shop-item-header{display:flex;justify-content:space-between;align-items:flex-start}
        .shop-item-icon{width:48px;height:48px;border-radius:12px;background:rgba(139,92,246,0.15);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--accent)}
        .shop-item-type{font-family:var(--mono);font-size:0.7rem;padding:0.3rem 0.6rem;border-radius:6px;background:rgba(255,255,255,0.05);color:var(--muted);text-transform:uppercase}
        .shop-item-name{font-size:1rem;font-weight:600}
        .shop-item-desc{font-size:0.8rem;color:var(--muted);line-height:1.4}
        .shop-item-cost{font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--gold);margin-top:0.5rem}
        .btn-buy{width:100%;padding:0.8rem;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:white;transition:all 0.2s;margin-top:auto}
        .btn-buy:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,92,246,0.3)}
        .btn-buy:disabled{background:var(--border);color:var(--dim);cursor:not-allowed;transform:none;box-shadow:none}
        .btn-buy.purchased{background:var(--success);color:white}
        .history-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
        .history-table{width:100%;border-collapse:collapse;font-size:0.85rem;margin-top:1rem}
        .history-table th{text-align:left;padding:0.8rem;color:var(--muted);font-weight:600;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border)}        .history-table td{padding:0.8rem;border-bottom:1px solid var(--border);color:var(--text)}
        .history-table tr:last-child td{border-bottom:none}
        .empty-state{text-align:center;padding:3rem;color:var(--dim)}
        .empty-state i{font-size:3rem;margin-bottom:1rem;opacity:0.3}
        .toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface);border:1px solid var(--success);border-radius:12px;padding:1rem 1.5rem;display:flex;align-items:center;gap:0.8rem;box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:1000;animation:slideIn 0.3s}
        .toast.error{border-color:var(--danger)}
        .toast i{font-size:1.2rem;color:var(--success)}
        .toast.error i{color:var(--danger)}
        @keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}
        @media(max-width:768px){.shop-grid{grid-template-columns:1fr}.balance-card{flex-direction:column;text-align:center}.balance-left{flex-direction:column}}
    </style>
</head>
<body>
    <header>
        <a href="/index.html" class="logo">
            <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#lg)"/></svg>
            <span>Pixora</span>
        </a>
        <div class="balance-pill">
            <i class="fas fa-coins"></i>
            <span id="pointsDisplay">---</span>
        </div>
    </header>

    <main>
        <div class="page-header">
            <h1 class="page-title">Boutique</h1>
            <p class="page-subtitle">Échange tes points contre des récompenses exclusives</p>
        </div>

        <div class="balance-card">
            <div class="balance-left">
                <div class="balance-icon"><i class="fas fa-wallet"></i></div>
                <div class="balance-info">
                    <h3>Ton Solde</h3>
                    <p>Points disponibles</p>
                </div>
            </div>
            <div class="balance-amount" id="balanceAmount">---</div>
            <a href="/earn.html" class="btn-earn"><i class="fas fa-plus"></i> Gagner plus</a>
        </div>

        <div class="section-title"><i class="fas fa-store"></i> Items Disponibles</div>
        <div class="shop-grid" id="shopGrid">
            <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Chargement...</p></div>
        </div>

        <div class="section-title"><i class="fas fa-history"></i> Historique des Achats</div>
        <div class="history-card">
            <table class="history-table">                <thead><tr><th>Item</th><th>Points</th><th>Date</th></tr></thead>
                <tbody id="historyTable"><tr><td colspan="3" style="text-align:center;color:var(--dim)">Chargement...</td></tr></tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let user = null;
        let shopItems = [];

        async function init() {
            const { data: { user: u }, error } = await db.auth.getUser();
            if (error || !u) { window.location.href = '/index.html'; return; }
            user = u;
            await updateBalance();
            await loadShopItems();
            await loadHistory();
        }

        async function updateBalance() {
            const { data } = await db.from('user_data').select('points').eq('user_id', user.id).single();
            const points = data?.points || 0;
            document.getElementById('pointsDisplay').innerText = points.toLocaleString();
            document.getElementById('balanceAmount').innerText = points.toLocaleString();
        }

        async function loadShopItems() {
            const grid = document.getElementById('shopGrid');
            try {
                const { data: config } = await db.from('admin_config').select('value').eq('key', 'shop_items').single();
                shopItems = config?.value || [];
                const activeItems = shopItems.filter(item => item.active !== false);
                
                if (activeItems.length === 0) {
                    grid.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Aucun item disponible</p><p style="font-size:0.85rem;margin-top:0.5rem">Reviens plus tard !</p></div>';
                    return;
                }

                const { data: purchases } = await db.from('purchases').select('item_name').eq('user_id', user.id);
                const purchasedItems = new Set((purchases || []).map(p => p.item_name));

                grid.innerHTML = activeItems.sort((a, b) => (a.order || 0) - (b.order || 0)).map(item => {
                    const isPurchased = purchasedItems.has(item.name);
                    const userPoints = parseInt(document.getElementById('pointsDisplay').innerText.replace(/,/g, '')) || 0;
                    const canAfford = userPoints >= (item.cost || 0);
                    const typeColors = { badge:'var(--gold)', tier:'var(--accent)', pack:'var(--success)', cosmetic:'var(--accent2)' };                    const typeColor = typeColors[item.type] || 'var(--muted)';
                    
                    let btnText = 'Acheter';
                    let btnClass = 'btn-buy';
                    let btnDisabled = false;
                    
                    if (isPurchased && item.type !== 'pack') {
                        btnText = 'Déjà acheté';
                        btnClass += ' purchased';
                        btnDisabled = true;
                    } else if (!canAfford) {
                        btnText = 'Points insuffisants';
                        btnDisabled = true;
                    }

                    return `<div class="shop-item">
                        <div class="shop-item-header">
                            <div class="shop-item-icon"><i class="fas ${item.icon || 'fa-gift'}"></i></div>
                            <span class="shop-item-type" style="color:${typeColor}">${item.type || 'pack'}</span>
                        </div>
                        <div class="shop-item-name">${item.name}</div>
                        <div class="shop-item-desc">${item.desc || 'Récompense exclusive'}</div>
                        <div class="shop-item-cost">${item.cost || 0} pts</div>
                        <button class="${btnClass}" onclick="purchaseItem(${shopItems.indexOf(item)})" ${btnDisabled ? 'disabled' : ''}>${btnText}</button>
                    </div>`;
                }).join('');
            } catch(e) {
                console.error('Load shop error:', e);
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i><p style="color:var(--danger)">Erreur de chargement</p></div>';
            }
        }

        async function purchaseItem(index) {
            const item = shopItems[index];
            if (!item) return;

            const confirmMsg = `Confirmer l'achat de "${item.name}" pour ${item.cost} points ?`;
            if (!confirm(confirmMsg)) return;

            try {
                const { data: userData } = await db.from('user_data').select('points').eq('user_id', user.id).single();
                const currentPoints = userData?.points || 0;
                
                if (currentPoints < item.cost) {
                    showToast('Points insuffisants', true);
                    return;
                }

                const newPoints = currentPoints - item.cost;
                await Promise.all([                    db.from('user_data').update({ points: newPoints }).eq('user_id', user.id),
                    db.from('purchases').insert({ user_id: user.id, item_name: item.name, item_type: item.type, points_spent: item.cost }),
                    db.from('transactions').insert({ user_id: user.id, type: 'spent', title: `Achat: ${item.name}`, amount: -item.cost })
                ]);

                showToast(`✅ ${item.name} acheté ! -${item.cost} pts`);
                await updateBalance();
                await loadShopItems();
                await loadHistory();
            } catch(e) {
                console.error('Purchase error:', e);
                showToast('Erreur lors de l\'achat', true);
            }
        }

        async function loadHistory() {
            const tbody = document.getElementById('historyTable');
            try {
                const { data: purchases } = await db.from('purchases').select('*').eq('user_id', user.id).order('created_at', { ascending: false }).limit(20);
                
                if (!purchases || purchases.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--dim)">Aucun achat pour le moment</td></tr>';
                    return;
                }

                tbody.innerHTML = purchases.map(p => `
                    <tr>
                        <td style="font-weight:600">${p.item_name}</td>
                        <td style="font-family:var(--mono);color:var(--gold)">-${p.points_spent || 0}</td>
                        <td style="font-size:0.75rem;color:var(--dim)">${new Date(p.created_at).toLocaleString('fr-FR')}</td>
                    </tr>
                `).join('');
            } catch(e) {
                console.error('Load history error:', e);
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--dim)">Erreur de chargement</td></tr>';
            }
        }

        function showToast(message, isError = false) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s reverse';
                setTimeout(() => toast.remove(), 300);            }, 3000);
        }

        init();
    </script>
</body>
</html>
