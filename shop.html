<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixora - Boutique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#050507;--surf:rgba(24,24,27,0.6);--elev:rgba(39,39,42,0.8);--border:rgba(63,63,70,0.5);--prim:#8B5CF6;--sec:#EC4899;--gold:#FBBF24;--text:#FAFAFA;--muted:#A1A1AA;--font:'Inter',sans-serif;--hdr:rgba(20,20,23,0.85)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:90px}
        .bg-orbs{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4;animation:float 20s infinite ease-in-out}
        .o1{width:400px;height:400px;background:var(--prim);top:-100px;left:-100px}
        .o2{width:300px;height:300px;background:var(--sec);bottom:10%;right:-50px;animation-delay:-5s}
        @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.1)}66%{transform:translate(-20px,20px) scale(0.9)}}

        /* HEADER */
        .site-header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--hdr);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 1rem;height:60px;display:flex;align-items:center;justify-content:space-between}
        .header-logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:var(--text)}
        .header-logo svg{width:28px;height:28px}
        .logo-text{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#fff 20%,var(--prim) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-right{display:flex;align-items:center;gap:0.7rem;position:relative}
        .user-stats{display:none;align-items:center;gap:0.4rem;padding:0.35rem; background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:20px}
        .user-stats.show{display:flex}
        .stat-icon{color:var(--gold);font-size:0.75rem}
        .stat-points{font-family:var(--mono);font-size:0.8rem;font-weight:700;color:var(--gold)}
        .user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--prim),var(--sec));display:none;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;cursor:pointer;color:white}
        .user-avatar.show{display:flex}
        .btn-auth{padding:0.4rem 0.9rem;background:linear-gradient(135deg,var(--prim),var(--sec));color:white;border-radius:10px;font-size:0.78rem;font-weight:600;display:flex;align-items:center;gap:0.4rem}
        @media(max-width:767px){.user-stats{display:none}.site-header{padding:0 0.8rem}.btn-auth{padding:0.35rem 0.75rem;font-size:0.72rem}.logo-text{font-size:1.05rem}}

        /* USER MENU */
        .user-menu{position:absolute;top:calc(100% + 10px);right:0;width:260px;background:var(--elev);border:1px solid var(--border);border-radius:16px;padding:0.6rem;opacity:0;visibility:hidden;transform:translateY(-8px);transition:all 0.25s;z-index:1001}
        .user-menu.show{opacity:1;visibility:visible;transform:translateY(0)}
        .menu-item{display:block;padding:0.6rem;color:var(--text);font-size:0.85rem;text-decoration:none;cursor:pointer}
        .menu-item:hover{background:rgba(139,92,246,0.1)}

        /* MOBILE NAV */
        .nav-mobile{position:fixed;bottom:0;left:0;right:0;background:rgba(9,9,11,0.95);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:0.4rem 0 0.5rem}
        .nav-item{width:58px;height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.15rem;color:var(--muted)}
        .nav-item.active{color:var(--prim)}
        .nav-item[data-nav="gallery"].active{color:#3B82F6}
        .nav-item[data-nav="points"].active{color:var(--gold)}
        .nav-item[data-nav="profile"].active{color:var(--sec)}

        /* SHOP CONTENT */
        .shop-content{max-width:800px;margin:0 auto;padding:1rem;padding-top:72px}        .shop-hero{text-align:center;padding:1.5rem 1rem;margin-bottom:2rem}
        .shop-hero h1{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#fff 0%,var(--prim) 50%,var(--sec) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .shop-hero p{color:var(--muted);font-size:0.9rem}
        .section-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--dim);margin-bottom:1rem}
        .packs-grid,.subs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:0.8rem;margin-bottom:2rem}
        .pack-card{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:1.2rem;transition:transform 0.3s}
        .pack-card:hover{transform:translateY(-3px)}
        .pack-icon{width:48px;height:48px;background:var(--prim);border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;margin-bottom:0.8rem}
        .pack-name{font-size:1rem;font-weight:700;margin-bottom:0.2rem}
        .pack-points{font-family:var(--mono);font-size:1.3rem;font-weight:800;color:var(--gold);margin-bottom:0.4rem}
        .buy-btn{width:100%;padding:0.7rem;background:var(--prim);color:white;border-radius:12px;font-weight:600;margin-top:0.8rem}
    </style>
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>

<!-- HEADER -->
<header class="site-header">
    <a href="index.html" class="header-logo">
        <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#hg)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/><path d="M16 2L4 10L16 14L16 2Z" fill="rgba(255,255,255,0.2)"/></svg>
        <span class="logo-text">Pixora</span>
    </a>
    <div class="header-right">
        <div class="user-stats" id="user-stats">
            <i class="fas fa-bolt stat-icon"></i>
            <span class="stat-points" id="header-points">0</span>
        </div>
        <div class="user-avatar" id="user-avatar" onclick="document.getElementById('menu').classList.toggle('show')">U</div>
        <button class="btn-auth" id="auth-btn" onclick="window.location.href='index.html'">Connexion</button>
    </div>
</header>

<!-- USER MENU -->
<div class="user-menu" id="menu">
    <div class="menu-item" onclick="window.location.href='profile.html'">👤 Mon profil</div>
    <div class="menu-item" onclick="window.location.href='earn.html'">⚡ Gagner des points</div>
    <div class="menu-item" onclick="window.location.href='shop.html'">🛒 Mes achats</div>
    <div class="menu-item" style="color:#EF4444" onclick="alert('Déconnexion')">🚪 Déconnexion</div>
</div>

<!-- MOBILE NAV -->
<nav class="nav-mobile">
    <a href="index.html" class="nav-item"><i class="fas fa-wand-magic-sparkles"></i><span>Studio</span></a>
    <a href="gallery.html" class="nav-item"><i class="fas fa-images"></i><span>Galerie</span></a>
    <a href="earn.html" class="nav-item"><i class="fas fa-coins"></i><span>Points</span></a>
    <a href="#" class="nav-item" onclick="document.getElementById('menu').classList.toggle('show')"><i class="fas fa-user"></i></a>
</nav>

<!-- MAIN --><main class="shop-content">
    <div class="shop-hero">
        <h1>Rechargez Pixora</h1>
        <p>Obtenez des crédits pour générer des images et vidéos IA sans limite.</p>
    </div>

    <div class="section-label">Packs de Points</div>
    <div class="packs-grid">
        <div class="pack-card">
            <div class="pack-icon"><i class="fas fa-bolt"></i></div>
            <div class="pack-name">Starter</div>
            <div class="pack-points">100 pts</div>
            <div>~6 images</div>
            <button class="buy-btn">Acheter 0,99€</button>
        </div>
        <div class="pack-card">
            <div class="pack-icon"><i class="fas fa-bolt"></i></div>
            <div class="pack-name">Popular</div>
            <div class="pack-points">500 pts</div>
            <div>~33 images</div>
            <button class="buy-btn">Acheter 4,99€</button>
        </div>
    </div>

    <div class="section-label">Abonnements</div>
    <div class="subs-grid">
        <div class="pack-card">
            <div class="pack-icon"><i class="fas fa-crown"></i></div>
            <div class="pack-name">Basic</div>
            <div class="pack-points">2000 pts/mois</div>
            <div>Vidéos incluses</div>
            <button class="buy-btn">S'abonner 9,99€</button>
        </div>
    </div>
</main>

<script>

document.addEventListener('DOMContentLoaded', function() {

});
</script>
</body>
</html>
