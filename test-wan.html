<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Plan C - Pixora</title>
<style>
  body{font-family:sans-serif;padding:16px;background:#0f0f14;color:#fafafa;max-width:640px;margin:0 auto}
  h1{font-size:1.2rem;margin:.2rem 0}
  .sub{color:#A1A1AA;font-size:.76rem;margin-bottom:1rem}
  textarea{width:100%;min-height:60px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;color:#fafafa;padding:10px;font-size:.92rem;font-family:inherit;resize:vertical;box-sizing:border-box}
  button{padding:13px 20px;background:linear-gradient(135deg,#8B5CF6,#EC4899);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;margin-top:10px}
  button:disabled{opacity:.5;cursor:not-allowed}
  #status{margin-top:12px;font-size:.85rem;color:#A1A1AA;min-height:1.2em}
  #status.ok{color:#10B981}#status.ko{color:#EF4444}#status.ld{color:#8B5CF6}
  video{max-width:100%;border-radius:12px;margin-top:12px;display:block;background:#000}
  .dl{display:inline-block;margin-top:10px;padding:11px 18px;background:#10B981;color:#fff;border-radius:10px;font-weight:700;text-decoration:none}
  pre{background:#0c0c12;padding:8px;border-radius:6px;font-size:.64rem;white-space:pre-wrap;word-break:break-all;max-height:340px;overflow:auto;margin-top:8px;color:#cbd5e1}
</style>
</head>
<body>
<h1>🧪 Test Plan C</h1>
<div class="sub">Appelle /api/gen-video (badge côté serveur). Cette version affiche l'erreur réelle du serveur (plus de « réponse vide »).</div>

<textarea id="prompt">a cat running in a field, cinematic lighting, smooth motion</textarea>
<button id="btn" onclick="run()">▶️ Tester le plan C</button>
<div id="status">Prêt.</div>
<div id="media"></div>
<pre id="raw" style="display:none"></pre>

<script>
function setStatus(t,c){ var e=document.getElementById('status'); e.className=c||''; e.textContent=t; }

async function run(){
  var btn=document.getElementById('btn'), media=document.getElementById('media'), raw=document.getElementById('raw');
  var prompt=(document.getElementById('prompt').value||'').trim()||'a cat running in a field';
  btn.disabled=true; media.innerHTML=''; raw.style.display='none'; raw.textContent='';
  setStatus('Appel /api/gen-video…','ld');
  var t0=Date.now();

  try{
    var res=await fetch('/api/gen-video',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:prompt})
    });
    var sec=((Date.now()-t0)/1000).toFixed(1);

    // lire le body UNE SEULE fois, selon le content-type
    var json=null, txt='';
    var ct=(res.headers.get('content-type')||'').toLowerCase();
    if(ct.indexOf('json')>=0){
      try{ json=await res.json(); }catch(e){ txt=await res.text().catch(function(){return '';}); }
    } else {
      txt=await res.text().catch(function(){return '';});
    }

    // succès
    if(res.ok && json && json.url){
      media.innerHTML='<video src="'+json.url+'" controls autoplay loop muted playsinline></video>'
        +'<br><a class="dl" href="'+json.url+'" target="_blank" rel="noopener">🔗 Ouvrir / enregistrer</a>';
      setStatus('✅ Vidéo en '+sec+'s','ok');
      btn.disabled=false; return;
    }

    // erreur : afficher le VRAI message serveur
    var detail='';
    if(json){ detail=(json.error||'erreur sans message')+(json.raw?('\n\nRAW:\n'+json.raw):''); }
    else { detail=txt||'(aucun body reçu du serveur)'; }
    raw.style.display='block'; raw.textContent=detail;
    setStatus('❌ HTTP '+res.status+' ('+sec+'s)','ko');

  }catch(e){
    setStatus('❌ '+e.message,'ko');
    raw.style.display='block'; raw.textContent='EXCEPTION CLIENT: '+e.message;
  }
  btn.disabled=false;
}
</script>
</body>
</html>
