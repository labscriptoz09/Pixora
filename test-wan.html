<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🔍 Debug SiliconFlow</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: monospace; padding: 20px; }
        .log { margin: 10px 0; padding: 12px; background: #1a1a1a; border-left: 4px solid #6d28d9; }
        .success { border-color: #10b981; }
        .error { border-color: #ef4444; }
        .info { border-color: #3b82f6; }
        button { background: #6d28d9; color: white; border: none; padding: 10px 20px; margin: 10px 0; }
    </style>
</head>
<body>
    <h2>🔍 Debug SiliconFlow API</h2>
    <button onclick="testPing()">1. Ping API</button>
    <button onclick="testPost()">2. POST Génération</button>
    <div id="logs"></div>

<script>
const LOG = (msg, type = 'info') => {
    const div = document.createElement('div');
    div.className = `log ${type}`;
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    document.getElementById('logs').appendChild(div);
    document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;
};

async function callApi(url, options = {}) {
    try {
        LOG(`➡️ CALL: ${url}`, 'info');
        const res = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${getApiKey()}`,
                ...options.headers
            },
            body: options.body ? JSON.stringify(options.body) : undefined
        });
        
        LOG(`⬅️ STATUS: ${res.status} ${res.statusText}`, res.ok ? 'success' : 'error');
        
        let text = '';
        try { text = await res.text(); } catch(e) {}
        LOG(`RESPONSE: ${text.length > 500 ? text.slice(0, 500)+'...' : text}`, 'info');
        
        return { res, text };
    } catch (err) {        LOG(`❌ ERROR: ${err.message}`, 'error');
        return { error: err };
    }
}

function getApiKey() {
    // ⚠️ Remplace par UNE de tes clés pour tester
    return "sk-xxx"; // ← MODIFIE ICI avec SILICONFLOW_KEY_1
}

async function testPing() {
    LOG("🔍 Test ping (GET)");
    try {
        const res = await fetch('/api/gen-video');
        const data = await res.json();
        LOG(`✅ GET /api/gen-video: ${JSON.stringify(data)}`, 'success');
    } catch (e) {
        LOG(`❌ GET failed: ${e.message}`, 'error');
    }
}

async function testPost() {
    LOG("🚀 Test POST génération");
    
    // Test 1: endpoint .cn
    LOG("→ Test 1: api.siliconflow.cn/v1/videos");
    let { res: r1, text: t1 } = await callApi(
        'https://api.siliconflow.cn/v1/videos',
        {
            body: { model: "Wan-AI/Wan2.1-T2V-1.3B", prompt: "test", width: 832, height: 480, video_length: 5 },
            headers: { 'X-API-Key': getApiKey() } // Essaye aussi avec X-API-Key
        }
    );
    
    // Test 2: endpoint .com /v1/video
    LOG("→ Test 2: api.siliconflow.com/v1/video");
    let { res: r2, text: t2 } = await callApi(
        'https://api.siliconflow.com/v1/video',
        {
            body: { model: "Wan-AI/Wan2.1-T2V-1.3B", prompt: "test", width: 832, height: 480, duration: 5 },
            headers: { 'Authorization': `Bearer ${getApiKey()}` }
        }
    );
    
    // Test 3: endpoint .com /v1/videos (sans s)
    LOG("→ Test 3: api.siliconflow.com/v1/videos");
    let { res: r3, text: t3 } = await callApi(
        'https://api.siliconflow.com/v1/videos',
        {
            body: { model: "Wan-AI/Wan2.1-T2V-1.3B", prompt: "test", width: 832, height: 480, video_length: 5 },            headers: { 'X-API-Key': getApiKey() }
        }
    );

    LOG("✅ Tests terminés. Regarde les logs ci-dessus.");
}
</script>
</body>
</html>
