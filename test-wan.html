<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Wan via Proxy - Pixora</title>
<style>
  body{font-family:sans-serif;padding:16px;background:#0f0f14;color:#fafafa;max-width:640px;margin:0 auto}
  h1{font-size:1.15rem}
  .sub{color:#A1A1AA;font-size:.78rem;margin:.3rem 0 1rem}
  button{padding:12px 24px;background:linear-gradient(135deg,#8B5CF6,#EC4899);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;width:100%}
  button:disabled{opacity:.5;cursor:not-allowed}
  #status{padding:10px;margin:10px 0;border-radius:8px;background:#1e1e2e;border:1px solid #3b3b4a;font-size:.85rem;white-space:pre-wrap;word-break:break-word}
  .ok{border-color:#10B981;color:#10B981}.ko{border-color:#EF4444;color:#EF4444}.ld{border-color:#8B5CF6;color:#8B5CF6}
  video,img{max-width:100%;border-radius:12px;margin-top:10px;display:block;background:#000}
  details{margin-top:12px}
  summary{cursor:pointer;color:#8B5CF6;font-size:.8rem;font-weight:700}
  pre{background:#16161e;padding:10px;border-radius:8px;font-size:.66rem;overflow:auto;max-height:340px;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>
<h1>🧪 Test Wan 2.2 via Proxy serveur</h1>
<div class="sub">Appelle /api/wan-proxy (même origine = zéro CORS). Aucune clé requise. 1er appel peut réveiller le GPU (~30-60s).</div>

<button id="btn" onclick="run()">▶️ Lancer le test Wan (proxy)</button>
<div id="status" class="ld">En attente…</div>
<div id="media"></div>
<details><summary>📋 Voir le journal technique (steps serveur)</summary><pre id="log">—</pre></details>

<script>
function setStatus(msg, cls){ var el=document.getElementById('status'); el.className=cls||''; el.textContent=msg; }
async function run(){
  var btn=document.getElementById('btn'); var media=document.getElementById('media'); var logEl=document.getElementById('log');
  btn.disabled=true; btn.textContent='⏳ Génération en cours…'; media.innerHTML=''; logEl.textContent='—';
  setStatus('🔄 Appel du proxy /api/wan-proxy … (patience, le GPU peut démarrer)', 'ld');
  var t0=Date.now();
  try {
    var r = await fetch('/api/wan-proxy', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ prompt: 'a cat running in a field, cinematic lighting, smooth motion' })
    });
    var json = await r.json();
    logEl.textContent = JSON.stringify(json.steps || json, null, 2);
    var sec = ((Date.now()-t0)/1000).toFixed(1);
    if (json.url) {
      setStatus('✅ VIDÉO GÉNÉRÉE en '+sec+'s !', 'ok');
      media.innerHTML = '<video src="'+json.url+'" controls autoplay loop muted playsinline></video><pre>url = '+json.url+'</pre>';
      btn.textContent='✅ RÉUSSI'; btn.style.background='#10B981';
    } else {
      setStatus('❌ '+ (json.error||'erreur inconnue') +' ('+sec+'s)', 'ko');
      btn.textContent='❌ ÉCHOUÉ'; btn.style.background='#EF4444';
    }
  } catch(e){
    setStatus('❌ Exception réseau : '+e.message, 'ko');
    logEl.textContent = String(e && e.stack || e);
    btn.textContent='❌ ÉCHOUÉ'; btn.style.background='#EF4444';
  }
  btn.disabled=false;
}
</script>
</body>
</html>
