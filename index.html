// =============================================
// DÉTECTION PARRAINAGE (?ref=USER_ID)
// =============================================
function detectReferral() {
    var params = new URLSearchParams(window.location.search);
    var ref = params.get('ref');
    if (ref && ref.length > 10) {
        pendingReferrer = ref;
        localStorage.setItem('pixora_ref', ref);
    } else {
        pendingReferrer = localStorage.getItem('pixora_ref');
    }}

async function processReferral(newUserId) {
    var referrerId = pendingReferrer || localStorage.getItem('pixora_ref');
    if (!referrerId || referrerId === newUserId) return;

    try {
        var { data: refConfig } = await db.from('admin_config').select('value').eq('key','referral_config').single();
        var config = refConfig?.value || { enabled:true, points:10, condition:'signup_gen' };
        if (!config.enabled) return;

        // Vérifier que le parrain existe
        var { data: sponsor } = await db.from('users').select('id').eq('id', referrerId).single();
        if (!sponsor) return;

        // Vérifier si déjà parrainé par ce user
        var { data: existing } = await db.from('referrals').select('id').eq('sponsor_id', referrerId).eq('referred_id', newUserId).single();
        if (existing) return;

        // Créer l'entrée parrainage (en attente de validation)
        var isValidated = config.condition === 'signup_only';
        await db.from('referrals').insert({
            sponsor_id: referrerId,
            referred_id: newUserId,
            points: config.points || 10,
            validated: isValidated
        });

        // Si validation immédiate (signup_only), créditer tout de suite
        if (isValidated) {
            var { data: sponsorData } = await db.from('user_data').select('points').eq('user_id', referrerId).single();
            var newPts = (sponsorData?.points || 0) + (config.points || 10);
            await Promise.all([
                db.from('user_data').update({ points: newPts }).eq('user_id', referrerId),
                db.from('transactions').insert({ user_id: referrerId, type: 'earned', title: 'Parrainage validé', amount: config.points || 10 })
            ]);
        }

        localStorage.removeItem('pixora_ref');
        pendingReferrer = null;
    } catch(e) { console.error('Referral error:', e); }
}

async function validatePendingReferral(userId) {
    try {
        var { data: refs } = await db.from('referrals').select('id,sponsor_id,points').eq('referred_id', userId).eq('validated', false);
        if (!refs || refs.length === 0) return;

        for (var i = 0; i < refs.length; i++) {
            var ref = refs[i];            await db.from('referrals').update({ validated: true }).eq('id', ref.id);

            var { data: sponsorData } = await db.from('user_data').select('points').eq('user_id', ref.sponsor_id).single();
            var newPts = (sponsorData?.points || 0) + (ref.points || 10);
            await Promise.all([
                db.from('user_data').update({ points: newPts }).eq('user_id', ref.sponsor_id),
                db.from('transactions').insert({ user_id: ref.sponsor_id, type: 'earned', title: 'Parrainage validé (1ère gen)', amount: ref.points || 10 })
            ]);
        }
    } catch(e) { console.error('Validate referral error:', e); }
}

// =============================================
// BONUS INSCRIPTION
// =============================================
async function grantSignupBonus(userId) {
    try {
        var { data: bonusConfig } = await db.from('admin_config').select('value').eq('key','signup_bonus').single();
        var bonus = bonusConfig?.value || 15;
        if (bonus <= 0) return;

        // Vérifier si déjà donné
        var { data: existing } = await db.from('transactions').select('id').eq('user_id', userId).eq('title', 'Bonus inscription').single();
        if (existing) return;

        var { data: userData } = await db.from('user_data').select('points,total_earned').eq('user_id', userId).single();
        var newPts = (userData?.points || 0) + bonus;
        var newEarned = (userData?.total_earned || 0) + bonus;

        await Promise.all([
            db.from('user_data').update({ points: newPts, total_earned: newEarned }).eq('user_id', userId),
            db.from('transactions').insert({ user_id: userId, type: 'earned', title: 'Bonus inscription', amount: bonus })
        ]);
    } catch(e) { console.error('Signup bonus error:', e); }
}

    setTimeout(function() { n.classList.remove('show'); }, 3000);

async function getUserData() {
    var u = await getUser(); if (!u) return { points: 0, streak: 1, total_generated: 0, total_earned: 0 };
    var r = await db.from('user_data').select('*').eq('user_id', u.id).single();
    return r.data || { points: 0, streak: 1, total_generated: 0, total_earned: 0 };
}

async function saveTransaction(type, title, amount) {
    var u = await getUser(); if (!u) return;
    await db.from('transactions').insert({ user_id: u.id, type: type, title: title, amount: amount });
    var d = await getUserData(); var up = { points: d.points + amount };
    if (amount > 0) up.total_earned = (d.total_earned || 0) + amount;
    await db.from('user_data').update(up).eq('user_id', u.id);
}

// =============================================
// LIGHTBOX
// =============================================
function openLB(url, type) {
    lbUrl = url; lbType = type || 'image';
    var c = document.getElementById('lb-container'); c.innerHTML = '';
    if (lbType === 'video') {
        var v = document.createElement('video'); v.src = url; v.controls = true; v.autoplay = true; v.loop = true;
        v.style.cssText = 'max-width:90vw;max-height:70vh;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.8)'; c.appendChild(v);
    } else {
        var i = document.createElement('img'); i.src = url; i.alt = 'Zoom'; c.appendChild(i);
    }    document.getElementById('lightbox').classList.add('active'); document.body.style.overflow = 'hidden';
}
function closeLB() { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow = ''; document.getElementById('lb-container').innerHTML = ''; lbUrl = ''; lbType = 'image'; }
document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLB(); });

async function dlLB() {
    if (!lbUrl) return;
    try { var r = await fetch(lbUrl); var b = await r.blob(); var ext = lbType === 'video' ? '.mp4' : '.jpg'; var u = URL.createObjectURL(b); var a = document.createElement('a'); a.href = u; a.download = 'pixora-' + Date.now() + ext; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); notify('📥 Téléchargé !', 'success'); } catch(e) { window.open(lbUrl, '_blank'); }
}
async function dlDirect(btn) {
    var card = btn.closest('.result-card'); var media = card.querySelector('img') || card.querySelector('video');
    if (!media || !media.src) return;
    try { var r = await fetch(media.src); var b = await r.blob(); var isV = media.tagName === 'VIDEO'; var ext = isV ? '.mp4' : '.jpg'; var u = URL.createObjectURL(b); var a = document.createElement('a'); a.href = u; a.download = 'pixora-' + Date.now() + ext; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); notify('📥 Téléchargé !', 'success'); } catch(e) { window.open(media.src, '_blank'); }
}

function selType(t) {
    curType = t;
    document.querySelectorAll('.type-btn').forEach(function(c, i) { c.classList.toggle('active', (t === 'image' && i === 0) || (t === 'video' && i === 1)); });
}

async function loadStudio() {
    var grid = document.getElementById('results-grid');
    try {
        var result = await db.storage.from(BUCKET).list('', { limit: 20, sortBy: { column: 'created_at', order: 'desc' } });
        if (!result.data || result.data.length === 0) return;
        var now = Date.now(); grid.innerHTML = '';
        result.data.forEach(function(file) {
            var createdAt = new Date(file.created_at).getTime();
            if ((now - createdAt) < 3600000) {
                var urlData = db.storage.from(BUCKET).getPublicUrl(file.name);
                var url = urlData.data.publicUrl;
                var isVideo = file.name.indexOf('_video_') !== -1;
                var card = document.createElement('div'); card.className = 'result-card';
                if (isVideo) {
                    card.innerHTML = '<video src="' + url + '" muted loop playsinline loading="lazy"></video><div class="result-overlay"><button class="icon-btn" onclick="event.stopPropagation();dlDirect(this)"><i class="fas fa-download"></i></button></div>';
                    var vid = card.querySelector('video'); vid.onmouseenter = function() { vid.play(); }; vid.onmouseleave = function() { vid.pause(); vid.currentTime = 0; };
                } else {
                    card.innerHTML = '<img src="' + url + '" alt="Création" loading="lazy"><div class="result-overlay"><button class="icon-btn" onclick="event.stopPropagation();dlDirect(this)"><i class="fas fa-download"></i></button></div>';
                }
                card.onclick = function() { openLB(url, isVideo ? 'video' : 'image'); };
                grid.appendChild(card);
                setTimeout(function() { if (card.parentNode === grid) card.remove(); }, 3600000 - (now - createdAt));
            }
        });
    } catch (err) { console.error('Studio load error:', err); }
}
async function uploadToStorage(mediaUrl, type) {
    try {
        var response = await fetch(mediaUrl); var blob = await response.blob();
        var prefix = type === 'video' ? '_video_' : '_img_';
        var fileName = Date.now() + prefix + Math.floor(Math.random() * 100000) + (type === 'video' ? '.mp4' : '.jpg');
        var contentType = type === 'video' ? 'video/mp4' : 'image/jpeg';
        await db.storage.from(BUCKET).upload(fileName, blob, { contentType: contentType, upsert: false });
        loadStudio();
    } catch (err) { console.error('Upload failed:', err); }
}

async function generate() {
    var p = document.getElementById('prompt').value.trim();
    if (!p) { notify('Veuillez entrer un prompt', 'error'); return; }
    var logged = await isLogged();
    if (!logged) { openAuth(); return; }

    await loadUserTier();
    var c = CONFIG_TIERS[currentTier] || DEFAULT_TIERS[1];
    var cost = curType === 'image' ? c.costs.image : c.costs.video;
    var userData = await getUserData();
    if (userData.points < cost) { notify('Points insuffisants ! Visitez la page Points.', 'error'); return; }

    notify('🎨 Génération en cours...', 'success');
    var seed = Math.floor(Math.random() * 100000);
    var url = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(p) + '?width=512&height=512&nologo=true&seed=' + seed;
    if (curType === 'video') url += '&type=video';

    var grid = document.getElementById('results-grid');
    var card = document.createElement('div'); card.className = 'result-card';
    if (curType === 'video') {
        card.innerHTML = '<div class="timer-overlay"><div class="timer-text" id="tmr">0.0s</div><div class="timer-label">Génération vidéo...</div></div><video src="' + url + '" muted loop playsinline style="opacity:0;transition:opacity 0.3s"></video><div class="result-overlay"><button class="icon-btn" onclick="event.stopPropagation();dlDirect(this)"><i class="fas fa-download"></i></button></div>';
    } else {
        card.innerHTML = '<div class="timer-overlay"><div class="timer-text" id="tmr">0.0s</div><div class="timer-label">Génération IA...</div></div><img src="' + url + '" alt="" loading="lazy" style="opacity:0;transition:opacity 0.3s"><div class="result-overlay"><button class="icon-btn" onclick="event.stopPropagation();dlDirect(this)"><i class="fas fa-download"></i></button></div>';
    }
    grid.insertBefore(card, grid.firstChild);

    var st = Date.now(); var tmr = document.getElementById('tmr');
    var iv = setInterval(function() { if (tmr) tmr.textContent = ((Date.now() - st) / 1000).toFixed(1) + 's'; }, 100);

    var media = curType === 'video' ? card.querySelector('video') : card.querySelector('img');
    var loaded = false;
    function onLoad() {
        if (loaded) return; loaded = true; clearInterval(iv);
        var elapsed = ((Date.now() - st) / 1000).toFixed(1);
        var to = card.querySelector('.timer-overlay'); if (to) to.remove();
        media.style.opacity = '1';
        if (curType === 'video') { media.onmouseenter = function() { media.play(); }; media.onmouseleave = function() { media.pause(); media.currentTime = 0; }; }
        card.onclick = function() { openLB(url, curType); };
        uploadToStorage(url, curType);
        // Déduire les points
        saveTransaction('spent', 'Génération ' + curType, -cost).then(function() { updateUI(); });

        // Valider le parrainage en attente (condition signup_gen)
        var u = getUser();
        if (u) validatePendingReferral(u.id);

        // Incrémenter total_generated
        db.from('user_data').update({ total_generated: (userData.total_generated || 0) + 1 }).eq('user_id', userData.user_id || '').catch(function(){});

        notify('✅ Générée en ' + elapsed + 's ! (-' + cost + ' pts)', 'success');
        setTimeout(function() { if (card.parentNode === grid) card.remove(); }, 3600000);
    }
    if (curType === 'video') { media.onloadeddata = onLoad; media.onerror = function() { clearInterval(iv); card.remove(); notify('❌ Génération vidéo échouée.', 'error'); }; }
    else { media.onload = onLoad; media.onerror = function() { clearInterval(iv); card.remove(); notify('❌ Génération échouée. Réessayez.', 'error'); }; }
}

// =============================================
// AUTH STATE
// =============================================
var authNotified = false;
db.auth.onAuthStateChange(async function(event) {
    if (event === 'SIGNED_IN') {
        await loadUserTier();
        updateUI();
        closeAuth();
        if (!authNotified) { notify('✅ Connecté !', 'success'); authNotified = true; setTimeout(function() { authNotified = false; }, 3000); }
    } else if (event === 'SIGNED_OUT') {
        currentTier = 1;
        updateCostUI();
        updateUI();
        authNotified = false;
    } else if (event === 'TOKEN_REFRESHED') {
        updateUI();
    }
});

// =============================================
// INIT
// =============================================
document.addEventListener('DOMContentLoaded', async function() {
    detectReferral();
    await loadDynamicConfig();
    await loadUserTier();
    await updateUI();
    await loadStudio();
});
</script>
