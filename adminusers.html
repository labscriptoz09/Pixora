<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Utilisateurs | Pixora Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#050508;--surface:#0f0f14;--border:#1a1a24;--accent:#8B5CF6;--accent2:#EC4899;--gold:#FBBF24;--success:#10B981;--danger:#EF4444;--warning:#F59E0B;--text:#FAFAFA;--muted:#A1A1AA;--font:'Inter',sans-serif}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:1rem}
        .container{max-width:1400px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:1rem}
        .title-group h1{font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:0.5rem}
        .badge-admin{background:rgba(139,92,246,0.2);color:var(--accent);padding:0.2rem 0.6rem;border-radius:4px;font-size:0.7rem;font-weight:700;text-transform:uppercase}
        .btn-back{padding:0.5rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);text-decoration:none;font-size:0.9rem;transition:all 0.2s}
        .btn-back:hover{border-color:var(--accent)}
        .stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.8rem;margin-bottom:1.5rem}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.8rem;text-align:center}
        .stat-val{font-size:1.4rem;font-weight:700;color:var(--accent)}
        .stat-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;margin-top:0.2rem}
        .controls{display:flex;gap:0.8rem;margin-bottom:1.5rem;flex-wrap:wrap}
        .search-box{flex:1;min-width:200px;position:relative}
        .search-box input{width:100%;padding:0.7rem 0.7rem 0.7rem 2.5rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem}
        .search-box i{position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);color:var(--muted)}
        .filter-select{padding:0.7rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;min-width:150px}
        .table-container{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
        table{width:100%;border-collapse:collapse}
        th{background:rgba(139,92,246,0.1);padding:0.8rem;text-align:left;font-size:0.75rem;text-transform:uppercase;color:var(--muted);font-weight:600}
        td{padding:0.8rem;border-bottom:1px solid var(--border);font-size:0.85rem;vertical-align:middle}
        tr:last-child td{border-bottom:none}
        tr:hover{background:rgba(255,255,255,0.02)}
        .user-email{font-weight:600;color:var(--text)}
        .user-points{color:var(--gold);font-weight:700;font-family:'JetBrains Mono',monospace}
        .status-badge{font-family:'JetBrains Mono',monospace;font-size:0.7rem;padding:0.2rem 0.5rem;border-radius:4px;font-weight:600}
        .status-active{background:rgba(16,185,129,0.2);color:var(--success)}
        .status-banned{background:rgba(239,68,68,0.2);color:var(--danger)}
        .actions{display:flex;gap:0.4rem}
        .btn-action{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:0.8rem}
        .btn-edit:hover{border-color:var(--accent);color:var(--accent)}
        .btn-ban:hover{border-color:var(--warning);color:var(--warning)}
        .btn-del:hover{border-color:var(--danger);color:var(--danger)}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}
        .modal-overlay.active{display:flex}
        .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:1.5rem}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
        .modal-title{font-size:1.2rem;font-weight:700}
        .btn-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}        .form-group{margin-bottom:1rem}
        label{display:block;margin-bottom:0.4rem;font-size:0.8rem;font-weight:600;color:var(--muted)}
        input,select{width:100%;padding:0.7rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;font-family:var(--font)}
        input:focus,select:focus{outline:none;border-color:var(--accent)}
        .btn-save{width:100%;padding:0.9rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:white;font-weight:700;font-size:1rem;cursor:pointer;margin-top:0.5rem}
        .btn-save:disabled{opacity:0.5;cursor:not-allowed}
        .empty-state{text-align:center;padding:3rem;color:var(--muted)}
        .empty-state i{font-size:2.5rem;margin-bottom:1rem;opacity:0.3}
        @media(max-width:768px){
            .table-container{overflow-x:auto}
            table{min-width:700px}
            .stats-bar{grid-template-columns:repeat(2,1fr)}
        }
    </style>
</head>
<body>
    <div class="container" id="mainContent" style="display:none">
        <div class="header">
            <div class="title-group">
                <h1><i class="fas fa-users"></i> Gestion Utilisateurs <span class="badge-admin">Admin</span></h1>
            </div>
            <a href="admin.html" class="btn-back"><i class="fas fa-arrow-left"></i> Retour Admin</a>
        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-card"><div class="stat-val" id="statTotal">-</div><div class="stat-label">Total Inscrits</div></div>
            <div class="stat-card"><div class="stat-val" id="statActive">-</div><div class="stat-label">Actifs</div></div>
            <div class="stat-card"><div class="stat-val" id="statBanned">-</div><div class="stat-label">Bannis</div></div>
            <div class="stat-card"><div class="stat-val" id="statPoints">-</div><div class="stat-label">Points Distribués</div></div>
        </div>

        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Rechercher par email...">
            </div>
            <select class="filter-select" id="statusFilter">
                <option value="all">Tous les statuts</option>
                <option value="active">Actifs</option>
                <option value="banned">Bannis</option>
            </select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Statut</th>
                        <th>Email</th>
                        <th>Points</th>                        <th>Pubs Vues</th>
                        <th>Inscription</th>
                        <th>Dernière Connexion</th>
                        <th style="text-align:right">Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="7" class="empty-state"><i class="fas fa-spinner fa-spin"></i><br>Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Édition -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">✏️ Modifier Utilisateur</h2>
                <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label>Email (lecture seule)</label>
                    <input type="text" id="editEmail" disabled>
                </div>
                <div class="form-group">
                    <label>Points</label>
                    <input type="number" id="editPoints" min="0">
                </div>
                <div class="form-group">
                    <label>Pubs Récompensées Vues</label>
                    <input type="number" id="editRewardedCount" min="0">
                </div>
                <div class="form-group">
                    <label>Statut</label>
                    <select id="editBanned">
                        <option value="false">✅ Actif</option>
                        <option value="true">🚫 Banni</option>
                    </select>
                </div>
                <button type="submit" class="btn-save" id="btnSave"><i class="fas fa-save"></i> Sauvegarder</button>
            </form>
        </div>
    </div>

    <div id="accessDenied" style="display:none;text-align:center;padding:4rem 2rem">
        <i class="fas fa-lock" style="font-size:4rem;color:var(--danger);margin-bottom:1rem"></i>
        <h2>Accès Refusé</h2>
        <p style="color:var(--muted);margin:1rem 0">Réservé à l'administrateur.</p>        <a href="/index.html" class="btn-back">Retour accueil</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_EMAIL = 'leonard@pixora.com';

        let allUsers = [];
        let filteredUsers = [];

        async function adminRequest(action, payload) {
            try {
                var session = await db.auth.getSession();
                var token = session.data.session?.access_token;
                if (!token) throw new Error('Session expirée. Reconnectez-vous.');
                var res = await fetch('/api/admin-users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ action: action, ...payload })
                });
                var data = await res.json();
                if (!res.ok || !data.ok) throw new Error(data.error || 'Erreur serveur ' + res.status);
                return data;
            } catch(e) {
                console.error('[ADMIN-USERS] Error:', e);
                alert('❌ Erreur : ' + e.message);
                return null;
            }
        }

        async function checkAdmin() {
            try {
                var sessionResult = await db.auth.getSession();
                var user = sessionResult.data.session?.user;
                if (!user || user.email.toLowerCase() !== ADMIN_EMAIL) {
                    document.getElementById('mainContent').style.display = 'none';
                    document.getElementById('accessDenied').style.display = 'block';
                    return;
                }
                document.getElementById('mainContent').style.display = 'block';
                await loadUsers();
            } catch(e) {
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('accessDenied').style.display = 'block';
            }
        }
        async function loadUsers() {
            try {
                var data = await adminRequest('list');
                if (!data) return;
                allUsers = data.users || [];
                applyFilters();
                updateStats();
            } catch(e) {
                allUsers = [];
                applyFilters();
                updateStats();
            }
        }

        function applyFilters() {
            var search = document.getElementById('searchInput').value.toLowerCase();
            var status = document.getElementById('statusFilter').value;
            filteredUsers = allUsers.filter(function(u) {
                var matchSearch = (u.email || '').toLowerCase().includes(search);
                var matchStatus = status === 'all' || (status === 'banned' ? u.banned : !u.banned);
                return matchSearch && matchStatus;
            });
            renderTable();
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = allUsers.length;
            document.getElementById('statActive').textContent = allUsers.filter(function(u) { return !u.banned; }).length;
            document.getElementById('statBanned').textContent = allUsers.filter(function(u) { return u.banned; }).length;
            var totalPoints = allUsers.reduce(function(sum, u) { return sum + (u.points || 0); }, 0);
            document.getElementById('statPoints').textContent = totalPoints.toLocaleString();
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            var d = new Date(dateStr);
            return d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
        }

        function renderTable() {
            var tbody = document.getElementById('usersTableBody');
            if (filteredUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><i class="fas fa-inbox"></i><br>Aucun utilisateur trouvé</td></tr>';
                return;
            }
            tbody.innerHTML = filteredUsers.map(function(u) {
                var statusClass = u.banned ? 'status-banned' : 'status-active';
                var statusLabel = u.banned ? '🚫 Banni' : '✅ Actif';
                var banIcon = u.banned ? 'fa-check-circle' : 'fa-ban';
                var banTitle = u.banned ? 'Débannir' : 'Bannir';                return '<tr>' +
                    '<td><span class="status-badge ' + statusClass + '">' + statusLabel + '</span></td>' +
                    '<td class="user-email">' + (u.email || 'N/A') + '</td>' +
                    '<td class="user-points">' + (u.points || 0) + '</td>' +
                    '<td>' + (u.rewarded_count || 0) + '/5</td>' +
                    '<td>' + formatDate(u.created_at) + '</td>' +
                    '<td>' + formatDate(u.last_login) + '</td>' +
                    '<td style="text-align:right"><div class="actions" style="justify-content:flex-end">' +
                        '<button class="btn-action btn-edit" title="Modifier" onclick="openEditModal(\'' + u.user_id + '\')"><i class="fas fa-pen"></i></button>' +
                        '<button class="btn-action btn-ban" title="' + banTitle + '" onclick="toggleBan(\'' + u.user_id + '\',' + !u.banned + ')"><i class="fas ' + banIcon + '"></i></button>' +
                        '<button class="btn-action btn-del" title="Supprimer" onclick="deleteUser(\'' + u.user_id + '\',\'' + (u.email || '').replace(/'/g, "\\'") + '\')"><i class="fas fa-trash"></i></button>' +
                    '</div></td></tr>';
            }).join('');
        }

        function openEditModal(userId) {
            var user = allUsers.find(function(u) { return u.user_id === userId; });
            if (!user) return;
            document.getElementById('editUserId').value = user.user_id;
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editPoints').value = user.points || 0;
            document.getElementById('editRewardedCount').value = user.rewarded_count || 0;
            document.getElementById('editBanned').value = user.banned ? 'true' : 'false';
            document.getElementById('modalTitle').textContent = '✏️ Modifier : ' + (user.email || 'Utilisateur');
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sauvegarde...';
            var result = await adminRequest('update', {
                user_id: document.getElementById('editUserId').value,
                points: parseInt(document.getElementById('editPoints').value) || 0,
                rewarded_count: parseInt(document.getElementById('editRewardedCount').value) || 0,
                banned: document.getElementById('editBanned').value === 'true'
            });
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Sauvegarder';
            if (result) {
                closeModal();
                await loadUsers();
                alert('✅ Utilisateur modifié !');
            }
        });

        async function toggleBan(userId, newBanned) {            var action = newBanned ? 'bannir' : 'débannir';
            if (!confirm('⚠️ ' + action.charAt(0).toUpperCase() + action.slice(1) + ' cet utilisateur ?')) return;
            var result = await adminRequest('update', { user_id: userId, banned: newBanned });
            if (result) {
                await loadUsers();
                alert('✅ Utilisateur ' + (newBanned ? 'banni' : 'débanni') + ' !');
            }
        }

        async function deleteUser(userId, email) {
            if (!confirm('⚠️ SUPPRIMER définitivement "' + email + '" ?\n\nCette action est IRRÉVERSIBLE.\nLes données seront perdues.')) return;
            if (!confirm('⚠️ CONFIRMER la suppression de "' + email + '" ?')) return;
            var result = await adminRequest('delete', { user_id: userId });
            if (result) {
                await loadUsers();
                alert('✅ Utilisateur supprimé !\n\nNote: Supprimez aussi le compte dans Supabase > Authentication si nécessaire.');
            }
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('statusFilter').addEventListener('change', applyFilters);
        document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeModal(); });

        checkAdmin();
    </script>
</body>
</html>
