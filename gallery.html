<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixora - Galerie Publique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#050507;--surf:rgba(24,24,27,0.6);--elev:rgba(39,39,42,0.8);--border:rgba(63,63,70,0.5);--glow:rgba(139,92,246,0.25);--prim:#8B5CF6;--sec:#EC4899;--gold:#FBBF24;--success:#10B981;--danger:#EF4444;--text:#FAFAFA;--muted:#A1A1AA;--dim:#71717A;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--hdr:rgba(20,20,23,0.85)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:90px}
        .bg-orbs{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4;animation:float 20s infinite ease-in-out}
        .o1{width:400px;height:400px;background:var(--prim);top:-100px;left:-100px}
        .o2{width:300px;height:300px;background:var(--sec);bottom:10%;right:-50px;animation-delay:-5s}
        @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.1)}66%{transform:translate(-20px,20px) scale(0.9)}}
        button{background:none;border:none;cursor:pointer;font-family:inherit;color:inherit;-webkit-tap-highlight-color:transparent}
        a{color:inherit;text-decoration:none}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        /* HEADER */
        .site-header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--hdr);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 1rem;height:60px;display:flex;align-items:center;justify-content:space-between}
        .header-logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:var(--text)}
        .header-logo svg{width:28px;height:28px}
        .logo-text{font-size:1.2rem;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(135deg,#fff 20%,var(--prim) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-right{display:flex;align-items:center;gap:0.7rem;position:relative}
        .user-stats{display:none;align-items:center;gap:0.4rem;padding:0.35rem 0.7rem;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:20px}
        .user-stats.show{display:flex}
        .stat-icon{color:var(--gold);font-size:0.75rem}
        .stat-points{font-family:var(--mono);font-size:0.8rem;font-weight:700;color:var(--gold)}
        .user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--prim),var(--sec));display:none;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;cursor:pointer;transition:all 0.2s;color:white;position:relative;flex-shrink:0}
        .user-avatar:hover{transform:scale(1.1);box-shadow:0 0 20px rgba(139,92,246,0.5)}
        .user-avatar.show{display:flex}
        .avatar-hamburger{position:absolute;bottom:-3px;right:-3px;width:14px;height:14px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.45rem;color:var(--muted);border:1.5px solid var(--border)}
        .btn-auth{padding:0.4rem 0.9rem;background:linear-gradient(135deg,var(--prim),var(--sec));color:white;border-radius:10px;font-size:0.78rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;transition:all 0.2s;box-shadow:0 4px 15px rgba(139,92,246,0.3);white-space:nowrap}
        .btn-auth:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(139,92,246,0.5)}
        @media(max-width:767px){.user-stats{display:none!important}.site-header{padding:0 0.8rem}.btn-auth{padding:0.35rem 0.75rem;font-size:0.72rem}.logo-text{font-size:1.05rem}}

        /* USER MENU */
        .user-menu{position:absolute;top:calc(100% + 10px);right:0;width:260px;background:var(--elev);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid var(--border);border-radius:16px;padding:0.6rem;box-shadow:0 20px 60px rgba(0,0,0,0.6);opacity:0;visibility:hidden;transform:translateY(-8px);transition:all 0.25s cubic-bezier(0.25,0.8,0.25,1);z-index:1001}
        .user-menu.show{opacity:1;visibility:visible;transform:translateY(0)}
        .menu-header{display:flex;align-items:center;gap:0.7rem;padding:0.5rem 0.3rem 0.7rem;border-bottom:1px solid var(--border)}
        .menu-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--prim),var(--sec));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:white;flex-shrink:0}
        .menu-info{flex:1;min-width:0}
        .menu-name{font-size:0.85rem;font-weight:700;margin-bottom:0.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .menu-email{font-size:0.65rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .menu-points-bar{display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.5rem;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:8px;margin:0.5rem 0}
        .menu-points-bar i{color:var(--gold);font-size:0.75rem}        .menu-points-bar span{font-family:var(--mono);font-size:0.8rem;font-weight:700;color:var(--gold);flex:1}
        .menu-points-bar small{font-size:0.6rem;color:var(--muted)}
        .menu-item{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 0.5rem;border-radius:10px;color:var(--text);font-size:0.8rem;font-weight:500;transition:all 0.2s;cursor:pointer;text-decoration:none}
        .menu-item:hover{background:rgba(139,92,246,0.08);color:var(--prim)}
        .menu-item i{width:18px;text-align:center;color:var(--muted);font-size:0.85rem;transition:color 0.2s}
        .menu-item:hover i{color:var(--prim)}
        .menu-item.danger{color:var(--danger)}
        .menu-item.danger i{color:var(--danger)}
        .menu-item.danger:hover{background:rgba(239,68,68,0.08)}
        .menu-divider{height:1px;background:var(--border);margin:0.3rem 0}

        /* MOBILE NAV */
        .nav-mobile{position:fixed;bottom:0;left:0;right:0;background:rgba(9,9,11,0.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:0.4rem 0 0.5rem;padding-bottom:calc(0.5rem + env(safe-area-inset-bottom));z-index:1000}
        .nav-item{width:58px;height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.15rem;border-radius:16px;color:var(--muted);transition:all 0.3s;position:relative;text-decoration:none}
        .nav-item i{font-size:1.2rem;transition:all 0.3s}
        .nav-item span{font-size:0.58rem;font-weight:600}
        .nav-item[data-nav="studio"].active{color:var(--prim)}
        .nav-item[data-nav="studio"].active i{filter:drop-shadow(0 0 8px rgba(139,92,246,0.6))}
        .nav-item[data-nav="gallery"].active{color:#3B82F6}
        .nav-item[data-nav="gallery"].active i{filter:drop-shadow(0 0 8px rgba(59,130,246,0.6))}
        .nav-item[data-nav="points"].active{color:var(--gold)}
        .nav-item[data-nav="points"].active i{filter:drop-shadow(0 0 8px rgba(251,191,36,0.6))}
        .nav-item[data-nav="profile"].active{color:var(--sec)}
        .nav-item[data-nav="profile"].active i{filter:drop-shadow(0 0 8px rgba(236,72,153,0.6))}
        .nav-item .badge{position:absolute;top:3px;right:8px;background:var(--danger);color:white;font-size:0.55rem;font-weight:700;padding:1px 5px;border-radius:6px;min-width:16px;text-align:center;font-family:var(--mono)}

        /* MAIN */
        .main-content{max-width:800px;margin:0 auto;padding:1rem;padding-top:72px;padding-bottom:100px}
        @media(min-width:768px){.main-content{margin-top:60px;padding:1.5rem}}
        .page-title{font-size:1.5rem;font-weight:800;margin-bottom:0.3rem;letter-spacing:-0.03em}
        .page-sub{font-size:0.82rem;color:var(--muted);margin-bottom:1.2rem}

        /* GRID */
        .results-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.6rem}
        @media(min-width:768px){.results-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.8rem}}
        .result-card{aspect-ratio:1;background:var(--surf);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative;transition:transform 0.3s,box-shadow 0.3s;cursor:pointer}
        .result-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,0.5)}
        .result-card img{width:100%;height:100%;object-fit:cover;display:block}
        .result-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 60%);display:flex;align-items:flex-end;justify-content:flex-end;padding:0.6rem;gap:0.4rem;opacity:0;transition:opacity 0.3s}
        .result-card:hover .result-overlay{opacity:1}
        @media(hover:none){.result-overlay{opacity:1}}
        .icon-btn{width:34px;height:34px;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:0.8rem;transition:all 0.2s}
        .icon-btn:hover{background:var(--prim);border-color:var(--prim);transform:scale(1.1)}

        /* LIGHTBOX */
        .lightbox{position:fixed;inset:0;z-index:10002;background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;flex-direction:column;padding:1rem}
        .lightbox.active{display:flex}
        .lightbox img{max-width:90vw;max-height:70vh;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.8)}
        .lightbox-close{position:absolute;top:1rem;right:1rem;width:44px;height:44px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:1.2rem;cursor:pointer;transition:all 0.2s}
        .lightbox-close:hover{background:var(--danger);transform:rotate(90deg)}        .lightbox-actions{display:flex;gap:1rem;margin-top:1.5rem}
        .lb-btn{padding:0.7rem 1.3rem;background:var(--prim);color:white;border-radius:10px;font-weight:600;font-size:0.85rem;display:flex;align-items:center;gap:0.5rem;cursor:pointer;transition:all 0.2s}
        .lb-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(139,92,246,0.4)}
        .lb-btn.sec{background:rgba(255,255,255,0.1)}

        /* FOOTER */
        .site-footer{text-align:center;padding:1.5rem 1rem 1rem;color:var(--dim);font-size:0.68rem;border-top:1px solid var(--border);margin-top:1.5rem}
        .footer-links{display:flex;justify-content:center;gap:1rem;margin-bottom:0.5rem;flex-wrap:wrap}
        .site-footer a{color:var(--muted);transition:color 0.2s;font-weight:500}
        .site-footer a:hover{color:var(--prim)}
    </style>
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <div class="lightbox-close" onclick="closeLB()"><i class="fas fa-times"></i></div>
    <img id="lb-img" src="" alt="Zoom">
    <div class="lightbox-actions">
        <button class="lb-btn" onclick="dlLB()"><i class="fas fa-download"></i> Télécharger</button>
        <button class="lb-btn sec" onclick="closeLB()"><i class="fas fa-compress"></i> Fermer</button>
    </div>
</div>

<!-- HEADER -->
<header class="site-header">
    <a href="index.html" class="header-logo">
        <svg viewBox="0 0 32 32" fill="none">
            <defs><linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs>
            <path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#hg)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
            <path d="M16 2L4 10L16 14L16 2Z" fill="rgba(255,255,255,0.2)"/>
        </svg>
        <span class="logo-text">Pixora</span>
    </a>
    <div class="header-right">
        <div class="user-stats" id="user-stats">
            <i class="fas fa-bolt stat-icon"></i>
            <span class="stat-points" id="header-points">0</span>
        </div>
        <div class="user-avatar" id="user-avatar" onclick="toggleUserMenu(event)">
            <span id="avatar-initial">U</span>
            <div class="avatar-hamburger"><i class="fas fa-bars"></i></div>
        </div>
        <button class="btn-auth" id="auth-btn" onclick="window.location.href='index.html'"><i class="fas fa-sign-in-alt"></i> Connexion</button>

        <!-- USER MENU -->
        <div class="user-menu" id="user-menu">
            <div class="menu-header">                <div class="menu-avatar" id="menu-avatar">U</div>
                <div class="menu-info">
                    <div class="menu-name" id="menu-name">Utilisateur</div>
                    <div class="menu-email" id="menu-email">email@example.com</div>
                </div>
            </div>
            <div class="menu-points-bar">
                <i class="fas fa-bolt"></i>
                <span id="menu-points">0</span>
                <small>points</small>
            </div>
            <a href="profile.html" class="menu-item" onclick="closeUserMenu()">
                <i class="fas fa-user"></i><span>Mon profil</span>
            </a>
            <a href="earn.html" class="menu-item" onclick="closeUserMenu()">
                <i class="fas fa-coins"></i><span>Gagner des points</span>
            </a>
            <a href="shop.html" class="menu-item" onclick="closeUserMenu()">
                <i class="fas fa-shopping-bag"></i><span>Mes achats</span>
            </a>
            <div class="menu-divider"></div>
            <button class="menu-item danger" onclick="doLogout()" style="width:100%;text-align:left;background:none;border:none;font-family:inherit">
                <i class="fas fa-sign-out-alt"></i><span>Déconnexion</span>
            </button>
        </div>
    </div>
</header>

<!-- MOBILE NAV -->
<nav class="nav-mobile">
    <a href="index.html" class="nav-item" data-nav="studio"><i class="fas fa-wand-magic-sparkles"></i><span>Studio</span></a>
    <a href="gallery.html" class="nav-item active" data-nav="gallery"><i class="fas fa-images"></i><span>Galerie</span></a>
    <a href="earn.html" class="nav-item" data-nav="points">
        <i class="fas fa-coins"></i>
        <span class="badge" id="nav-points-badge" style="display:none">0</span>
    </a>
    <a href="#" class="nav-item" data-nav="profile" id="mob-profile" onclick="event.preventDefault();toggleUserMenu(event)"><i class="fas fa-user"></i></a>
</nav>

<!-- MAIN CONTENT -->
<main class="main-content">
    <h1 class="page-title">Galerie Publique</h1>
    <p class="page-sub">Les dernières créations de la communauté Pixora</p>

    <div class="results-grid" id="gallery-grid">
        <div style="text-align:center;padding:3rem;grid-column:1/-1;color:var(--muted);">
            <i class="fas fa-spinner fa-spin" style="font-size:2rem;margin-bottom:1rem"></i>
            <p>Chargement...</p>
        </div>
    </div>
    <footer class="site-footer">
        <div class="footer-links">
            <a href="index.html">Studio</a>
            <a href="earn.html">Points</a>
            <a href="shop.html">Boutique</a>
            <a href="profile.html">Profil</a>
            <a href="privacy.html">Confidentialité</a>
        </div>
        <div>© 2026 Pixora. Tous droits réservés.</div>
    </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var BUCKET = 'pixora-gallery';
var lbUrl = '';

// === USER MENU ===
function toggleUserMenu(e) {
    if (e) e.preventDefault();
    document.getElementById('user-menu').classList.toggle('show');
}
function closeUserMenu() {
    document.getElementById('user-menu').classList.remove('show');
}
document.addEventListener('click', function(e) {
    var menu = document.getElementById('user-menu');
    var avatar = document.getElementById('user-avatar');
    var mob = document.getElementById('mob-profile');
    if (!menu.contains(e.target) && !avatar.contains(e.target) && !mob.contains(e.target)) closeUserMenu();
});

async function doLogout() {
    await db.auth.signOut();
    closeUserMenu();
    updateUI();
    setTimeout(function() { location.reload(); }, 800);
}

// === USER DATA ===
async function getUserData() {
    var u = await db.auth.getUser(); if (!u) return { points: 0, streak: 1 };
    var r = await db.from('user_data').select('*').eq('user_id', u.id).single();
    return r.data || { points: 0, streak: 1 };
}
// === UPDATE UI ===
async function updateUI() {
    var logged = await db.auth.getUser().then(r => r.data.user);
    
    document.getElementById('user-stats').classList.toggle('show', !!logged);
    document.getElementById('user-avatar').classList.toggle('show', !!logged);
    document.getElementById('auth-btn').style.display = logged ? 'none' : 'flex';

    if (logged) {
        var d = await getUserData();
        document.getElementById('header-points').textContent = d.points || 0;
        document.getElementById('nav-points-badge').textContent = d.points || 0;
        document.getElementById('nav-points-badge').style.display = d.points > 0 ? 'block' : 'none';
        document.getElementById('menu-points').textContent = d.points || 0;

        var name = logged.user_metadata?.name || 'Utilisateur';
        var initial = name.charAt(0).toUpperCase();
        document.getElementById('avatar-initial').textContent = initial;
        document.getElementById('menu-avatar').textContent = initial;
        document.getElementById('menu-name').textContent = name;
        document.getElementById('menu-email').textContent = logged.email;
    }
}

// === LIGHTBOX ===
function openLB(url) { lbUrl = url; document.getElementById('lb-img').src = url; document.getElementById('lightbox').classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeLB() { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow = ''; lbUrl = ''; }
document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLB(); });

async function dlLB() {
    if (!lbUrl) return;
    try { var r = await fetch(lbUrl); var b = await r.blob(); var u = URL.createObjectURL(b); var a = document.createElement('a'); a.href = u; a.download = 'pixora-' + Date.now() + '.jpg'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); } catch(e) { window.open(lbUrl, '_blank'); }
}

async function dlDirect(btn) {
    var card = btn.closest('.result-card');
    var img = card.querySelector('img');
    if (!img || !img.src) return;
    try { var r = await fetch(img.src); var b = await r.blob(); var u = URL.createObjectURL(b); var a = document.createElement('a'); a.href = u; a.download = 'pixora-' + Date.now() + '.jpg'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); } catch(e) { window.open(img.src, '_blank'); }
}

// === LOAD GALLERY ===
async function loadGallery() {
    var grid = document.getElementById('gallery-grid');
    try {
        var result = await db.storage.from(BUCKET).list('', { limit: 50, sortBy: { column: 'created_at', order: 'desc' } });
        if (result.error || !result.data || result.data.length === 0) {
            grid.innerHTML = '<div style="text-align:center;padding:3rem;grid-column:1/-1;color:var(--muted);"><i class="fas fa-images" style="font-size:3rem;opacity:0.3;margin-bottom:1rem"></i><p>Aucune création récente.<br>Soyez le premier à générer !</p></div>';
            return;
        }        var now = Date.now();
        var validFiles = [];
        for (var i = 0; i < result.data.length; i++) {
            var file = result.data[i];
            var createdAt = new Date(file.created_at).getTime();
            if ((now - createdAt) < 3600000) {
                var urlData = db.storage.from(BUCKET).getPublicUrl(file.name);
                validFiles.push({ url: urlData.data.publicUrl, name: file.name });
            } else {
                await db.storage.from(BUCKET).remove([file.name]);
            }
        }
        if (validFiles.length === 0) {
            grid.innerHTML = '<div style="text-align:center;padding:3rem;grid-column:1/-1;color:var(--muted);"><i class="fas fa-images" style="font-size:3rem;opacity:0.3;margin-bottom:1rem"></i><p>Aucune création récente.<br>Soyez le premier à générer !</p></div>';
            return;
        }
        grid.innerHTML = '';
        validFiles.forEach(function(item) {
            var card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = '<img src="' + item.url + '" alt="Création Pixora" loading="lazy"><div class="result-overlay"><button class="icon-btn" onclick="event.stopPropagation();dlDirect(this)"><i class="fas fa-download"></i></button></div>';
            card.onclick = function() { openLB(item.url); };
            grid.appendChild(card);
        });
    } catch (err) {
        console.error('Gallery error:', err);
        grid.innerHTML = '<div style="text-align:center;padding:3rem;grid-column:1/-1;color:var(--muted);"><i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:1rem"></i><p>Erreur chargement galerie</p></div>';
    }
}

// === INIT ===
document.addEventListener('DOMContentLoaded', async function() {
    await updateUI();
    await loadGallery();
});
</script>
</body>
</html>
