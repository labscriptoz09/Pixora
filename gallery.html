<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixora - Galerie Publique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#050507;--surf:rgba(24,24,27,0.6);--elev:rgba(39,39,42,0.8);--border:rgba(63,63,70,0.5);--glow:rgba(139,92,246,0.3);--prim:#8B5CF6;--sec:#EC4899;--gold:#FBBF24;--success:#10B981;--danger:#EF4444;--text:#FAFAFA;--muted:#A1A1AA;--dim:#71717A;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--hdr:rgba(20,20,23,0.85)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:80px}
        .bg-orbs{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4;animation:float 20s infinite ease-in-out}
        .o1{width:400px;height:400px;background:var(--prim);top:-100px;left:-100px}
        .o2{width:300px;height:300px;background:var(--sec);bottom:10%;right:-50px;animation-delay:-5s}
        @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.1)}66%{transform:translate(-20px,20px) scale(0.9)}}
        button{background:none;border:none;cursor:pointer;font-family:inherit;color:inherit;-webkit-tap-highlight-color:transparent}
        a{color:inherit;text-decoration:none}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        /* HEADER */
        .site-header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--hdr);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 1rem;height:60px;display:flex;align-items:center;justify-content:space-between}
        .header-logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:var(--text)}
        .header-logo svg{width:26px;height:26px;flex-shrink:0}
        .logo-text{font-size:1.1rem;font-weight:700;letter-spacing:-0.03em;background:linear-gradient(135deg,#fff 20%,var(--prim) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .header-right{display:flex;align-items:center;gap:0.6rem}
        .btn-auth{padding:0.4rem 1rem;background:linear-gradient(135deg,var(--prim),var(--sec));color:white;border-radius:10px;font-size:0.8rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;white-space:nowrap;transition:all 0.2s}
        .btn-auth:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(139,92,246,0.4)}
        @media(max-width:767px){.site-header{padding:0 0.8rem}.btn-auth{padding:0.35rem 0.8rem;font-size:0.75rem}.logo-text{font-size:1rem}}

        /* MOBILE NAV */
        .nav-mobile{position:fixed;bottom:0;left:0;right:0;background:rgba(9,9,11,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:0.5rem 0;padding-bottom:env(safe-area-inset-bottom);z-index:1000}
        .nav-item{width:48px;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.2rem;border-radius:16px;color:var(--muted);transition:all 0.3s;position:relative;text-decoration:none}
        .nav-item i{font-size:1.2rem;transition:transform 0.3s}
        .nav-item span{font-size:0.6rem;font-weight:500}
        .nav-item.active{color:var(--text)}
        .nav-item.active i{transform:scale(1.1);color:var(--prim);filter:drop-shadow(0 0 8px var(--glow))}
        @media(min-width:768px){.nav-mobile{display:none!important}}

        /* MAIN */
        .main-content{max-width:900px;margin:0 auto;padding:1rem;padding-top:70px;padding-bottom:100px}
        @media(min-width:768px){.main-content{margin-top:70px;padding:2rem}}
        .page-title{font-size:1.5rem;font-weight:700;margin-bottom:0.3rem}
        .page-sub{font-size:0.85rem;color:var(--muted);margin-bottom:1.5rem}

        /* GRID */
        .results-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem}
        @media(min-width:768px){.results-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}}        .result-card{aspect-ratio:1;background:var(--surf);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative;transition:transform 0.3s,box-shadow 0.3s;cursor:pointer}
        .result-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,0.5)}
        .result-card img{width:100%;height:100%;object-fit:cover;display:block}
        .result-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.9) 0%,transparent 60%);display:flex;align-items:flex-end;justify-content:flex-end;padding:0.6rem;gap:0.4rem;opacity:0;transition:opacity 0.3s}
        .result-card:hover .result-overlay{opacity:1}
        @media(hover:none){.result-overlay{opacity:1}}
        .icon-btn{width:36px;height:36px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:0.85rem;transition:all 0.2s}
        .icon-btn:hover{background:var(--prim);border-color:var(--prim);transform:scale(1.1)}

        /* LIGHTBOX */
        .lightbox{position:fixed;inset:0;z-index:10002;background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;flex-direction:column;padding:1rem}
        .lightbox.active{display:flex}
        .lightbox img{max-width:90vw;max-height:80vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.8)}
        .lightbox-close{position:absolute;top:1rem;right:1rem;width:44px;height:44px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:1.2rem;cursor:pointer;transition:all 0.2s}
        .lightbox-close:hover{background:var(--danger);transform:rotate(90deg)}
        .lightbox-actions{display:flex;gap:1rem;margin-top:1.5rem}
        .lb-btn{padding:0.7rem 1.5rem;background:var(--prim);color:white;border-radius:10px;font-weight:600;font-size:0.9rem;display:flex;align-items:center;gap:0.5rem;cursor:pointer;transition:all 0.2s}
        .lb-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(139,92,246,0.4)}
        .lb-btn.sec{background:rgba(255,255,255,0.1)}

        /* FOOTER */
        .site-footer{text-align:center;padding:2rem 1rem 1rem;color:var(--dim);font-size:0.75rem;border-top:1px solid var(--border);margin-top:2rem}
        .footer-links{display:flex;justify-content:center;gap:1rem;margin-bottom:0.5rem;flex-wrap:wrap}
        .site-footer a{color:var(--muted);transition:color 0.2s}
        .site-footer a:hover{color:var(--prim)}
    </style>
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <div class="lightbox-close" onclick="closeLB()"><i class="fas fa-times"></i></div>
    <img id="lb-img" src="" alt="Zoom">
    <div class="lightbox-actions">
        <button class="lb-btn" onclick="dlLB()"><i class="fas fa-download"></i> Télécharger</button>
        <button class="lb-btn sec" onclick="closeLB()"><i class="fas fa-compress"></i> Fermer</button>
    </div>
</div>

<!-- HEADER -->
<header class="site-header">
    <a href="index.html" class="header-logo">
        <svg viewBox="0 0 32 32" fill="none"><defs><linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#EC4899"/></linearGradient></defs><path d="M16 2L28 10L24 28H8L4 10L16 2Z" fill="url(#hg)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/><path d="M16 2L4 10L16 14L16 2Z" fill="rgba(255,255,255,0.2)"/></svg>
        <span class="logo-text">Pixora</span>
    </a>
    <div class="header-right">
        <button class="btn-auth" id="auth-btn" onclick="window.location.href='index.html'"><i class="fas fa-sign-in-alt"></i> Connexion</button>
    </div></header>

<!-- MOBILE NAV -->
<nav class="nav-mobile">
    <a href="index.html" class="nav-item"><i class="fas fa-wand-magic-sparkles"></i><span>Studio</span></a>
    <a href="gallery.html" class="nav-item active"><i class="fas fa-images"></i><span>Galerie</span></a>
    <a href="earn.html" class="nav-item"><i class="fas fa-coins"></i><span>Points</span></a>
    <a href="#" class="nav-item" id="mob-profile" onclick="event.preventDefault();window.location.href='index.html'"><i class="fas fa-user"></i><span>Login</span></a>
</nav>

<!-- MAIN CONTENT -->
<main class="main-content">
    <h1 class="page-title">Galerie Publique</h1>
    <p class="page-sub">Les dernières créations de la communauté Pixora</p>

    <div class="results-grid" id="gallery-grid">
        <div style="text-align:center;padding:3rem 1rem;color:var(--muted);grid-column:1/-1">
            <i class="fas fa-spinner fa-spin" style="font-size:2rem;margin-bottom:1rem"></i>
            <p>Chargement...</p>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="index.html">Studio</a>
            <a href="earn.html">Points</a>
            <a href="shop.html">Boutique</a>
            <a href="profile.html">Profil</a>
            <a href="privacy.html">Confidentialité</a>
        </div>
        <div>© 2026 Pixora. Tous droits réservés.</div>
    </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL = 'https://cfwzilhetkclpytjsopu.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmd3ppbGhldGtjbHB5dGpzb3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDYxNjgsImV4cCI6MjA5ODkyMjE2OH0.fUAiUlEureXCj2bXJefuVvNoo9ktjDeyKb4VOK7GrEU';
var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var BUCKET = 'pixora-gallery';
var lbUrl = '';

// === LIGHTBOX ===
function openLB(url) { lbUrl = url; document.getElementById('lb-img').src = url; document.getElementById('lightbox').classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeLB() { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow = ''; lbUrl = ''; }
document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLB(); });

async function dlLB() {
    if (!lbUrl) return;
    try { var r = await fetch(lbUrl); var b = await r.blob(); var u = URL.createObjectURL(b); var a = document.createElement('a'); a.href = u; a.download = 'pixora-' + Date.now() + '.jpg'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); } catch(e) { window.open(lbUrl, '_blank'); }}

async function dlDirect(btn) {
    var card = btn.closest('.result-card');
    var img = card.querySelector('img');
    if (!img || !img.src) return;
    try { var r = await fetch(img.src); var b = await r.blob(); var u = URL.createObjectURL(b); var a = document.createElement('a'); a.href = u; a.download = 'pixora-' + Date.now() + '.jpg'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); } catch(e) { window.open(img.src, '_blank'); }
}

// === LOAD GALLERY ===
async function loadGallery() {
    var grid = document.getElementById('gallery-grid');
    try {
        var result = await db.storage.from(BUCKET).list('', { limit: 50, sortBy: { column: 'created_at', order: 'desc' } });
        if (result.error || !result.data || result.data.length === 0) {
            grid.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:var(--muted);grid-column:1/-1"><i class="fas fa-images" style="font-size:3rem;opacity:0.3;margin-bottom:1rem"></i><p>Aucune création récente.<br>Soyez le premier à générer !</p></div>';
            return;
        }
        var now = Date.now();
        var validFiles = [];
        for (var i = 0; i < result.data.length; i++) {
            var file = result.data[i];
            var createdAt = new Date(file.created_at).getTime();
            if ((now - createdAt) < 3600000) {
                var urlData = db.storage.from(BUCKET).getPublicUrl(file.name);
                validFiles.push({ url: urlData.data.publicUrl, name: file.name });
            } else {
                await db.storage.from(BUCKET).remove([file.name]);
            }
        }
        if (validFiles.length === 0) {
            grid.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:var(--muted);grid-column:1/-1"><i class="fas fa-images" style="font-size:3rem;opacity:0.3;margin-bottom:1rem"></i><p>Aucune création récente.<br>Soyez le premier à générer !</p></div>';
            return;
        }
        grid.innerHTML = '';
        validFiles.forEach(function(item) {
            var card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = '<img src="' + item.url + '" alt="Création Pixora" loading="lazy"><div class="result-overlay"><button class="icon-btn" onclick="event.stopPropagation();dlDirect(this)"><i class="fas fa-download"></i></button></div>';
            card.onclick = function() { openLB(item.url); };
            grid.appendChild(card);
        });
    } catch (err) {
        console.error('Gallery error:', err);
        grid.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:var(--muted);grid-column:1/-1"><i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:1rem"></i><p>Erreur chargement galerie</p></div>';
    }
}

// === INIT ===
document.addEventListener('DOMContentLoaded', loadGallery);</script>
</body>
</html>
